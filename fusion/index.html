<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0a84ff">
<title>Fusion 360 教科書トラッカー</title>
<style>
:root{
  --c-p0:#5ab4ff; --c-p1:#a99cff; --c-p2:#c850dc; --c-p3:#e68c3c;
  --c-p4:#34c759; --c-p5:#ffa0b4; --c-p6:#64c8dc;
  --bg:#f5f5f7; --card:#fff; --line:#e3e3e8; --text:#1d1d1f;
  --muted:#6b6b73; --done:#34c759; --accent:#0a84ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;font-size:15px;line-height:1.5}

header{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 12px 4px;border-bottom:1px solid var(--line)}
h1{margin:0 0 6px;font-size:17px;font-weight:700}
h1 .sub{font-size:11px;color:var(--muted);font-weight:500;margin-left:6px}

.phase-tabs{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.phase-tabs button{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--text);font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:4px}
.phase-tabs button .num{font-weight:800;font-size:13px}
.phase-tabs button .pct{font-size:10px;color:var(--muted)}
.phase-tabs button.active{background:var(--text);color:#fff;border-color:var(--text)}
.phase-tabs button.active .pct{color:#a0d8ff}

.summary{padding:8px 12px}
.summary-card{background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--line)}
.summary-card .label{font-size:11px;color:var(--muted);font-weight:500}
.summary-card .big{font-size:28px;font-weight:800;line-height:1.1;margin-top:2px}
.summary-card .big small{font-size:13px;font-weight:500;color:var(--muted)}
.bar{margin-top:8px;height:9px;border-radius:999px;background:#eee;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#34c759,#0a84ff);transition:width .3s}
.cat-bars{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.cat-bar{display:flex;align-items:center;gap:6px;font-size:11px}
.cat-bar .lbl{flex:0 0 80px;color:var(--muted);font-weight:600}
.cat-bar .b{flex:1;height:6px;background:#eee;border-radius:999px;overflow:hidden}
.cat-bar .b i{display:block;height:100%;background:#34c759}
.cat-bar .pct{font-weight:600;font-size:11px;flex:0 0 42px;text-align:right}

.charts{padding:0 12px 10px}
/* === 学習マップ（Phase別 進捗バー） === */
.pmap-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
.pmap-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;gap:8px}
.pmap-total{font-size:13px;font-weight:800;color:var(--text);white-space:nowrap}
.pmap-row{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;padding:7px 6px;border-radius:9px;cursor:pointer;text-align:left;font:inherit;border:1.5px solid transparent}
.pmap-row.cur{background:#eef6ff;border-color:#c4dffb}
.pmap-row:active{transform:scale(.99)}
.pmap-label{flex:0 0 138px;font-size:12.5px;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pmap-label b{color:var(--muted);font-size:11px}
.pmap-label .now{font-size:9px;background:#0a84ff;color:#fff;padding:1px 6px;border-radius:7px;font-weight:700}
.pmap-bar{flex:1;height:13px;background:#ececf0;border-radius:999px;overflow:hidden;min-width:60px}
.pmap-bar i{display:block;height:100%;border-radius:999px;transition:width .3s}
.pmap-pct{flex:0 0 40px;text-align:right;font-size:12.5px;font-weight:800}

.phase-info{padding:8px 12px}
.phase-info-card{background:var(--card);border-radius:12px;padding:10px 12px;border:1px solid var(--line);font-size:13px}
.phase-info-card .title{font-weight:700;font-size:14px}
.phase-info-card .meta{font-size:11px;color:var(--muted);margin-top:2px}
.phase-info-card .goal{margin-top:6px;font-size:12px;color:#444}

.content{padding:0 12px 24px}

.cat-group{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden}
.cat-head{padding:9px 12px;background:#f0f5fa;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid var(--line)}
.cat-head .pct-mini{font-size:11px;color:var(--muted);font-weight:600}
.cat-items{padding:8px 10px;display:flex;flex-direction:column;gap:4px}

.item-chip{appearance:none;border:none;font:inherit;font-size:12.5px;font-weight:500;background:#f5f7fa;color:var(--text);padding:9px 12px;border-radius:8px;cursor:pointer;line-height:1.4;border:1.5px solid transparent;transition:all .15s;display:flex;align-items:flex-start;gap:8px;text-align:left;width:100%}
.item-chip:active{transform:scale(.99)}
.item-chip .check-box{flex:0 0 18px;height:18px;border-radius:5px;border:2px solid #c0c5cc;background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;margin-top:1px}
.item-chip.done{background:#e8f8ec;color:#1d6435;border-color:#b9e8c5}
.item-chip.done .check-box{background:var(--done);border-color:var(--done);color:#fff}
.item-chip.done .label{text-decoration:line-through;opacity:.85}
.item-chip .label{flex:1}

.item-wrap{margin-bottom:4px}
.steps-box{margin:2px 0 2px 6px}
.steps-box summary{font-size:11.5px;font-weight:700;color:var(--accent);cursor:pointer;padding:4px 8px;list-style:none;display:inline-block;background:#eaf3ff;border-radius:7px}
.steps-box summary::-webkit-details-marker{display:none}
.steps-box[open] summary{margin-bottom:3px}
.steps{margin:0 0 4px 2px;padding:9px 12px 9px 28px;background:#f0f7ff;border-radius:9px;border:1px solid #d6e8fb;font-size:12.5px;line-height:1.7;color:#2c4a6b}
.steps li{margin-bottom:5px}
.steps li:last-child{margin-bottom:0}
.steps b{color:#0a4a82}

.works-card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;overflow:hidden}
.works-head{padding:9px 12px;background:#fef6e8;font-weight:700;font-size:13px}
.works-items{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.work-chip{appearance:none;border:none;font:inherit;font-size:12px;font-weight:500;background:#fff7e3;color:#6e4c0a;padding:9px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;text-align:left;border:1.5px solid #f3e0a8}
.work-chip.done{background:var(--done);color:#fff;border-color:var(--done)}
.work-chip.done .label{text-decoration:line-through}

.memo-card{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px;padding:10px 12px}
.memo-card h4{margin:0 0 6px;font-size:12px;color:var(--muted);font-weight:600}
.memo-card textarea{width:100%;min-height:80px;border:1px solid var(--line);border-radius:8px;padding:8px;font:inherit;font-size:13px;resize:vertical;background:#fafbfc}
.memo-card .photo-input{margin-top:6px;font-size:11px;color:var(--muted)}
.memo-card .photo-input input{width:100%;border:1px solid var(--line);border-radius:6px;padding:6px;font:inherit;font-size:12px;margin-top:3px}

.link-card{background:#eff7ff;border:1px solid #c4dffb;border-radius:12px;padding:10px 12px;margin-bottom:8px;font-size:12px}
.link-card a{color:var(--accent);text-decoration:none;font-weight:600}

.toolbar{display:flex;gap:7px;padding:6px 12px 24px;flex-wrap:wrap}
.toolbar button{flex:1;min-width:100px;background:#fff;border:1px solid var(--line);padding:9px;border-radius:9px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer}
.toolbar button.danger{color:#c43;border-color:#fbb}

@media (min-width:720px){
  .cat-bars{grid-template-columns:repeat(4,1fr)}
  .content{max-width:780px;margin:0 auto}
  .summary{max-width:780px;margin:0 auto}
  .charts{max-width:780px;margin:0 auto}
  .phase-info{max-width:780px;margin:0 auto}
}
</style>
</head>
<body>

<header>
  <h1>Fusion 360 教科書 <span class="sub">v1 · 三輪允仁</span></h1>
  <div class="phase-tabs" id="phaseTabs"></div>
</header>

<div class="phase-info" id="phaseInfo"></div>
<div class="summary" id="summary"></div>
<div class="charts" id="charts"></div>
<div class="content" id="content"></div>

<div class="toolbar">
  <button onclick="exportJSON()">JSON書き出し</button>

</div>

// ===== ストレージ =====
const KEY = "fusion_textbook_v1";
function loadState(){ try{ return JSON.parse(localStorage.getItem(KEY)||"{}"); }catch(e){return {}} }
function saveState(s){ localStorage.setItem(KEY, JSON.stringify(s)); }
let state = loadState();
function getPhaseState(p){
  const k = String(p);
  state[k] = state[k] || {};
  return state[k];
}

// ===== 集計 =====
function tallyPhase(p){
  const ph = PHASES[p];
  const s = getPhaseState(p);
  const catStats = {};
  let total = 0, done = 0;
  Object.entries(ph.categories).forEach(([catKey, cat]) => {
    let cTotal = 0, cDone = 0;
    cat.items.forEach(([id]) => {
      cTotal++; total++;
      if(s[id]){ cDone++; done++; }
    });
    catStats[catKey] = {label: cat.label, total: cTotal, done: cDone};
  });
  let workTotal = 0, workDone = 0;
  ph.works.forEach(([id]) => {
    workTotal++; total++;
    if(s[id]){ workDone++; done++; }
  });
  return {total, done, pct: total?Math.round(100*done/total):0, catStats, workTotal, workDone};
}

function tallyAll(){
  let total=0, done=0;
  const perPhase = {};
  Object.keys(PHASES).forEach(p=>{
    const t = tallyPhase(p);
    total += t.total;
    done += t.done;
    perPhase[p] = t;
  });
  return {total, done, pct: total?Math.round(100*done/total):0, perPhase};
}

  renderTabs();

function renderTabs(){
  const el = document.getElementById("phaseTabs");
  el.innerHTML = "";

  Object.keys(PHASES).forEach(p=>{
    const ph = PHASES[p];
    const t = all.perPhase[p];

    b.innerHTML = `<span class="num">P${p}</span><span>${ph.name}</span><span class="pct">${t.pct}%</span>`;

    b.onclick = ()=>{ currentPhase=parseInt(p); render(); };

  }).join("");
  const workPct = t.workTotal ? Math.round(100*t.workDone/t.workTotal) : 0;
  const works = `<div class="cat-bar"><div class="lbl">ミニ作品</div><div class="b"><i style="width:${workPct}%"></i></div><div class="pct">${t.workDone}/${t.workTotal}</div></div>`;

// ===== 円グラフ =====
function pieSVG(segs, size=130){
  const total = segs.reduce((a,b)=>a+b.val,0);
  const r = size/2 - 4;
  const cx=size/2, cy=size/2;
  if(total===0) return `<svg viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#eee"/><text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#999" font-size="11">未達成</text></svg>`;
  let acc = -90;
  let parts = "";
  segs.forEach(s=>{
    if(s.val===0) return;
    const ang = 360*s.val/total;
    const start = acc, end = acc+ang;
    const x1 = cx + r*Math.cos(start*Math.PI/180);
    const y1 = cy + r*Math.sin(start*Math.PI/180);
    const x2 = cx + r*Math.cos(end*Math.PI/180);
    const y2 = cy + r*Math.sin(end*Math.PI/180);
    const large = ang>180?1:0;
    if(ang>=359.99){
      parts += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}"/>`;
    } else {
      parts += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${s.color}" stroke="#fff" stroke-width="2"/>`;
    }
    const mid = (start+end)/2;
    const lx = cx + r*0.6*Math.cos(mid*Math.PI/180);
    const ly = cy + r*0.6*Math.sin(mid*Math.PI/180);
    const pct = Math.round(100*s.val/total);
    if(pct>=8){
      parts += `<text x="${lx}" y="${ly}" fill="#fff" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle">${pct}%</text>`;
    }
    acc = end;
  });
  return `<svg viewBox="0 0 ${size} ${size}">${parts}</svg>`;
}

function legendHTML(segs){
  return `<div class="legend">${segs.filter(s=>s.val>0).map(s=>`<span><i style="background:${s.color}"></i>${s.name} ${s.val}</span>`).join("")}</div>`;
}

}

function renderContent(){

    const stat = t.catStats[catKey];

      const done = !!s[id];
      const stepsHTML = (steps && steps.length)
        ? `<details class="steps-box"><summary>📖 やり方</summary><ol class="steps">${steps.map(st=>`<li>${st}</li>`).join('')}</ol></details>`
        : '';
      return `<div class="item-wrap">
        <button class="item-chip ${done?'done':''}" onclick="toggleItem(${currentPhase},'${id}')">
          <div class="check-box">${done?'✓':''}</div>
          <div class="label"><b>${id}</b> ${label}</div>
        </button>${stepsHTML}
      </div>`;
    }).join("");
    html += `
      <div class="cat-group">
        <div class="cat-head">
          <span>${cat.label}</span>
          <span class="pct-mini">${stat.done}/${stat.total}</span>
        </div>
        <div class="cat-items">${items}</div>
      </div>
    `;
  });

  // ミニ作品
  const works = ph.works.map(([id, label, steps])=>{
    const done = !!s[id];
    const stepsHTML = (steps && steps.length)
      ? `<details class="steps-box"><summary>📖 やり方</summary><ol class="steps">${steps.map(st=>`<li>${st}</li>`).join('')}</ol></details>`
      : '';
    return `<div class="item-wrap">
      <button class="work-chip ${done?'done':''}" onclick="toggleItem(${currentPhase},'${id}')">
        <span>${done?'✓':'○'}</span><span class="label"><b>${id}</b> ${label}</span>
      </button>${stepsHTML}
    </div>`;
  }).join("");
  html += `
    <div class="works-card">
      <div class="works-head">★ ミニ作品（手を動かす）</div>
      <div class="works-items">${works}</div>
    </div>

  // 学びメモ
  const memo = s.__memo__ || "";

    <div class="memo-card">
      <h4>📝 学び・気づきメモ（自由記述）</h4>
      <textarea id="memoInput" placeholder="今日学んだこと・つまずいたこと・発明アイデア…" oninput="updateMemo(${currentPhase})">${memo}</textarea>

      📖 教科書本体: <a href="https://github.com/pasarinobuhito0409-droid/trip-shioris/blob/main/fusion-textbook/phase${currentPhase}.md" target="_blank">phase${currentPhase}.md</a>
      / <a href="https://github.com/pasarinobuhito0409-droid/trip-shioris/blob/main/fusion-textbook/roadmap.md" target="_blank">roadmap.md（全体MASTER）</a>
    </div>
  `;

  document.getElementById("content").innerHTML = html;
}

// ===== 操作 =====
function toggleItem(p, id){
  const s = getPhaseState(p);
  s[id] = !s[id];
  if(!s[id]) delete s[id];
  saveState(state);
  render();
}

function updateMemo(p){
  const v = document.getElementById("memoInput").value;
  const s = getPhaseState(p);
  s.__memo__ = v;
  if(!v) delete s.__memo__;
  saveState(state);
}

function updatePhoto(p){
  const v = document.getElementById("photoInput").value;
  const s = getPhaseState(p);
  s.__photo__ = v;
  if(!v) delete s.__photo__;
  saveState(state);
}

function resetPhase(){
  if(!confirm(`Phase ${currentPhase} の進捗を全消去します。よろしい？`)) return;
  delete state[String(currentPhase)];
  saveState(state);
  render();
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `fusion_textbook_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(){
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "application/json";
  inp.onchange = e=>{
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const data = JSON.parse(r.result);
        if(confirm("既存データを上書きします。よろしい？")){
          state = data;
          saveState(state);
          render();
        }
      }catch(err){ alert("JSON読込失敗: "+err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}
