<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>FIGHT LOG</title>
<style>
:root{
  --red:#ff3b2a;
  --red-glow:rgba(255,80,55,.55);
  --red-soft:rgba(255,110,80,.4);
  --gold:#ffd9a0;
  --ink:#050506;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;padding:0;background:var(--ink);color:#f2f0ee;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;
  overscroll-behavior-y:none;
  width:100%;
  min-height:100%;
}
body{
  touch-action:manipulation;
  position:relative;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}
input,textarea{user-select:text;-webkit-user-select:text}
button,.notselect{user-select:none;-webkit-user-select:none}
button{touch-action:manipulation;font-family:inherit}

.arena{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:var(--ink)}

.arena .crowd{
  position:absolute;left:0;right:0;top:0;height:42%;
  opacity:.9;
  will-change:transform;
  background-image:
    radial-gradient(circle 24px at 6% 18%, rgba(90,100,180,.24), transparent 70%),
    radial-gradient(circle 20px at 14% 30%, rgba(160,60,70,.20), transparent 70%),
    radial-gradient(circle 26px at 22% 12%, rgba(90,100,180,.22), transparent 70%),
    radial-gradient(circle 18px at 30% 26%, rgba(160,60,70,.18), transparent 70%),
    radial-gradient(circle 26px at 38% 16%, rgba(90,100,180,.22), transparent 70%),
    radial-gradient(circle 22px at 47% 8%, rgba(160,60,70,.20), transparent 70%),
    radial-gradient(circle 26px at 55% 20%, rgba(90,100,180,.22), transparent 70%),
    radial-gradient(circle 18px at 63% 10%, rgba(160,60,70,.18), transparent 70%),
    radial-gradient(circle 26px at 71% 24%, rgba(90,100,180,.22), transparent 70%),
    radial-gradient(circle 20px at 79% 14%, rgba(160,60,70,.20), transparent 70%),
    radial-gradient(circle 26px at 87% 28%, rgba(90,100,180,.22), transparent 70%),
    radial-gradient(circle 18px at 94% 16%, rgba(160,60,70,.18), transparent 70%),
    radial-gradient(circle 24px at 60% 32%, rgba(90,100,180,.20), transparent 70%),
    radial-gradient(circle 2px at 18% 22%, rgba(255,255,255,.9), transparent 75%),
    radial-gradient(circle 2px at 44% 14%, rgba(255,255,255,.85), transparent 75%),
    radial-gradient(circle 2px at 68% 26%, rgba(255,255,255,.9), transparent 75%),
    radial-gradient(circle 2px at 84% 10%, rgba(255,255,255,.8), transparent 75%);
  mask-image:linear-gradient(180deg,rgba(0,0,0,.95) 0%, rgba(0,0,0,.6) 70%, transparent 100%);
  -webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.95) 0%, rgba(0,0,0,.6) 70%, transparent 100%);
}

.arena .wash{
  position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(10,8,14,.35) 0%, rgba(5,5,6,.55) 45%, #050506 90%);
}

.arena .truss{
  position:absolute;left:6%;right:6%;top:0;height:5px;
  background:linear-gradient(90deg, transparent, rgba(210,210,220,.5) 10%, rgba(210,210,220,.5) 90%, transparent);
  box-shadow:0 0 10px rgba(200,200,220,.3);
}
.arena .lamp{position:absolute;top:2px;width:6px;height:6px;border-radius:50%;background:#fff8e0;
  box-shadow:0 0 16px 6px rgba(255,244,220,.85), 0 0 34px 14px rgba(255,200,120,.35)}
.arena .lamp.l1{left:22%}
.arena .lamp.l2{left:50%}
.arena .lamp.l3{left:78%}

.ray{
  position:absolute;top:0;height:78%;width:46%;
  clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);
  -webkit-clip-path:polygon(46% 0,54% 0,100% 100%,0 100%);
  background:linear-gradient(180deg, rgba(255,244,220,.24), transparent 85%);
  will-change:transform,opacity;
  transform-origin:top center;
}
.ray.center{left:50%;transform:translateX(-50%);opacity:.95;animation:swayC 11s ease-in-out infinite}
.ray.left{left:20%;transform:translateX(-50%) rotate(-16deg);opacity:.4;animation:swayL 13s ease-in-out infinite}
.ray.right{left:80%;transform:translateX(-50%) rotate(16deg);opacity:.4;animation:swayR 10s ease-in-out infinite}
@keyframes swayC{0%,100%{transform:translateX(-50%) rotate(0deg)}50%{transform:translateX(-50%) rotate(1.5deg)}}
@keyframes swayL{0%,100%{transform:translateX(-50%) rotate(-16deg)}50%{transform:translateX(-50%) rotate(-14.5deg)}}
@keyframes swayR{0%,100%{transform:translateX(-50%) rotate(16deg)}50%{transform:translateX(-50%) rotate(14.5deg)}}

.arena .cage{
  position:absolute;left:0;right:0;top:30%;height:34%;
  opacity:.8;
  background-image:
    repeating-linear-gradient(52deg, transparent 0 9px, rgba(255,255,255,.055) 9px 10px),
    repeating-linear-gradient(-52deg, transparent 0 9px, rgba(255,255,255,.055) 9px 10px);
  mask-image:linear-gradient(180deg, transparent 0%, rgba(0,0,0,.9) 22%, rgba(0,0,0,.9) 78%, transparent 100%);
  -webkit-mask-image:linear-gradient(180deg, transparent 0%, rgba(0,0,0,.9) 22%, rgba(0,0,0,.9) 78%, transparent 100%);
}
.arena .rail{
  position:absolute;left:0;right:0;top:30%;height:2px;
  background:rgba(255,80,55,.6);
  box-shadow:0 0 14px rgba(255,80,55,.45), 0 0 4px rgba(255,120,90,.6);
}
.arena .post{position:absolute;top:28%;width:6px;height:38%;background:rgba(40,20,20,.5);box-shadow:0 0 10px rgba(255,60,40,.25)}
.arena .post.p1{left:8%}
.arena .post.p2{left:92%}

.arena .floor{
  position:absolute;left:0;right:0;bottom:0;height:34%;
  clip-path:polygon(12% 0,88% 0,100% 100%,0 100%);
  -webkit-clip-path:polygon(12% 0,88% 0,100% 100%,0 100%);
  background:
    radial-gradient(ellipse 70% 60% at 50% 100%, rgba(120,20,20,.35), transparent 70%),
    linear-gradient(180deg, rgba(20,14,14,.9), rgba(8,6,6,.98));
}
.arena .floor::before{
  content:"";position:absolute;inset:0;opacity:.16;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  background-size:120px 120px;
}
.arena .emblem{
  position:absolute;left:50%;bottom:14%;transform:translateX(-50%);
  width:150px;height:150px;opacity:.16;
}

.ember{
  position:absolute;bottom:-10px;width:2px;height:2px;border-radius:50%;
  background:#ffb060;
  box-shadow:0 0 6px 2px rgba(255,150,70,.85), 0 0 12px 5px rgba(255,90,40,.4);
  will-change:transform,opacity;
  animation-name:emberRise, emberFlick;
  animation-timing-function:ease-in, linear;
  animation-iteration-count:infinite;
}
@keyframes emberRise{
  0%{transform:translate(0,0);opacity:0}
  8%{opacity:1}
  50%{transform:translate(8px,-52vh)}
  100%{transform:translate(-8px,-105vh);opacity:0}
}
@keyframes emberFlick{
  0%,100%{opacity:.9}
  50%{opacity:.35}
}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  box-shadow:inset 0 0 110px 34px rgba(0,0,0,.94);
}

body.scr-s1 .ray.center{opacity:1}
body.scr-s1 .crowd{opacity:.85}

body.scr-s2 .ray.center{opacity:1;filter:brightness(1.25)}
body.scr-s2 .ray.left,body.scr-s2 .ray.right{opacity:.22}
body.scr-s2 .crowd{opacity:.45}

body.scr-s4 .ray.center{opacity:.55}
body.scr-s4 .ray.left,body.scr-s4 .ray.right{opacity:.5}
body.scr-s4 .wash{background:linear-gradient(180deg, rgba(22,16,20,.3) 0%, rgba(10,8,10,.5) 45%, #0a0808 90%)}

.app{position:relative;z-index:2;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;padding:max(18px,env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom))}
.screen.active{display:flex}

.s1-top{text-align:center;letter-spacing:6px;font-size:11px;color:rgba(240,235,230,.55);font-weight:700;margin-top:6px}
.s1-event{text-align:center;color:var(--red);font-size:12px;font-weight:800;letter-spacing:3px;margin-top:10px;
  text-shadow:0 0 12px var(--red-glow), 0 0 26px rgba(255,60,40,.4)}
.s1-card{margin-top:22px;text-align:center}
.s1-name{font-size:31px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.25)}
.s1-vs{display:block;color:var(--red);font-size:14px;font-weight:900;letter-spacing:10px;margin:8px 0;
  text-shadow:0 0 14px var(--red-glow)}
.s1-rival{font-size:31px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.25)}

.plate{
  margin:26px auto 0;max-width:420px;width:100%;
  border:1.5px solid var(--red-soft);border-radius:14px;
  background:linear-gradient(160deg, rgba(30,14,14,.85), rgba(10,8,10,.92));
  box-shadow:0 0 22px rgba(255,70,50,.16), inset 0 1px 0 rgba(255,255,255,.06);
  padding:18px 18px 16px;
  position:relative;
}
.plate::before{
  content:"次回への伝言";
  display:block;font-size:10px;letter-spacing:3px;color:var(--red);font-weight:800;margin-bottom:10px;
  text-shadow:0 0 8px var(--red-glow);
}
.plate .msg{font-size:17px;line-height:1.55;font-weight:700;color:#fdf3ee}
.plate .insight{margin-top:12px;padding-top:10px;border-top:1px dashed rgba(255,255,255,.14);
  font-size:12.5px;color:rgba(240,232,226,.62);line-height:1.5;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.plate .insight.open{white-space:normal}

.s1-stats{display:flex;justify-content:center;gap:26px;margin-top:22px}
.s1-stats .stat{text-align:center}
.s1-stats .stat b{display:block;font-size:22px;font-weight:900;color:#fff}
.s1-stats .stat span{display:block;font-size:10.5px;color:rgba(240,232,226,.55);letter-spacing:1px;margin-top:2px}

.spacer{flex:1;min-height:14px}

.btn-enter{
  display:block;width:100%;max-width:420px;margin:0 auto;
  background:linear-gradient(180deg,#ff5540,var(--red) 60%,#c81e10);
  color:#fff;border:none;border-radius:16px;
  font-size:19px;font-weight:900;letter-spacing:3px;
  padding:20px 10px;min-height:60px;
  box-shadow:0 6px 22px rgba(255,60,40,.4), inset 0 1px 0 rgba(255,255,255,.25);
  cursor:pointer;
}
.btn-enter:active{transform:scale(.97)}

.s1-record-link{
  position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px;
  font-size:12px;color:rgba(240,232,226,.65);font-weight:700;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  border-radius:999px;padding:8px 14px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;
}
.s1-record-link:active{background:rgba(255,255,255,.12)}

.s2-head{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.s2-bars{flex:1;display:flex;gap:6px}
.s2-bars i{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.14);display:block}
.s2-bars i.on{background:var(--red);box-shadow:0 0 10px var(--red-glow)}
.s2-bars i.past{background:rgba(255,80,60,.45)}
.s2-round{font-size:12px;font-weight:800;color:#fff;letter-spacing:1px;white-space:nowrap}
.s2-timer{font-size:15px;font-weight:900;color:#fff;min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
.s2-timer.warn{color:var(--red);text-shadow:0 0 10px var(--red-glow)}
.s2-timer.over{color:var(--red);animation:pulseWarn 1s ease-in-out infinite}
@keyframes pulseWarn{0%,100%{opacity:1}50%{opacity:.4}}

.s2-q{font-size:20px;font-weight:900;color:#fff;text-align:center;margin:6px 0 22px;line-height:1.4}

.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{
  min-height:96px;border-radius:16px;border:1.5px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.04);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;
}
.tile .tt{font-size:17px;font-weight:900;color:#fff}
.tile .ts{font-size:9.5px;letter-spacing:1.5px;color:rgba(240,232,226,.5);font-weight:700}
.tile.on{
  background:linear-gradient(160deg, rgba(255,80,55,.35), rgba(180,20,10,.45));
  border-color:var(--red);
  box-shadow:0 0 20px rgba(255,60,40,.4), inset 0 1px 0 rgba(255,255,255,.15);
}
.tile.on .ts{color:rgba(255,220,210,.85)}
.tile:active{transform:scale(.96)}

.s2-body{flex:1;display:flex;flex-direction:column}

.input-big{
  width:100%;min-height:120px;border-radius:14px;
  border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);
  color:#fff;font-size:17px;padding:16px;font-family:inherit;line-height:1.5;
  resize:none;
}
.input-big::placeholder{color:rgba(240,232,226,.35)}
.input-big:focus{outline:none;border-color:var(--red-soft);box-shadow:0 0 0 3px rgba(255,60,40,.15)}

.mic-row{display:flex;justify-content:flex-end;margin-top:10px}
.mic-btn{
  min-width:52px;min-height:52px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);color:#fff;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.mic-btn.rec{background:var(--red);border-color:var(--red);box-shadow:0 0 18px rgba(255,60,40,.6);
  animation:micPulse 1s ease-in-out infinite}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.mic-btn:active{transform:scale(.92)}

.cond-grid{display:flex;flex-direction:column;gap:10px}
.cond-bar{
  min-height:58px;border-radius:14px;border:1.5px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;padding:0 20px;gap:14px;cursor:pointer;
}
.cond-bar .cn{font-size:20px;font-weight:900;color:#fff;width:22px}
.cond-bar .cl{font-size:14px;font-weight:700;color:rgba(240,232,226,.65)}
.cond-bar.on{
  background:linear-gradient(90deg, rgba(255,80,55,.4), rgba(180,20,10,.5));
  border-color:var(--red);box-shadow:0 0 18px rgba(255,60,40,.35);
}
.cond-bar.on .cl{color:#fff}
.cond-bar:active{transform:scale(.98)}

.btn-next{
  display:block;width:100%;margin-top:20px;
  background:rgba(255,255,255,.08);color:#fff;border:1.5px solid rgba(255,255,255,.2);
  border-radius:14px;font-size:16px;font-weight:800;letter-spacing:1px;
  padding:17px 10px;min-height:54px;cursor:pointer;
}
.btn-next:active{transform:scale(.97)}
.btn-next.primary{
  background:linear-gradient(180deg,#ff5540,var(--red) 60%,#c81e10);
  border-color:transparent;
  box-shadow:0 6px 20px rgba(255,60,40,.4);
  font-size:18px;letter-spacing:2px;
}

.s3-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.s3-card{
  width:100%;max-width:380px;border-radius:16px;border:1.5px solid rgba(255,255,255,.14);
  background:linear-gradient(160deg, rgba(20,14,14,.9), rgba(8,6,8,.95));
  padding:22px;position:relative;overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.s3-date{font-size:12px;color:rgba(240,232,226,.5);font-weight:700;letter-spacing:1px}
.s3-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.s3-tags span{font-size:11px;font-weight:800;color:#fff;background:rgba(255,60,40,.3);border:1px solid rgba(255,90,60,.5);
  border-radius:999px;padding:4px 10px}
.s3-insight{font-size:15px;font-weight:700;color:#fdf3ee;line-height:1.5}
.stamp{
  position:absolute;top:50%;left:50%;
  border:2.5px solid var(--red);color:var(--red);
  font-size:30px;font-weight:900;letter-spacing:3px;
  padding:8px 18px;border-radius:6px;
  transform:translate(-50%,-50%) rotate(-12deg) scale(2.6);
  opacity:0;
  text-shadow:0 0 10px var(--red-glow);
  box-shadow:0 0 22px rgba(255,60,40,.35);
  background:rgba(5,5,6,.35);
  animation:stampIn .35s cubic-bezier(.2,1.4,.4,1) .12s forwards;
}
@keyframes stampIn{
  0%{transform:translate(-50%,-50%) rotate(-12deg) scale(2.6);opacity:0}
  60%{opacity:1}
  100%{transform:translate(-50%,-50%) rotate(-12deg) scale(1);opacity:1}
}

.s4-back{font-size:13px;color:rgba(240,232,226,.6);font-weight:700;margin-bottom:18px;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;min-height:44px;padding:6px 4px}
.s4-record{text-align:center;margin-bottom:22px}
.s4-record b{font-size:40px;font-weight:900;color:#fff;text-shadow:0 0 16px rgba(255,255,255,.2)}
.s4-record span{display:block;font-size:11px;letter-spacing:2px;color:rgba(240,232,226,.5);margin-top:4px;font-weight:700}

.s4-list{display:flex;flex-direction:column;gap:10px}
.s4-item{
  border-radius:14px;border:1.5px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);padding:14px 16px;cursor:pointer;
}
.s4-item .row1{display:flex;justify-content:space-between;align-items:center;gap:8px}
.s4-item .date{font-size:11px;color:rgba(240,232,226,.5);font-weight:700}
.s4-item .cond-chip{font-size:11px;font-weight:900;padding:2px 9px;border-radius:999px;color:#fff}
.s4-item .tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.s4-item .tagrow span{font-size:10px;font-weight:800;color:#fff;background:rgba(255,60,40,.28);
  border:1px solid rgba(255,90,60,.4);border-radius:999px;padding:3px 9px}
.s4-item .insight{font-size:14.5px;color:#fff;font-weight:700;margin-top:9px;line-height:1.45;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s4-item.open .insight{white-space:normal}
.s4-item .kadai{font-size:12.5px;color:rgba(240,232,226,.68);margin-top:8px;padding-left:10px;
  border-left:2px solid var(--red);line-height:1.4}
.s4-item .expand{max-height:0;overflow:hidden;transition:max-height .25s ease}
.s4-item.open .expand{max-height:200px;margin-top:10px}
.s4-item .del-btn{
  width:100%;margin-top:10px;background:rgba(255,60,40,.14);border:1px solid rgba(255,80,60,.4);
  color:#ffb0a0;border-radius:10px;padding:11px;font-size:12.5px;font-weight:800;cursor:pointer;min-height:44px;
}
.s4-item .del-btn:active{background:rgba(255,60,40,.26)}
.s4-empty{text-align:center;padding:40px 16px;color:rgba(240,232,226,.5);font-size:13px;line-height:1.6}

@media (min-width:600px){
  .screen{align-items:center}
  .screen > *{width:100%;max-width:480px}
  .tile-grid{max-width:480px}
}
</style>
</head>
<body class="scr-s1">

<div class="arena">
  <div class="crowd"></div>
  <div class="wash"></div>
  <div class="truss"></div>
  <div class="lamp l1"></div>
  <div class="lamp l2"></div>
  <div class="lamp l3"></div>
  <div class="ray left"></div>
  <div class="ray center"></div>
  <div class="ray right"></div>
  <div class="cage"></div>
  <div class="rail"></div>
  <div class="post p1"></div>
  <div class="post p2"></div>
  <div class="floor">
    <svg class="emblem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,4 79,18 93,47 79,76 50,90 21,76 7,47 21,18" fill="none" stroke="#ff5540" stroke-width="1.4"/>
      <text x="50" y="54" text-anchor="middle" font-size="13" font-weight="900" fill="#ff5540" font-family="sans-serif" letter-spacing="1">FIGHT</text>
    </svg>
  </div>
  <div id="emberField"></div>
</div>
<div class="vignette"></div>

<div class="app">

  <section class="screen active" id="screen-s1">
    <div class="s1-record-link" id="btnGoS4" role="button">戦績 ›</div>
    <div class="s1-top">FIGHT LOG</div>
    <div class="s1-event">TONIGHT'S MAIN EVENT</div>
    <div class="s1-card">
      <div class="s1-name">三輪 允仁</div>
      <span class="s1-vs">VS</span>
      <div class="s1-rival">昨日の自分</div>
    </div>

    <div class="plate">
      <div class="msg" id="plateMsg">初陣だ。まずは1本記録しろ。</div>
      <div class="insight" id="plateInsight" style="display:none"></div>
    </div>

    <div class="s1-stats">
      <div class="stat"><b id="statCount">0戦</b><span>TOTAL FIGHTS</span></div>
      <div class="stat"><b id="statGap">デビュー戦</b><span>SINCE LAST</span></div>
    </div>

    <div class="spacer"></div>
    <button class="btn-enter" id="btnEnter">入場する</button>
  </section>

  <section class="screen" id="screen-s2">
    <div class="s2-head">
      <div class="s2-bars">
        <i data-r="1"></i><i data-r="2"></i><i data-r="3"></i><i data-r="4"></i>
      </div>
      <div class="s2-round" id="s2RoundLabel">ROUND 1 / 4</div>
      <div class="s2-timer" id="s2Timer">0:30</div>
    </div>

    <div class="s2-body">

      <div class="round-pane" id="pane-r1">
        <div class="s2-q">今日、何で闘った？</div>
        <div class="tile-grid" id="tagTiles">
          <div class="tile" data-tag="打撃"><div class="tt">打撃</div><div class="ts">STRIKING</div></div>
          <div class="tile" data-tag="寝技"><div class="tt">寝技</div><div class="ts">GROUND</div></div>
          <div class="tile" data-tag="タックル"><div class="tt">タックル</div><div class="ts">WRESTLING</div></div>
          <div class="tile" data-tag="スパー"><div class="tt">スパー</div><div class="ts">SPARRING</div></div>
          <div class="tile" data-tag="ドリル"><div class="tt">ドリル</div><div class="ts">DRILL</div></div>
          <div class="tile" data-tag="フィジカル"><div class="tt">フィジカル</div><div class="ts">PHYSICAL</div></div>
        </div>
        <button class="btn-next" id="btnR1Next">次へ</button>
      </div>

      <div class="round-pane" id="pane-r2" style="display:none">
        <div class="s2-q">気づきを1行</div>
        <textarea class="input-big" id="insightInput" placeholder="例：ジャブの距離が近かった"></textarea>
        <div class="mic-row" id="micRowInsight" style="display:none">
          <button class="mic-btn" id="micInsight">🎤</button>
        </div>
        <button class="btn-next" id="btnR2Next">次へ</button>
      </div>

      <div class="round-pane" id="pane-r3" style="display:none">
        <div class="s2-q">コンディション</div>
        <div class="cond-grid" id="condGrid">
          <div class="cond-bar" data-v="1"><span class="cn">1</span><span class="cl">かなり悪い</span></div>
          <div class="cond-bar" data-v="2"><span class="cn">2</span><span class="cl">やや悪い</span></div>
          <div class="cond-bar" data-v="3"><span class="cn">3</span><span class="cl">ふつう</span></div>
          <div class="cond-bar" data-v="4"><span class="cn">4</span><span class="cl">やや良い</span></div>
          <div class="cond-bar" data-v="5"><span class="cn">5</span><span class="cl">絶好調</span></div>
        </div>
      </div>

      <div class="round-pane" id="pane-r4" style="display:none">
        <div class="s2-q">次回の課題を1個</div>
        <textarea class="input-big" id="kadaiInput" placeholder="例：距離を測ってから踏み込む"></textarea>
        <div class="mic-row" id="micRowKadai" style="display:none">
          <button class="mic-btn" id="micKadai">🎤</button>
        </div>
        <button class="btn-next primary" id="btnGong">ゴング（保存）</button>
      </div>

    </div>
  </section>

  <section class="screen" id="screen-s3">
    <div class="s3-wrap">
      <div class="s3-card">
        <div class="s3-date" id="s3Date"></div>
        <div class="s3-tags" id="s3Tags"></div>
        <div class="s3-insight" id="s3Insight"></div>
        <div class="stamp">LOGGED</div>
      </div>
    </div>
  </section>

  <section class="screen" id="screen-s4">
    <div class="s4-back" id="btnBackS1">‹ 入場画面へ</div>
    <div class="s4-record">
      <b id="s4Record">0勝 0敗</b>
      <span>サボりゼロ継続中</span>
    </div>
    <div class="s4-list" id="s4List"></div>
  </section>

</div>

<script>
(function(){
"use strict";

var FL_KEY = "fightlog_v1";
var TR_KEY = "tracker2026_v2";
var ROUND_SECONDS = 30;

function loadFL(){
  try{
    var raw = localStorage.getItem(FL_KEY);
    var parsed = raw ? JSON.parse(raw) : null;
    if(!parsed || typeof parsed !== "object" || !Array.isArray(parsed.sessions)){
      return { sessions: [] };
    }
    return parsed;
  }catch(e){
    return { sessions: [] };
  }
}
function saveFL(data){
  try{
    localStorage.setItem(FL_KEY, JSON.stringify(data));
  }catch(e){}
}

var flData = loadFL();

(function migrateFromOld(){
  try{
    var oldRaw = localStorage.getItem("mma_log_v1");
    if(!oldRaw) return;
    var old = JSON.parse(oldRaw);
    if(!old || !Array.isArray(old.logs) || old.logs.length === 0) return;

    var existDates = {};
    flData.sessions.forEach(function(s){ existDates[s.date] = true; });

    var catMap = {strike:"打撃",clinch:"タックル",ground:"寝技",spar:"スパー",strategy:"ドリル",part:"ドリル"};

    var byDate = {};
    old.logs.forEach(function(log){
      if(!log.date) return;
      if(!byDate[log.date]) byDate[log.date] = [];
      byDate[log.date].push(log);
    });

    var added = 0;
    Object.keys(byDate).sort().forEach(function(date){
      if(existDates[date]) return;
      var logs = byDate[date];
      var tags = [];
      var texts = [];
      logs.forEach(function(log){
        if(log.cat && catMap[log.cat]){
          var tag = catMap[log.cat];
          if(tags.indexOf(tag) === -1) tags.push(tag);
        }
        if(log.text && log.cat !== "part") texts.push(log.text);
      });
      var cond = 3;
      var kadai = "";
      if(old.daily && old.daily[date]){
        if(old.daily[date].focusScore) cond = old.daily[date].focusScore;
        if(old.daily[date].focus) kadai = old.daily[date].focus;
      }
      flData.sessions.push({
        id: "s_m_" + date.replace(/-/g,""),
        date: date,
        tags: tags,
        insight: texts.join("／"),
        cond: cond,
        kadai: kadai,
        ts: new Date(date + "T12:00:00").getTime()
      });
      added++;
    });

    if(added > 0){
      flData.sessions.sort(function(a,b){ return a.ts - b.ts; });
      saveFL(flData);
    }
  }catch(e){}
})();

function pad2(n){ return n < 10 ? "0" + n : String(n); }
function todayISO(){
  var d = new Date();
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
}
function daysBetween(iso1, iso2){
  var a = new Date(iso1 + "T00:00:00");
  var b = new Date(iso2 + "T00:00:00");
  var ms = b.getTime() - a.getTime();
  return Math.round(ms / 86400000);
}

function vibrate(pattern){
  try{
    if(navigator.vibrate){ navigator.vibrate(pattern); }
  }catch(e){}
}

function syncToTracker(session){
  try{
    var raw = localStorage.getItem(TR_KEY);
    var state = raw ? JSON.parse(raw) : {};
    if(!state || typeof state !== "object"){ state = {}; }

    var now = new Date();
    var y = now.getFullYear();
    var m = now.getMonth() + 1;
    var d = now.getDate();
    var key = (y === 2026) ? (m + "-" + d) : (y + "-" + m + "-" + d);

    var dayState = state[key];
    if(!dayState || typeof dayState !== "object"){ dayState = {}; }

    if(!Array.isArray(dayState.__custom__)){ dayState.__custom__ = []; }

    var label = "MMA（練習ログ）";
    var existing = null;
    for(var i=0; i<dayState.__custom__.length; i++){
      if(dayState.__custom__[i] && dayState.__custom__[i].label === label){
        existing = dayState.__custom__[i];
        break;
      }
    }

    var taskId;
    if(existing){
      taskId = existing.id;
    } else {
      taskId = "c_fightlog_" + Date.now();
      dayState.__custom__.push({
        id: taskId,
        label: label,
        cat: "custom",
        start: "19:00",
        end: "21:00",
        color: "#c850dc"
      });
    }

    dayState[taskId] = true;
    state[key] = dayState;

    localStorage.setItem(TR_KEY, JSON.stringify(state));
  }catch(e){
    
  }
}

var screens = {
  s1: document.getElementById("screen-s1"),
  s2: document.getElementById("screen-s2"),
  s3: document.getElementById("screen-s3"),
  s4: document.getElementById("screen-s4")
};
function showScreen(name){
  Object.keys(screens).forEach(function(k){
    screens[k].classList.toggle("active", k === name);
  });
  document.body.classList.remove("scr-s1","scr-s2","scr-s3","scr-s4");
  document.body.classList.add("scr-" + name);
}

function renderS1(){
  var sessions = flData.sessions;
  var count = sessions.length;
  document.getElementById("statCount").textContent = count + "戦";

  var gapEl = document.getElementById("statGap");
  if(count === 0){
    gapEl.textContent = "デビュー戦";
  } else {
    var last = sessions[sessions.length - 1];
    var gap = daysBetween(last.date, todayISO());
    if(gap < 0) gap = 0;
    gapEl.textContent = "中" + gap + "日";
  }

  var plateMsg = document.getElementById("plateMsg");
  var plateInsight = document.getElementById("plateInsight");
  if(count === 0){
    plateMsg.textContent = "初陣だ。まずは1本記録しろ。";
    plateInsight.style.display = "none";
  } else {
    var last2 = sessions[sessions.length - 1];
    plateMsg.textContent = last2.kadai && last2.kadai.trim() ? last2.kadai : "特になし。今日も1本刻め。";
    if(last2.insight && last2.insight.trim()){
      plateInsight.textContent = "前回の気づき：" + last2.insight;
      plateInsight.style.display = "block";
      plateInsight.classList.remove("open");
    } else {
      plateInsight.style.display = "none";
    }
  }
}
document.getElementById("plateInsight").addEventListener("click", function(){
  this.classList.toggle("open");
});

var roundState = {
  tags: [],
  insight: "",
  cond: 0,
  kadai: ""
};
var currentRound = 1;
var timerHandle = null;
var timerRemain = ROUND_SECONDS;

function resetRoundState(){
  roundState = { tags: [], insight: "", cond: 0, kadai: "" };
  currentRound = 1;
  document.querySelectorAll(".tile").forEach(function(t){ t.classList.remove("on"); });
  document.querySelectorAll(".cond-bar").forEach(function(c){ c.classList.remove("on"); });
  document.getElementById("insightInput").value = "";
  document.getElementById("kadaiInput").value = "";
}

function updateProgressBars(){
  document.querySelectorAll(".s2-bars i").forEach(function(bar){
    var r = parseInt(bar.getAttribute("data-r"), 10);
    bar.classList.remove("on","past");
    if(r === currentRound){ bar.classList.add("on"); }
    else if(r < currentRound){ bar.classList.add("past"); }
  });
  document.getElementById("s2RoundLabel").textContent = "ROUND " + currentRound + " / 4";
}

function showRound(n){
  currentRound = n;
  ["r1","r2","r3","r4"].forEach(function(key, idx){
    var pane = document.getElementById("pane-" + key);
    pane.style.display = (idx + 1 === n) ? "block" : "none";
  });
  updateProgressBars();
  if(n === 1){
    startTimer();
  }
}

function startTimer(){
  stopTimer();
  timerRemain = ROUND_SECONDS;
  renderTimer();
  timerHandle = setInterval(function(){
    timerRemain--;
    if(timerRemain <= 0){
      timerRemain = 0;
      renderTimer();
      stopTimer();
      return;
    }
    renderTimer();
  }, 1000);
}
function stopTimer(){
  if(timerHandle){ clearInterval(timerHandle); timerHandle = null; }
}
function renderTimer(){
  var el = document.getElementById("s2Timer");
  if(timerRemain <= 0){
    el.textContent = "延長戦";
    el.classList.add("over");
    el.classList.remove("warn");
  } else {
    var s = pad2(timerRemain % 60);
    el.textContent = "0:" + s;
    el.classList.toggle("warn", timerRemain <= 10);
    el.classList.remove("over");
  }
}

document.querySelectorAll(".tile").forEach(function(tile){
  tile.addEventListener("click", function(){
    var tag = tile.getAttribute("data-tag");
    var idx = roundState.tags.indexOf(tag);
    if(idx === -1){
      roundState.tags.push(tag);
      tile.classList.add("on");
    } else {
      roundState.tags.splice(idx, 1);
      tile.classList.remove("on");
    }
    vibrate(15);
  });
});

document.getElementById("btnR1Next").addEventListener("click", function(){
  showRound(2);
});

document.getElementById("btnR2Next").addEventListener("click", function(){
  roundState.insight = document.getElementById("insightInput").value.trim();
  showRound(3);
});

var condAdvanceLock = false;
document.querySelectorAll(".cond-bar").forEach(function(bar){
  bar.addEventListener("click", function(){
    if(condAdvanceLock) return;
    condAdvanceLock = true;
    var v = parseInt(bar.getAttribute("data-v"), 10);
    roundState.cond = v;
    document.querySelectorAll(".cond-bar").forEach(function(b){ b.classList.remove("on"); });
    bar.classList.add("on");
    vibrate(15);
    setTimeout(function(){
      condAdvanceLock = false;
      showRound(4);
    }, 250);
  });
});

document.getElementById("btnGong").addEventListener("click", function(){
  roundState.kadai = document.getElementById("kadaiInput").value.trim();
  doSave();
});

function setupMic(btnId, targetInputId, rowId){
  var SR = window.webkitSpeechRecognition || window.SpeechRecognition;
  var row = document.getElementById(rowId);
  if(!SR){
    row.style.display = "none";
    return;
  }
  row.style.display = "flex";
  var btn = document.getElementById(btnId);
  var recognition = null;
  var listening = false;

  btn.addEventListener("click", function(){
    if(listening){
      if(recognition){ try{ recognition.stop(); }catch(e){} }
      return;
    }
    try{
      recognition = new SR();
      recognition.lang = "ja-JP";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = function(){
        listening = true;
        btn.classList.add("rec");
      };
      recognition.onresult = function(evt){
        var input = document.getElementById(targetInputId);
        var transcript = "";
        for(var i=0; i<evt.results.length; i++){
          transcript += evt.results[i][0].transcript;
        }
        var existing = input.value;
        input.value = existing ? (existing + transcript) : transcript;
      };
      recognition.onerror = function(){
        listening = false;
        btn.classList.remove("rec");
      };
      recognition.onend = function(){
        listening = false;
        btn.classList.remove("rec");
      };
      recognition.start();
    }catch(e){
      listening = false;
      btn.classList.remove("rec");
    }
  });
}
setupMic("micInsight", "insightInput", "micRowInsight");
setupMic("micKadai", "kadaiInput", "micRowKadai");

function doSave(){
  stopTimer();
  var session = {
    id: "s_" + Date.now(),
    date: todayISO(),
    tags: roundState.tags.slice(),
    insight: roundState.insight,
    cond: roundState.cond,
    kadai: roundState.kadai,
    ts: Date.now()
  };
  flData.sessions.push(session);
  saveFL(flData);
  syncToTracker(session);

  vibrate([60,40,60,40,120]);
  renderS3(session);
  showScreen("s3");

  setTimeout(function(){
    renderS4();
    showScreen("s4");
  }, 1200);
}

function renderS3(session){
  document.getElementById("s3Date").textContent = session.date;
  var tagsEl = document.getElementById("s3Tags");
  tagsEl.innerHTML = "";
  session.tags.forEach(function(tag){
    var span = document.createElement("span");
    span.textContent = tag;
    tagsEl.appendChild(span);
  });
  document.getElementById("s3Insight").textContent = session.insight || "（気づきなし）";
}

var openedId = null;

function condColor(v){
  if(v <= 1) return "#ff5050";
  if(v === 2) return "#ff8c3c";
  if(v === 3) return "#ffc850";
  if(v === 4) return "#8cdc64";
  return "#50c878";
}

function renderS4(){
  var sessions = flData.sessions;
  var count = sessions.length;
  document.getElementById("s4Record").textContent = count + "勝 0敗";

  var listEl = document.getElementById("s4List");
  listEl.innerHTML = "";

  if(count === 0){
    var empty = document.createElement("div");
    empty.className = "s4-empty";
    empty.textContent = "まだ記録がない。入場して1本目を刻め。";
    listEl.appendChild(empty);
    return;
  }

  var ordered = sessions.slice().reverse();
  ordered.forEach(function(s){
    var item = document.createElement("div");
    item.className = "s4-item";
    if(openedId === s.id){ item.classList.add("open"); }

    var row1 = document.createElement("div");
    row1.className = "row1";
    var dateEl = document.createElement("span");
    dateEl.className = "date";
    dateEl.textContent = s.date;
    var condChip = document.createElement("span");
    condChip.className = "cond-chip";
    condChip.style.background = condColor(s.cond || 3);
    condChip.style.color = (s.cond === 3) ? "#5a4500" : "#fff";
    condChip.textContent = "C" + (s.cond || "-");
    row1.appendChild(dateEl);
    row1.appendChild(condChip);
    item.appendChild(row1);

    if(s.tags && s.tags.length){
      var tagrow = document.createElement("div");
      tagrow.className = "tagrow";
      s.tags.forEach(function(tag){
        var sp = document.createElement("span");
        sp.textContent = tag;
        tagrow.appendChild(sp);
      });
      item.appendChild(tagrow);
    }

    if(s.insight){
      var insightEl = document.createElement("div");
      insightEl.className = "insight";
      insightEl.textContent = s.insight;
      item.appendChild(insightEl);
    }

    var expand = document.createElement("div");
    expand.className = "expand";

    if(s.kadai){
      var kadaiEl = document.createElement("div");
      kadaiEl.className = "kadai";
      kadaiEl.textContent = "次回の課題：" + s.kadai;
      expand.appendChild(kadaiEl);
    }

    var delBtn = document.createElement("button");
    delBtn.className = "del-btn";
    delBtn.textContent = "この記録を削除";
    delBtn.addEventListener("click", function(evt){
      evt.stopPropagation();
      if(window.confirm("この記録を削除しますか？")){
        deleteSession(s.id);
      }
    });
    expand.appendChild(delBtn);

    item.appendChild(expand);

    item.addEventListener("click", function(){
      openedId = (openedId === s.id) ? null : s.id;
      renderS4();
    });

    listEl.appendChild(item);
  });
}

function deleteSession(id){
  flData.sessions = flData.sessions.filter(function(s){ return s.id !== id; });
  saveFL(flData);
  openedId = null;
  renderS4();
}

document.getElementById("btnEnter").addEventListener("click", function(){
  resetRoundState();
  showRound(1);
  showScreen("s2");
});
document.getElementById("btnGoS4").addEventListener("click", function(){
  renderS4();
  showScreen("s4");
});
document.getElementById("btnBackS1").addEventListener("click", function(){
  renderS1();
  showScreen("s1");
});

(function spawnEmbers(){
  var field = document.getElementById("emberField");
  var count = 8;
  for(var i=0; i<count; i++){
    var e = document.createElement("div");
    e.className = "ember";
    var leftPct = 8 + Math.random() * 84;
    var dur = 12 + Math.random() * 8;
    var delay = Math.random() * dur;
    e.style.left = leftPct + "%";
    e.style.animationDuration = dur + "s, " + (2 + Math.random()*2) + "s";
    e.style.animationDelay = "-" + delay + "s, -" + (Math.random()*2) + "s";
    field.appendChild(e);
  }
})();

renderS1();
showScreen("s1");

})();
</script>
</body>
</html>
