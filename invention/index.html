<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発明クエスト — 1つずつクリアして夢へ</title>
<style>
:root{
  --bg:#0e1326; --card:#1a2138; --card2:#212a47; --line:#2e3a5c;
  --text:#eaf0ff; --muted:#8da3c8; --accent:#5a8dff; --gold:#ffd479;
  --p0:#5ab4ff; --p1:#34c759; --p2:#c850dc; --p3:#ffa0b4;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN",system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 50% -10%,#1b2547 0%,#0e1326 60%);color:var(--text);
  -webkit-font-smoothing:antialiased;padding:0 0 48px}
header{padding:16px 14px 6px}
h1{margin:0;font-size:17px;font-weight:800}
h1 .sub{font-size:11px;color:var(--muted);font-weight:600;margin-left:6px}
.north{margin:8px 14px 0;font-size:11.5px;color:var(--gold);line-height:1.5;font-weight:600}
.wrap{padding:10px 14px 0;max-width:560px;margin:0 auto}

.sec{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:12px}
.sec h3{margin:0 0 11px;font-size:12.5px;color:var(--muted);font-weight:800;letter-spacing:.5px}

/* 今のクエスト（大カード） */
.now-card{background:linear-gradient(135deg,#2a3768,#1a2138);border:2px solid var(--gold);
  border-radius:18px;padding:17px;margin-bottom:14px;box-shadow:0 0 28px rgba(255,212,121,.13)}
.now-card .lbl{font-size:10.5px;color:var(--gold);font-weight:800;letter-spacing:1.5px}
.now-card .ph{display:inline-block;font-size:10px;font-weight:800;padding:2px 9px;border-radius:8px;margin-top:8px;color:#0e1326}
.now-card .ttl{font-size:21px;font-weight:900;line-height:1.3;margin-top:9px}
.now-card .prog{height:15px;background:#0c1124;border-radius:999px;overflow:hidden;margin-top:13px;border:1px solid var(--line)}
.now-card .prog i{display:block;height:100%;background:var(--gold);border-radius:999px;transition:width .4s}
.now-card .pnum{font-size:12px;color:var(--muted);margin-top:7px;font-weight:700;text-align:right}
.now-card .next{font-size:11.5px;color:var(--muted);margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.clear-btn{width:100%;margin-top:13px;background:var(--gold);color:#3a2a00;border:none;border-radius:11px;
  padding:13px;font-size:15px;font-weight:900;cursor:pointer}
.clear-btn:active{transform:scale(.98)}

/* 種タンク */
.seed-input{display:flex;gap:6px;margin:12px 0 9px}
.seed-input input{flex:1;background:#0c1124;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px;font:inherit;font-size:13px}
.seed-input button{flex:0 0 48px;background:var(--gold);color:#3a2a00;border:none;border-radius:9px;font-size:22px;font-weight:800;cursor:pointer}
.seed{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,.07)}
.seed:last-child{border-bottom:none}
.seed .sc{flex:0 0 21px;height:21px;border-radius:6px;border:2px solid var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.seed.done .sc{background:var(--p1);border-color:var(--p1)}
.seed.done .st{text-decoration:line-through;opacity:.5}
.seed .st{flex:1;font-size:13px;line-height:1.45}
.seed .sd{flex:0 0 26px;color:var(--muted);cursor:pointer;font-size:18px;text-align:center}
.seed-empty{font-size:12px;color:var(--muted);padding:6px 2px;line-height:1.5}

/* すごろくの道 */
.qph{font-size:11.5px;font-weight:800;margin:14px 0 8px;letter-spacing:.5px}
.qph:first-child{margin-top:0}
.qnode{display:flex;align-items:center;gap:12px;position:relative;padding:3px 0}
.qnode .qm{flex:0 0 28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;background:#27325a;color:var(--muted);z-index:1}
.qnode.done .qm{background:var(--p1);color:#fff}
.qnode.now .qm{color:#0e1326;box-shadow:0 0 0 4px rgba(255,212,121,.2);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(255,212,121,.18)}50%{box-shadow:0 0 0 7px rgba(255,212,121,.05)}}
.qnode::before{content:"";position:absolute;left:13.5px;top:-9px;width:2px;height:11px;background:var(--line)}
.qnode:first-of-type::before{display:none}
.qnode .qlb{flex:1;font-size:13.5px;padding:8px 0;line-height:1.4}
.qnode.future .qlb{color:var(--muted)}
.qnode.done .qlb{opacity:.6}
.qnode.now .qlb{font-weight:800;color:var(--gold)}
.qclear{font-size:10px;background:#27325a;color:var(--gold);padding:1px 7px;border-radius:7px;font-weight:800;margin-left:4px}
.qgoal{margin-top:14px;text-align:center;font-size:15px;font-weight:900;color:var(--gold);
  background:#27325a;border-radius:12px;padding:14px;border:1px solid var(--line)}

/* レーダー */
.radar-wrap{display:flex;justify-content:center}
.radar-wrap svg{width:100%;max-width:280px;height:auto}
.lv-mini{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.lv-chip{font-size:11px;background:#27325a;border-radius:8px;padding:5px 9px;font-weight:700}
.lv-chip b{color:var(--gold)}

/* 毎日 */
.daily-item{font-size:12.5px;padding:6px 0 6px 20px;position:relative;line-height:1.5}
.daily-item::before{content:"☀";position:absolute;left:0;color:var(--gold)}

.tools{display:flex;gap:8px}
.tools button,.tools label{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.foot{text-align:center;font-size:10.5px;color:var(--muted);margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<header>
  <h1>🚀 発明クエスト <span class="sub">v3 · 三輪允仁</span></h1>
  <div class="north" id="north"></div>
</header>

<div class="wrap" id="wrap"></div>

<script>
const C = ["#5ab4ff","#34c759","#c850dc","#ffa0b4"];
const PHN = ["第1期 土台（36〜41歳）","第2期 お金（41〜51歳）","第3期 参戦（51〜66歳）","第4期 魔法（66歳〜）"];
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const DATA = {
  north: "北極星：一生 研究と発明だけで生きる。5大発明でSFを現実にする。",
  quests: [
    {id:"q1", ph:0, label:"種を10個 集める", seed:true},
    {id:"q2", ph:0, label:"最初の1発を決める（特許×コスパ×わくわく）"},
    {id:"q3", ph:0, label:"試作1号を作る"},
    {id:"q4", ph:0, label:"特許を調べる・出す"},
    {id:"q5", ph:0, label:"発明で初収入を得る", clear:"第1期クリア"},
    {id:"q6", ph:1, label:"投資の基礎を学ぶ"},
    {id:"q7", ph:1, label:"特許収入を投資に回す"},
    {id:"q8", ph:1, label:"収入の柱を3本にする"},
    {id:"q9", ph:1, label:"経済的自由に到達（働かなくていい）", clear:"第2期クリア"},
    {id:"q10", ph:2, label:"大学で学ぶ（生物・物理・工学）"},
    {id:"q11", ph:2, label:"不老の研究装置を作る"},
    {id:"q12", ph:2, label:"5大発明の研究開発に着手", clear:"第3期クリア"},
    {id:"q13", ph:3, label:"5大発明を達成する", clear:"★夢クリア★"},
  ],
  daily: ["算数15分（もうやってる）","Fusion教科書を火・土に進める","「面倒×わくわく」を種タンクにメモ"],
  level7: [
    ["設計", 7, "基本部品は1人で設計可・最大の武器"],
    ["学力", 2.5, "算数1年継続中・英語ほぼゼロ"],
    ["お金", 6, "固定費月¥55k・投資10%・収入安定"],
    ["時間", 3.5, "火1h＋土半日。2027.4で激増"],
    ["健康", 8, "36歳・睡眠8h・体力高い"],
    ["人脈", 4, "妻が応援・発明仲間はこれから"],
    ["継続", 6.5, "わくわく×見える化で続く"],
  ],
};

const KEY = "life_roadmap_v1";
let state = JSON.parse(localStorage.getItem(KEY) || "{}");
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

// 種タンク
function addSeed(){
  const inp=document.getElementById('seedInput'); const v=(inp.value||"").trim();
  if(!v) return;
  if(!state.__seeds__) state.__seeds__=[];
  state.__seeds__.push({t:v,done:false}); inp.value=''; save(); render();
  const ni=document.getElementById('seedInput'); if(ni) ni.focus();
}
function toggleSeed(i){ state.__seeds__[i].done=!state.__seeds__[i].done; save(); render(); }
function delSeed(i){ state.__seeds__.splice(i,1); save(); render(); }
function seedDoneCount(){ return (state.__seeds__||[]).filter(s=>s.done).length; }

// クエスト
function isQuestDone(q){
  if(q.seed) return state[q.id]===true || seedDoneCount()>=10;
  return state[q.id]===true;
}
function currentQuest(){ return DATA.quests.find(q=>!isQuestDone(q)) || null; }
function clearQuest(id){ state[id]=true; save(); render(); window.scrollTo({top:0,behavior:'smooth'}); }
function allClearedPct(){
  const d=DATA.quests.filter(isQuestDone).length;
  return Math.round(d/DATA.quests.length*100);
}

// バックアップ
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='hatsumei_quest_backup.json'; a.click();
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try{ state=JSON.parse(e.target.result); save(); render(); }catch(x){ alert('読み込み失敗'); } };
  r.readAsText(f); ev.target.value='';
}

function radarSVG(){
  const labs=DATA.level7.map(l=>l[0]), vals=DATA.level7.map(l=>l[1]);
  const cx=130,cy=125,r=80,n=7;
  const pt=(i,rad)=>{const a=-Math.PI/2+i*2*Math.PI/n;return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)];};
  let grid='';
  [0.25,0.5,0.75,1].forEach(f=>{
    const p=[...Array(n)].map((_,i)=>pt(i,r*f).join(',')).join(' ');
    grid+=`<polygon points="${p}" fill="none" stroke="#2e3a5c" stroke-width="1"/>`;
  });
  let axes='';
  for(let i=0;i<n;i++){const[x,y]=pt(i,r);axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2e3a5c" stroke-width="1"/>`;}
  const dp=vals.map((v,i)=>pt(i,r*v/10).join(',')).join(' ');
  let dots=vals.map((v,i)=>{const[x,y]=pt(i,r*v/10);return `<circle cx="${x}" cy="${y}" r="3" fill="#ffd479"/>`;}).join('');
  let lbl='';
  for(let i=0;i<n;i++){const[x,y]=pt(i,r+15);lbl+=`<text x="${x}" y="${y}" font-size="9.5" fill="#8da3c8" text-anchor="middle" dominant-baseline="middle">${labs[i]}</text>`;}
  return `<svg viewBox="0 0 260 250">${grid}${axes}<polygon points="${dp}" fill="rgba(255,212,121,.25)" stroke="#ffd479" stroke-width="2"/>${dots}${lbl}</svg>`;
}

function nowCardHTML(){
  const cq=currentQuest();
  if(!cq) return `<div class="now-card"><div class="ttl">🎉 全クエスト達成！夢が叶った！</div></div>`;
  const idx=DATA.quests.indexOf(cq);
  const next=DATA.quests[idx+1];
  let body;
  if(cq.seed){
    const dc=seedDoneCount(), total=(state.__seeds__||[]).length;
    const pct=Math.min(100, dc*10);
    const seeds=state.__seeds__||[];
    const list=seeds.length
      ? seeds.map((s,i)=>`<div class="seed ${s.done?'done':''}"><div class="sc" onclick="toggleSeed(${i})">${s.done?'✓':''}</div><div class="st">${esc(s.t)}</div><div class="sd" onclick="delSeed(${i})">×</div></div>`).join("")
      : `<div class="seed-empty">日常の「これ面倒 × でもわくわく」を入れよう。チェック✓した種が10個でクリア。</div>`;
    body = `
      <div class="prog"><i style="width:${pct}%"></i></div>
      <div class="pnum">良い種 ${dc} / 10（メモ ${total}個）</div>
      <div class="seed-input">
        <input id="seedInput" placeholder="例：ネジ締めが面倒。自動なら楽しそう" onkeydown="if(event.key==='Enter')addSeed()">
        <button onclick="addSeed()">＋</button>
      </div>
      ${list}`;
  } else {
    body = `<button class="clear-btn" onclick="clearQuest('${cq.id}')">✓ クリアした！</button>`;
  }
  return `
    <div class="now-card">
      <div class="lbl">🎯 今のクエスト</div>
      <span class="ph" style="background:${C[cq.ph]}">${PHN[cq.ph].split('（')[0]}</span>
      <div class="ttl">${cq.label}</div>
      ${body}
      ${next?`<div class="next">次は → ${next.label}</div>`:''}
    </div>`;
}

function roadHTML(){
  let html=''; let lastPh=-1;
  DATA.quests.forEach(q=>{
    if(q.ph!==lastPh){ html+=`<div class="qph" style="color:${C[q.ph]}">▼ ${PHN[q.ph]}</div>`; lastPh=q.ph; }
    const done=isQuestDone(q), now=currentQuest()===q;
    const cls=done?'done':(now?'now':'future');
    const mark=done?'✓':(now?'●':'○');
    const style=now?`background:${C[q.ph]}`:'';
    html+=`<div class="qnode ${cls}"><div class="qm" style="${style}">${mark}</div>
      <div class="qlb">${q.label}${q.clear?`<span class="qclear">${q.clear}</span>`:''}</div></div>`;
  });
  html+=`<div class="qgoal">🌟 5大発明を達成 → 夢が叶う</div>`;
  return html;
}

function render(){
  document.getElementById("north").textContent = DATA.north;
  const lvChips = DATA.level7.map(l=>`<div class="lv-chip">${l[0]} <b>${l[1]}</b></div>`).join("");
  document.getElementById("wrap").innerHTML = `
    ${nowCardHTML()}

    <div class="sec">
      <h3>🗺 クエストの道（${allClearedPct()}% 進んだ）</h3>
      ${roadHTML()}
    </div>

    <div class="sec">
      <h3>📊 今の自分（7軸・2026-06-07）</h3>
      <div class="radar-wrap">${radarSVG()}</div>
      <div class="lv-mini">${lvChips}</div>
    </div>

    <div class="sec">
      <h3>☀ 毎日の土台（これが全部の燃料）</h3>
      ${DATA.daily.map(d=>`<div class="daily-item">${d}</div>`).join("")}
    </div>

    <div class="sec">
      <h3>⚙ バックアップ（変化したら自由に編集OK）</h3>
      <div class="tools">
        <button onclick="exportData()">📤 書き出し</button>
        <label>📥 読み込み<input type="file" accept="application/json" onchange="importData(event)" style="display:none"></label>
      </div>
      <div class="foot">データはこの端末に自動保存。書き出しでバックアップ＆端末間コピー。<br>正本: skills/発明/LIFE_ROADMAP.md ＋ CURRENT_LEVEL.md</div>
    </div>
  `;
}
render();
</script>
</body>
</html>
