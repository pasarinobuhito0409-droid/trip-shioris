<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発明クエスト — 1つずつクリアして夢へ</title>
<style>
:root{
  --bg:#0e1326; --card:#1a2138; --card2:#212a47; --line:#2e3a5c;
  --text:#eaf0ff; --muted:#8da3c8; --accent:#5a8dff; --gold:#ffd479;
  --p0:#5ab4ff; --p1:#34c759; --p2:#c850dc; --p3:#ffa0b4;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN",system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 50% -10%,#1b2547 0%,#0e1326 60%);color:var(--text);
  -webkit-font-smoothing:antialiased;padding:0 0 48px}
header{padding:16px 14px 6px}
h1{margin:0;font-size:17px;font-weight:800}
h1 .sub{font-size:11px;color:var(--muted);font-weight:600;margin-left:6px}
.north{margin:8px 14px 0;font-size:11.5px;color:var(--gold);line-height:1.5;font-weight:600}

.vtabs{display:flex;gap:8px;padding:11px 14px 2px;max-width:560px;margin:0 auto}
.vtab{flex:1;background:var(--card);border:1.5px solid var(--line);color:var(--muted);padding:12px;border-radius:13px;font-size:13.5px;font-weight:800;cursor:pointer;text-align:center}
.vtab.active{background:#fff;color:#0e1326;border-color:#fff}

.wrap{padding:10px 14px 0;max-width:560px;margin:0 auto}
.sec{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:12px}
.sec h3{margin:0 0 11px;font-size:12.5px;color:var(--muted);font-weight:800;letter-spacing:.5px}

/* 今のクエスト */
.now-card{background:linear-gradient(135deg,#2a3768,#1a2138);border:2px solid var(--gold);
  border-radius:18px;padding:17px;margin-bottom:14px;box-shadow:0 0 28px rgba(255,212,121,.13)}
.now-card .lbl{font-size:10.5px;color:var(--gold);font-weight:800;letter-spacing:1.5px}
.now-card .ph{display:inline-block;font-size:10px;font-weight:800;padding:2px 9px;border-radius:8px;margin-top:8px;color:#0e1326}
.now-card .ttl{font-size:21px;font-weight:900;line-height:1.3;margin-top:9px}
.now-card .prog{height:15px;background:#0c1124;border-radius:999px;overflow:hidden;margin-top:13px;border:1px solid var(--line)}
.now-card .prog i{display:block;height:100%;background:var(--gold);border-radius:999px;transition:width .4s}
.now-card .pnum{font-size:12px;color:var(--muted);margin-top:7px;font-weight:700;text-align:right}
.now-card .next{font-size:11.5px;color:var(--muted);margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
.clear-btn{width:100%;margin-top:13px;background:var(--gold);color:#3a2a00;border:none;border-radius:11px;
  padding:13px;font-size:15px;font-weight:900;cursor:pointer}
.clear-btn:active{transform:scale(.98)}

/* 種タンク */
.seed-input{display:flex;gap:6px;margin:12px 0 9px}
.seed-input input{flex:1;background:#0c1124;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px;font:inherit;font-size:13px}
.seed-input button{flex:0 0 48px;background:var(--gold);color:#3a2a00;border:none;border-radius:9px;font-size:22px;font-weight:800;cursor:pointer}
.seed{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,.07)}
.seed:last-child{border-bottom:none}
.seed .sc{flex:0 0 21px;height:21px;border-radius:6px;border:2px solid var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.seed.done .sc{background:var(--p1);border-color:var(--p1)}
.seed.done .st{text-decoration:line-through;opacity:.5}
.seed .st{flex:1;font-size:13px;line-height:1.45}
.seed .sd{flex:0 0 26px;color:var(--muted);cursor:pointer;font-size:18px;text-align:center}
.seed-empty{font-size:12px;color:var(--muted);padding:6px 2px;line-height:1.5}

/* すごろく */
.qph{font-size:11.5px;font-weight:800;margin:14px 0 8px;letter-spacing:.5px}
.qph:first-child{margin-top:0}
.qnode{display:flex;align-items:center;gap:12px;position:relative;padding:3px 0}
.qnode .qm{flex:0 0 28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;background:#27325a;color:var(--muted);z-index:1}
.qnode.done .qm{background:var(--p1);color:#fff}
.qnode.now .qm{color:#0e1326;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(255,212,121,.18)}50%{box-shadow:0 0 0 7px rgba(255,212,121,.05)}}
.qnode::before{content:"";position:absolute;left:13.5px;top:-9px;width:2px;height:11px;background:var(--line)}
.qnode:first-of-type::before{display:none}
.qnode .qlb{flex:1;font-size:13.5px;padding:8px 0;line-height:1.4}
.qnode.future .qlb{color:var(--muted)}
.qnode.done .qlb{opacity:.6}
.qnode.now .qlb{font-weight:800;color:var(--gold)}
.qclear{font-size:10px;background:#27325a;color:var(--gold);padding:1px 7px;border-radius:7px;font-weight:800;margin-left:4px}
.qgoal{margin-top:14px;text-align:center;font-size:15px;font-weight:900;color:var(--gold);
  background:#27325a;border-radius:12px;padding:14px;border:1px solid var(--line)}

/* レーダー */
.radar-wrap{display:flex;justify-content:center}
.radar-wrap svg{width:100%;max-width:280px;height:auto}
.lv-mini{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.lv-chip{cursor:pointer;border:1px solid var(--line);font:inherit}
.lv-chip:active{background:#33415f}
.hint-edit{font-size:10.5px;color:var(--muted);margin-top:7px;text-align:center}
.record-btn{width:100%;margin-top:11px;background:var(--accent);color:#fff;border:none;border-radius:11px;padding:12px;font-weight:800;font-size:13px;cursor:pointer}
.record-btn:active{transform:scale(.98)}
.snap-row{display:flex;justify-content:space-between;align-items:center;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,.05);font-size:12.5px}
.snap-row:last-child{border-bottom:none}
.snap-del{color:var(--muted);cursor:pointer;font-size:17px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:100;padding:18px}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;max-width:390px;width:100%;max-height:82vh;overflow:auto}
.modal-h{font-size:15px;font-weight:800;margin-bottom:3px}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:13px;line-height:1.5}
.lvl-row{display:flex;gap:10px;align-items:center;width:100%;background:#212a47;border:1.5px solid var(--line);color:var(--text);border-radius:10px;padding:11px;margin-bottom:7px;cursor:pointer;text-align:left;font:inherit}
.lvl-row.lvl-cur{border-color:var(--gold);background:#34301c}
.lvl-row.lvl-next{border-color:var(--accent);border-style:dashed}
.lvl-n{flex:0 0 40px;font-weight:800;color:var(--gold);font-size:13px}
.lvl-d{flex:1;font-size:12.5px;line-height:1.45}
.modal-x{width:100%;margin-top:6px;background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px;font-weight:700;cursor:pointer}
.lv-chip{font-size:11px;background:#27325a;border-radius:8px;padding:5px 9px;font-weight:700}
.lv-chip b{color:var(--gold)}

/* 自分を知る */
.quote{font-size:12.5px;color:var(--gold);line-height:1.6;margin-bottom:4px;font-weight:600}
.kv{display:flex;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.kv:last-child{border-bottom:none}
.kv .k{flex:0 0 116px;font-size:12.5px;font-weight:800}
.kv .v{flex:1;font-size:11.5px;color:var(--muted);line-height:1.5}
.bullet{font-size:12.5px;padding:7px 0 7px 20px;position:relative;line-height:1.5;border-bottom:1px solid rgba(255,255,255,.05)}
.bullet:last-child{border-bottom:none}
.bullet.good::before{content:"⚔";position:absolute;left:2px;color:var(--p1)}
.bullet.bad::before{content:"🛡";position:absolute;left:2px}
.strat{display:flex;align-items:center;gap:6px;padding:9px 2px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.05);line-height:1.45}
.strat:last-child{border-bottom:none}
.strat .en{flex:0 0 auto;color:var(--p3);font-weight:700}
.strat .ar{flex:0 0 auto;color:var(--muted)}
.strat .me{flex:1;color:var(--gold);font-weight:700}
.sec.head-self{background:linear-gradient(135deg,#3a2d52,#1a2138);border-color:#6a4a8a}

/* 毎日・バックアップ */
.daily-item{font-size:12.5px;padding:6px 0 6px 20px;position:relative;line-height:1.5}
.daily-item::before{content:"☀";position:absolute;left:0;color:var(--gold)}
.tools{display:flex;gap:8px}
.tools button,.tools label{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;text-align:center}
.foot{text-align:center;font-size:10.5px;color:var(--muted);margin-top:8px;line-height:1.6}
</style>
</head>
<body>
<header>
  <h1>🚀 発明クエスト <span class="sub">v4 · 三輪允仁</span></h1>
  <div class="north" id="north"></div>
</header>

<div class="vtabs" id="vtabs"></div>
<div class="wrap" id="wrap"></div>

<script>
const C = ["#5ab4ff","#34c759","#c850dc","#ffa0b4"];
const PHN = ["第1期 土台（36〜41歳）","第2期 お金（41〜51歳）","第3期 参戦（51〜66歳）","第4期 魔法（66歳〜）"];
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const DATA = {
  north: "北極星：一生 研究と発明だけで生きる。5大発明でSFを現実にする。",
  quests: [
    {id:"q1", ph:0, label:"種を10個 集める", seed:true},
    {id:"q2", ph:0, label:"最初の1発を決める（特許×コスパ×わくわく）"},
    {id:"q3", ph:0, label:"試作1号を作る"},
    {id:"q4", ph:0, label:"特許を調べる・出す"},
    {id:"q5", ph:0, label:"発明で初収入を得る", clear:"第1期クリア"},
    {id:"q6", ph:1, label:"投資の基礎を学ぶ"},
    {id:"q7", ph:1, label:"特許収入を投資に回す"},
    {id:"q8", ph:1, label:"収入の柱を3本にする"},
    {id:"q9", ph:1, label:"経済的自由に到達（働かなくていい）", clear:"第2期クリア"},
    {id:"q10", ph:2, label:"大学で学ぶ（生物・物理・工学）"},
    {id:"q11", ph:2, label:"不老の研究装置を作る"},
    {id:"q12", ph:2, label:"5大発明の研究開発に着手", clear:"第3期クリア"},
    {id:"q13", ph:3, label:"5大発明を達成する", clear:"★夢クリア★"},
  ],
  daily: ["算数15分（もうやってる）","Fusion教科書を火・土に進める","「面倒×わくわく」を種タンクにメモ"],
  level7: [
    ["設計", 7, "基本部品は1人で設計可・最大の武器", [[3,"図面記号（寸法・公差・溶接記号）を読める"],[5,"ブラケット等の単純部品を 先輩チェックありで出図"],[7,"単純部品を 1人で 図面化・出図できる"],[8,"板金（展開・曲げ・公差）を含む部品を 1人で設計"],[9,"リンク・カム等 動く部品を 干渉チェックして設計"],[10,"既存にない 新機構を 考えて 図面化・試作"]]],
    ["学力", 2.5, "算数1年継続中・英語ほぼゼロ", [[2,"小学算数（掛け算の筆算）を 毎日やってる"],[3,"小学算数（分数・小数・割合・面積）を 完了"],[5,"中学数学（方程式・関数・図形）が 解ける"],[7,"高校数学（三角・微分・積分）の 基礎が分かる"],[8,"高校 物理・化学が 分かる"],[10,"大学教養（線形代数・微積・物理）を 自学できる"]]],
    ["お金", 6, "固定費月¥55k・投資10%・収入安定", [[4,"毎月の収支を 把握してる"],[6,"給料の一部を 投資に回してる"],[7,"投資で 資産が 年々 増えてる"],[8,"給料以外の収入（特許・副業）が 月数万"],[9,"副収入だけで 生活費を まかなえる"],[10,"働かなくても 投資・特許で 暮らせる"]]],
    ["時間", 3.5, "火1h＋土半日。2027.4で激増", [[2,"平日 すきま15分を 確保"],[3,"火1h＋土半日を 発明に使えてる"],[5,"平日も 毎日1h 発明に使える"],[7,"週の半分を 発明・研究に使える"],[9,"仕事を減らし 大半を 研究に"],[10,"1日中 研究・発明だけ"]]],
    ["健康", 8, "36歳・睡眠8h・体力高い", [[5,"週1 運動・睡眠 不規則"],[7,"週2〜3 運動・睡眠そこそこ"],[8,"MMA週3＋睡眠8h＋持病なし"],[9,"老化を遅らせる習慣（食事・運動・睡眠）も実践"],[10,"60代でも 体内年齢が 若いまま"]]],
    ["人脈", 4, "妻が応援・発明仲間はこれから", [[2,"一人で発明・相談相手なし"],[4,"妻が応援＋AI相棒あり"],[6,"同じ夢の仲間が 1〜2人"],[7,"発明・研究のコミュニティに所属"],[9,"一緒に作る チーム・共同研究者"],[10,"世界の研究者と つながり協働"]]],
    ["継続", 6.5, "わくわく×見える化で続く", [[4,"やる気頼み・続かないこと多い"],[6,"仕組みで 算数・MMAを 1年以上継続"],[7,"複数の習慣を 仕組みで 並行継続"],[8,"つまずいても 立て直して 続ける"],[10,"何があっても 10年 続けられる"]]],
  ],
  strengths: [
    "設計スキル7（普通の発明初心者は2〜3。圧倒的な出発点）",
    "続ける仕組みづくり（気合でなく仕組みで続ける）",
    "睡眠8h（記憶の定着・発明の土台）",
    "コスパ職人の美意識（価値÷価格への感動）",
    "24時間相談できるAI相棒（昔の発明家になかった武器）",
    "妻の応援（心の土台）",
  ],
  enemies: [
    ["学力の壁","数学2.5・英語1。でも毎日コツコツ＋AIで補える"],
    ["時間の壁（老化）","36歳。不老技術が来るまで健康を保つ勝負"],
    ["規模の壁","スキル7個を同時はNG。1個ずつ集中で突破する"],
  ],
  traits: [
    ["興味が移りやすい","新しいものに飛びつく（ADHD）。1点集中でカバー"],
    ["完璧主義","10問全問正解で足踏み。時々8割で進む"],
    ["わくわく駆動","わくわくしないと続かない。わくわくチェック必須"],
    ["視野優勢","目で見て理解する。図・グラフが武器"],
    ["複利マインド","小さな変化が5〜10年で何倍にも。継続を信じる"],
    ["ビジョン構築力","夢を描く力が高い。これは才能"],
  ],
  strategy: [
    ["興味が移る","最初の1発に1点集中"],
    ["完璧主義","時々「8割で進む日」を作る"],
    ["わくわくしない","始める前にわくわくチェック"],
    ["学力これから","AIが脳を補う＋毎日コツコツ"],
    ["時間の壁","健康を全力で維持（睡眠8h継続）"],
    ["一人で無理","1個ずつ＋24時間AI相棒"],
  ],
};

const KEY = "life_roadmap_v1";
let state = JSON.parse(localStorage.getItem(KEY) || "{}");
let view = "quest";
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function addSeed(){
  const inp=document.getElementById('seedInput'); const v=(inp.value||"").trim();
  if(!v) return;
  if(!state.__seeds__) state.__seeds__=[];
  state.__seeds__.push({t:v,done:false}); inp.value=''; save(); render();
  const ni=document.getElementById('seedInput'); if(ni) ni.focus();
}
function toggleSeed(i){ state.__seeds__[i].done=!state.__seeds__[i].done; save(); render(); }
function delSeed(i){ state.__seeds__.splice(i,1); save(); render(); }
function seedDoneCount(){ return (state.__seeds__||[]).filter(s=>s.done).length; }

function isQuestDone(q){
  if(q.seed) return state[q.id]===true || seedDoneCount()>=10;
  return state[q.id]===true;
}
function currentQuest(){ return DATA.quests.find(q=>!isQuestDone(q)) || null; }
function clearQuest(id){ state[id]=true; save(); render(); window.scrollTo({top:0,behavior:'smooth'}); }
function allClearedPct(){ return Math.round(DATA.quests.filter(isQuestDone).length/DATA.quests.length*100); }

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='hatsumei_quest_backup.json'; a.click();
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ try{ state=JSON.parse(e.target.result); save(); render(); }catch(x){ alert('読み込み失敗'); } };
  r.readAsText(f); ev.target.value='';
}

function getLabs(){ return DATA.level7.map(l=>l[0]); }
function getVals(){
  const base=DATA.level7.map(l=>l[1]);
  const lv=state.__level__;
  return base.map((v,i)=> (lv && typeof lv[i]==='number') ? lv[i] : v);
}
function editLevel(i){
  const levels=DATA.level7[i][3];
  if(levels && levels.length){ openLevelModal(i); return; }
  const labs=getLabs(), vals=getVals();
  const v=prompt(labs[i]+' の今の値（0〜10）', vals[i]);
  if(v===null) return;
  const num=parseFloat(v);
  if(isNaN(num)||num<0||num>10){ alert('0〜10の数字で入れてね'); return; }
  if(!state.__level__) state.__level__=getVals();
  state.__level__[i]=num; save(); render();
}
function openLevelModal(i){
  const name=DATA.level7[i][0], levels=DATA.level7[i][3];
  const curVal=getVals()[i];
  let curLv=null; levels.forEach(l=>{ if(l[0]<=curVal+0.001) curLv=l[0]; });
  let nextLv=null; for(const l of levels){ if(l[0]>(curLv===null?-1:curLv)){ nextLv=l[0]; break; } }
  const rows=levels.map(([v,desc])=>{
    const isCur=v===curLv, isNext=v===nextLv;
    const cls=isCur?'lvl-cur':(isNext?'lvl-next':'');
    const tag=isCur?' <b style="color:var(--gold)">← 今ここ</b>':(isNext?' <b style="color:var(--accent)">🎯 次の的</b>':'');
    return `<button class="lvl-row ${cls}" onclick="pickLevel(${i},${v})"><span class="lvl-n">Lv${v}</span><span class="lvl-d">${desc}${tag}</span></button>`;
  }).join("");
  const html=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h">${name} の ものさし</div>
    <div class="modal-sub">できるようになったレベルを タップ。次の的が、次の成長目標。</div>
    ${rows}
    <button class="modal-x" onclick="closeModal()">閉じる</button></div></div>`;
  let m=document.getElementById('modalRoot');
  if(!m){ m=document.createElement('div'); m.id='modalRoot'; document.body.appendChild(m); }
  m.innerHTML=html;
}
function pickLevel(i,v){ if(!state.__level__) state.__level__=getVals(); state.__level__[i]=v; save(); closeModal(); render(); }
function closeModal(){ const m=document.getElementById('modalRoot'); if(m) m.innerHTML=''; }
function recordSnap(){
  if(!state.__snaps__) state.__snaps__=[];
  const today=new Date().toISOString().slice(0,10);
  state.__snaps__.push({date:today, vals:getVals()});
  save(); render();
}
function delSnap(i){ state.__snaps__.splice(i,1); save(); render(); }

function radarSVG(){
  const labs=getLabs(), vals=getVals();
  const cx=130,cy=125,r=80,n=7;
  const pt=(i,rad)=>{const a=-Math.PI/2+i*2*Math.PI/n;return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)];};
  let grid='';
  [0.25,0.5,0.75,1].forEach(f=>{ const p=[...Array(n)].map((_,i)=>pt(i,r*f).join(',')).join(' '); grid+=`<polygon points="${p}" fill="none" stroke="#2e3a5c" stroke-width="1"/>`; });
  let axes='';
  for(let i=0;i<n;i++){const[x,y]=pt(i,r);axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2e3a5c" stroke-width="1"/>`;}
  const snaps=state.__snaps__||[];
  let past='';
  snaps.forEach((s,si)=>{
    const op=(0.10+0.12*((si+1)/(snaps.length+1))).toFixed(2);
    const sp=s.vals.map((v,i)=>pt(i,r*v/10).join(',')).join(' ');
    past+=`<polygon points="${sp}" fill="rgba(138,163,200,${op})" stroke="#8da3c8" stroke-width="1" stroke-dasharray="3 2"/>`;
  });
  const dp=vals.map((v,i)=>pt(i,r*v/10).join(',')).join(' ');
  let dots=vals.map((v,i)=>{const[x,y]=pt(i,r*v/10);return `<circle cx="${x}" cy="${y}" r="3" fill="#ffd479"/>`;}).join('');
  let lbl='';
  for(let i=0;i<n;i++){const[x,y]=pt(i,r+17);
    lbl+=`<text x="${x}" y="${y-4}" font-size="9.5" fill="#8da3c8" text-anchor="middle" dominant-baseline="middle">${labs[i]}</text>`;
    lbl+=`<text x="${x}" y="${y+7}" font-size="10.5" fill="#ffd479" font-weight="bold" text-anchor="middle" dominant-baseline="middle">${vals[i]}</text>`;
  }
  return `<svg viewBox="0 0 260 250">${grid}${axes}${past}<polygon points="${dp}" fill="rgba(255,212,121,.25)" stroke="#ffd479" stroke-width="2"/>${dots}${lbl}</svg>`;
}

function nowCardHTML(){
  const cq=currentQuest();
  if(!cq) return `<div class="now-card"><div class="ttl">🎉 全クエスト達成！夢が叶った！</div></div>`;
  const idx=DATA.quests.indexOf(cq), next=DATA.quests[idx+1];
  let body;
  if(cq.seed){
    const dc=seedDoneCount(), total=(state.__seeds__||[]).length, pct=Math.min(100,dc*10);
    const seeds=state.__seeds__||[];
    const list=seeds.length
      ? seeds.map((s,i)=>`<div class="seed ${s.done?'done':''}"><div class="sc" onclick="toggleSeed(${i})">${s.done?'✓':''}</div><div class="st">${esc(s.t)}</div><div class="sd" onclick="delSeed(${i})">×</div></div>`).join("")
      : `<div class="seed-empty">日常の「これ面倒 × でもわくわく」を入れよう。チェック✓した種が10個でクリア。</div>`;
    body=`<div class="prog"><i style="width:${pct}%"></i></div>
      <div class="pnum">良い種 ${dc} / 10（メモ ${total}個）</div>
      <div class="seed-input"><input id="seedInput" placeholder="例：ネジ締めが面倒。自動なら楽しそう" onkeydown="if(event.key==='Enter')addSeed()"><button onclick="addSeed()">＋</button></div>${list}`;
  } else {
    body=`<button class="clear-btn" onclick="clearQuest('${cq.id}')">✓ クリアした！</button>`;
  }
  return `<div class="now-card"><div class="lbl">🎯 今のクエスト</div>
    <span class="ph" style="background:${C[cq.ph]}">${PHN[cq.ph].split('（')[0]}</span>
    <div class="ttl">${cq.label}</div>${body}
    ${next?`<div class="next">次は → ${next.label}</div>`:''}</div>`;
}

function roadHTML(){
  let html=''; let lastPh=-1;
  DATA.quests.forEach(q=>{
    if(q.ph!==lastPh){ html+=`<div class="qph" style="color:${C[q.ph]}">▼ ${PHN[q.ph]}</div>`; lastPh=q.ph; }
    const done=isQuestDone(q), now=currentQuest()===q;
    const cls=done?'done':(now?'now':'future'), mark=done?'✓':(now?'●':'○'), style=now?`background:${C[q.ph]}`:'';
    html+=`<div class="qnode ${cls}"><div class="qm" style="${style}">${mark}</div><div class="qlb">${q.label}${q.clear?`<span class="qclear">${q.clear}</span>`:''}</div></div>`;
  });
  return html+`<div class="qgoal">🌟 5大発明を達成 → 夢が叶う</div>`;
}

function questHTML(){
  return `
    ${nowCardHTML()}
    <div class="sec"><h3>🗺 クエストの道（${allClearedPct()}% 進んだ）</h3>${roadHTML()}</div>
    <div class="sec"><h3>☀ 毎日の土台（これが全部の燃料）</h3>${DATA.daily.map(d=>`<div class="daily-item">${d}</div>`).join("")}</div>
    <div class="sec"><h3>⚙ バックアップ（変化したら自由に編集OK）</h3>
      <div class="tools"><button onclick="exportData()">📤 書き出し</button><label>📥 読み込み<input type="file" accept="application/json" onchange="importData(event)" style="display:none"></label></div>
      <div class="foot">データはこの端末に自動保存。書き出しでバックアップ＆端末間コピー。<br>正本: skills/発明/LIFE_ROADMAP.md ＋ CURRENT_LEVEL.md</div></div>`;
}

function selfHTML(){
  const labs=getLabs(), vals=getVals();
  const chips=labs.map((lb,i)=>`<button class="lv-chip" onclick="editLevel(${i})">${lb} <b>${vals[i]}</b></button>`).join("");
  const snaps=state.__snaps__||[];
  const snapList = snaps.length
    ? snaps.map((s,i)=>`<div class="snap-row"><span>📸 ${s.date}</span><span class="snap-del" onclick="delSnap(${i})">×</span></div>`).join("")
    : `<div class="seed-empty">まだ記録なし。年1で測り直して📸記録すると、過去の自分が薄く重なって、成長が目で見える。</div>`;
  const str=DATA.strengths.map(s=>`<div class="bullet good">${s}</div>`).join("");
  const ene=DATA.enemies.map(e=>`<div class="kv"><div class="k">🛡 ${e[0]}</div><div class="v">${e[1]}</div></div>`).join("");
  const tra=DATA.traits.map(t=>`<div class="kv"><div class="k">${t[0]}</div><div class="v">${t[1]}</div></div>`).join("");
  const stg=DATA.strategy.map(s=>`<div class="strat"><span class="en">${s[0]}</span><span class="ar">→</span><span class="me">${s[1]}</span></div>`).join("");
  return `
    <div class="sec head-self">
      <div class="quote">⚔ 「彼（敵）を知り 己（おのれ）を知れば、百戦 危うからず」</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.5">自分の強み・弱み・クセを知る。それが夢への戦略になる。</div>
    </div>
    <div class="sec"><h3>📊 今の自分（7軸・タップで更新）</h3>
      <div class="radar-wrap">${radarSVG()}</div>
      <div class="lv-mini">${chips}</div>
      <div class="hint-edit">↑ 各チップをタップで 値を更新</div>
      <button class="record-btn" onclick="recordSnap()">📸 今の自分を記録（成長を重ねる）</button>
      <div style="margin-top:11px">${snapList}</div></div>
    <div class="sec"><h3>💪 強み（君の武器）</h3>${str}</div>
    <div class="sec"><h3>🛡 弱み・壁（倒す敵）</h3>${ene}</div>
    <div class="sec"><h3>🧠 特性（自分のクセ＝取扱説明書）</h3>${tra}</div>
    <div class="sec"><h3>⚔ 戦略（弱み → どう倒すか）</h3>${stg}
      <div class="foot" style="margin-top:10px">弱みは消さなくていい。仕組みで補えば武器になる。</div></div>`;
}

function renderVtabs(){
  const tabs=[["quest","🚀 クエスト"],["self","🧭 自分を知る"]];
  document.getElementById("vtabs").innerHTML = tabs.map(t=>
    `<button class="vtab ${view===t[0]?'active':''}" onclick="view='${t[0]}';render();window.scrollTo(0,0)">${t[1]}</button>`).join("");
}

function render(){
  document.getElementById("north").textContent = DATA.north;
  renderVtabs();
  document.getElementById("wrap").innerHTML = view==='quest' ? questHTML() : selfHTML();
}
render();
</script>
</body>
</html>
