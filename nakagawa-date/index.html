  const way = c.stops.slice(1,-1).map(s=>enc(s.q)).join("%7C");
  document.getElementById("routeBtn").href =
    `https://www.google.com/maps/dir/?api=1&travelmode=driving&origin=${enc(origin)}&destination=${enc(dest)}&waypoints=${way}`;
  document.getElementById("infoBox").innerHTML =
    `<div style="color:#f3c98a;letter-spacing:.16em;margin-bottom:8px">行く前に確認</div>` +
    INFO.map(r=>`<div class="row"><b>${r[0]}</b><span>${r[1]}</span></div>`).join("");

  observe();
}

function renderGallery(){
  document.getElementById("galleryBody").innerHTML = GALLERY.map(g => `
    <div class="cat">
      <div class="ctitle">${g.cat}</div>
      ${g.items.map(it => `
        <div class="gcard">
          <div class="gi"><div class="gn">${it.n}</div><div class="gd">${it.d}</div></div>
          <a href="${mapUrl(it.q)}" target="_blank" rel="noopener">📍 地図</a>
        </div>`).join("")}
    </div>`).join("");
}

let io;
function observe(){
  if(io) io.disconnect();
  io = new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add("show"); }),{threshold:.18});
  document.querySelectorAll(".scene").forEach(s=>{ if(!s.classList.contains("show")) io.observe(s); });
}

const KEYS = [
  [[246,201,160],[184,138,154]],
  [[207,224,232],[243,217,176]],
  [[188,217,232],[232,238,240]],
  [[244,207,148],[224,154,106]],
  [[224,121,95],[110,74,106]],
  [[42,42,74],[20,20,42]]
];
const lerp=(a,b,t)=>Math.round(a+(b-a)*t);
const mix=(c1,c2,t)=>`rgb(${lerp(c1[0],c2[0],t)},${lerp(c1[1],c2[1],t)},${lerp(c1[2],c2[2],t)})`;
const sky=document.getElementById("sky"),cel=document.getElementById("celestial"),
      bar=document.getElementById("progress"),stars=document.getElementById("stars");

function onScroll(){
  const max=document.body.scrollHeight-window.innerHeight;
  const p=max>0?Math.min(1,Math.max(0,window.scrollY/max)):0;
  bar.style.width=(p*100)+"%";
  const seg=p*(KEYS.length-1), i=Math.min(KEYS.length-2,Math.floor(seg)), f=seg-i;
  const top=mix(KEYS[i][0],KEYS[i+1][0],f), bot=mix(KEYS[i][1],KEYS[i+1][1],f);
  sky.style.background=`linear-gradient(165deg,${top} 0%,${bot} 100%)`;
  const x=8+p*84, y=78-Math.sin(p*Math.PI)*64;
  cel.style.transform=`translate(${x}vw,${y}vh)`;
  const isMoon=p>0.78;
  cel.style.background=isMoon?"radial-gradient(circle at 38% 38%,#fdfbf2,#cfd3e0)":"radial-gradient(circle at 38% 38%,#fff4d6,#f3b65a)";
  cel.style.boxShadow=isMoon?"0 0 40px rgba(220,224,240,.6)":"0 0 60px rgba(243,182,90,.7)";
  stars.style.opacity=Math.max(0,(p-0.7)/0.3);
}

(function makeStars(){
  let h="";
  for(let i=0;i<70;i++){const s=Math.random()*2+1;h+=`<div class="star" style="left:${Math.random()*100}%;top:${Math.random()*70}%;width:${s}px;height:${s}px;animation-delay:${Math.random()*3}s"></div>`;}
  stars.innerHTML=h;
})();

document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  render(b.dataset.c);
  window.scrollTo({top:0,behavior:"smooth"});
  setTimeout(onScroll,60);
});

window.addEventListener("scroll",onScroll,{passive:true});
window.addEventListener("resize",onScroll);
renderGallery();
render("定番");
onScroll();

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}));
}
</script>
</body></html>
