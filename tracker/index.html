<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#2b6cb0">
<title>活動トラッカー 2026</title>
<style>
:root{
  --c-normal:#cbe3ff;
  --c-cheat:#ffccd1;
  --c-special-top:#ccf4d2;
  --c-special-bot:#fdeaae;
  --c-morning:#5ab4ff;
  --c-lunch:#a99cff;
  --c-night-mma:#c850dc;
  --c-night-wt:#e68c3c;
  --c-night-hand:#64c8dc;
  --c-daily:#34c759;
  --c-special:#76b347;
  --c-rest:#ff85a0;
  --bg:#f5f5f7;
  --card:#ffffff;
  --line:#e3e3e8;
  --text:#1d1d1f;
  --muted:#6b6b73;
  --done:#34c759;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;font-size:15px;line-height:1.5}

header{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 12px 4px;border-bottom:1px solid var(--line)}
h1{margin:0 0 6px;font-size:17px;font-weight:700}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.month-tabs{display:flex;gap:5px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch}
.month-tabs button,.view-toggle button{flex:0 0 auto;border:none;background:#fff;color:var(--text);font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid var(--line);cursor:pointer}
.month-tabs button.active,.view-toggle button.active{background:var(--text);color:#fff;border-color:var(--text)}
.view-toggle{display:flex;gap:5px;margin-left:auto}
.jump-today{background:#0a84ff;color:#fff;border:none;font-size:12px;font-weight:800;padding:8px 12px;border-radius:999px;cursor:pointer;box-shadow:0 2px 6px rgba(10,132,255,.3);transition:transform .1s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.jump-today:active{transform:scale(.94)}

/* === 活動継続日バナー（リスト・記録 両方の上部に常時表示） === */
.streak-banner{margin:8px 12px;padding:12px 14px;border-radius:14px;background:linear-gradient(135deg,#ff9500 0%,#ff5e3a 100%);color:#fff;box-shadow:0 3px 10px rgba(255,94,58,.3);display:flex;align-items:center;gap:12px}
.streak-banner .sb-fire{font-size:30px;line-height:1}
.streak-banner .sb-main{flex:1}
.streak-banner .sb-days{font-size:24px;font-weight:900;line-height:1.1}
.streak-banner .sb-days small{font-size:12px;font-weight:600;opacity:.9;margin-left:3px}
.streak-banner .sb-sub{font-size:11px;opacity:.9;margin-top:2px}
.streak-banner .sb-edit{background:rgba(255,255,255,.25);border:none;color:#fff;font-size:11px;font-weight:800;padding:7px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
.streak-banner .sb-edit:active{transform:scale(.94)}
.streak-banner.unset{background:linear-gradient(135deg,#8e8e93 0%,#636366 100%);box-shadow:0 3px 10px rgba(99,99,102,.25)}

/* === 前月からの引き継ぎ（参照・読み取り専用） === */
.prev-carry{background:linear-gradient(135deg,#0a5dc2 0%,#0a84ff 100%);color:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(10,132,255,.25)}
.prev-carry h3{margin:0 0 3px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.prev-carry .pc-hint{font-size:11px;opacity:.85;margin-bottom:10px}
.prev-carry .pc-goal{background:rgba(255,255,255,.18);border-radius:10px;padding:11px 12px;margin-bottom:8px}
.prev-carry .pc-goal .pc-label{font-size:11px;font-weight:800;opacity:.95;margin-bottom:4px}
.prev-carry .pc-goal .pc-text{font-size:15px;font-weight:700;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.prev-carry details{background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;margin-top:6px}
.prev-carry summary{padding:9px 12px;font-size:12px;font-weight:700;cursor:pointer;list-style:none}
.prev-carry summary::-webkit-details-marker{display:none}
.prev-carry summary::before{content:"▶ ";font-size:9px}
.prev-carry details[open] summary::before{content:"▼ "}
.prev-carry .pc-detail{padding:0 12px 10px;font-size:13px;line-height:1.5}
.prev-carry .pc-detail .pc-d-label{font-size:11px;font-weight:800;opacity:.9;margin:6px 0 2px}
.prev-carry .pc-detail .pc-d-text{white-space:pre-wrap;word-break:break-word;opacity:.95}
.prev-carry .pc-empty{font-size:12px;opacity:.85;font-style:italic}

/* === 月総括（記録タブ・3欄） === */
.month-review{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.month-review h3{margin:0 0 4px;font-size:14px;font-weight:800;color:var(--text)}
.month-review .mr-hint{font-size:11px;color:var(--muted);margin-bottom:12px}
.month-review .mr-field{margin-bottom:12px}
.month-review .mr-field:last-child{margin-bottom:0}
.month-review .mr-label{font-size:12px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.month-review .mr-label.good{color:#1d8a4e}
.month-review .mr-label.improve{color:#c2410c}
.month-review .mr-label.goal{color:#0a5dc2}
.month-review textarea{width:100%;min-height:60px;border:1.5px solid var(--line);border-radius:10px;padding:10px;font:inherit;font-size:13px;resize:vertical;background:#fafafa}
.month-review textarea:focus{outline:none;background:#fff}
.month-review .mr-field.good textarea:focus{border-color:#34c759}
.month-review .mr-field.improve textarea:focus{border-color:#ff8c3c}
.month-review .mr-field.goal textarea:focus{border-color:#0a84ff}
.month-review .mr-saved{font-size:10px;color:var(--muted);text-align:right;margin-top:4px;min-height:12px}

/* === 記録ビュー === */
.record-view{padding:0 12px 24px}
.record-summary{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.record-summary h3{margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:700}
.record-summary .pct{font-size:36px;font-weight:900;line-height:1}
.record-summary .pct small{font-size:13px;font-weight:500;color:var(--muted);margin-left:6px}
.record-summary .bar{height:8px;background:#eee;border-radius:999px;overflow:hidden;margin:10px 0}
.record-summary .bar i{display:block;height:100%;background:linear-gradient(90deg,#34c759,#0a84ff);transition:width .3s}
.record-summary .meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;font-size:11px;color:var(--muted)}
.record-summary .meta div{text-align:center;padding:8px 4px;background:#f5f5f7;border-radius:8px}
.record-summary .meta div b{display:block;font-size:18px;font-weight:900;color:var(--text);margin-bottom:2px}

.record-diary{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.record-diary:active{transform:scale(.99);background:#f8f8fa}
.record-diary .rd-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.record-diary .rd-date{font-size:14px;font-weight:900;color:var(--text)}
.record-diary .rd-tag{font-size:10px;color:var(--muted);background:#f5f5f7;padding:3px 8px;border-radius:999px;font-weight:700}
.record-diary .rd-body{font-size:13px;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:hidden;position:relative}
.record-diary .rd-body.long::after{content:"";position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,#fff)}
.record-section-title{font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:700}

.summary{padding:8px 12px}
.summary-card{background:var(--card);border-radius:12px;padding:12px 14px;border:1px solid var(--line)}
.summary-card .label{font-size:11px;color:var(--muted);font-weight:500}
.summary-card .big{font-size:26px;font-weight:800;line-height:1.1;margin-top:2px}
.summary-card .big small{font-size:13px;font-weight:500;color:var(--muted)}
.bar{margin-top:8px;height:8px;border-radius:999px;background:#eee;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#34c759,#0a84ff);transition:width .3s}
.cat-bars{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.cat-bar{display:flex;align-items:center;gap:6px;font-size:11px}
.cat-bar .lbl{flex:0 0 50px;color:var(--muted)}
.cat-bar .b{flex:1;height:6px;background:#eee;border-radius:999px;overflow:hidden}
.cat-bar .b i{display:block;height:100%;background:#34c759}
.cat-bar .pct{font-weight:600;font-size:11px;flex:0 0 38px;text-align:right}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 10px}
.chart-card{background:var(--card);border-radius:12px;padding:10px;border:1px solid var(--line)}
.chart-card h3{margin:0 0 6px;font-size:11px;color:var(--muted);font-weight:600}
.chart-card svg{width:100%;height:auto;display:block}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;font-size:10px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:3px}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block}

/* === LIST VIEW === */
.list{padding:0 12px 24px}
.list-day{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:7px;overflow:hidden;display:grid;grid-template-columns:56px 1fr;align-items:stretch}
.list-day.today{border-color:#0a84ff;border-width:2px;box-shadow:0 0 0 3px rgba(10,132,255,.1)}
.list-day.past{opacity:.55;filter:saturate(.6)}
.list-day.past:hover{opacity:.85}
.list-day .date-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;background:var(--bg)}
.list-day .date-col.normal{background:var(--c-normal)}
.list-day .date-col.cheat{background:var(--c-cheat)}
.list-day .date-col.special{background:linear-gradient(180deg,var(--c-special-top) 0%,var(--c-special-top) 50%,var(--c-special-bot) 50%,var(--c-special-bot) 100%)}
.list-day .num{font-size:22px;font-weight:800;line-height:1}
.list-day .wd{font-size:11px;color:var(--muted);margin-top:2px}
.list-day .wd.sat{color:#0a84ff}
.list-day .wd.sun{color:#ff453a}
.list-day .tag{font-size:9px;font-weight:700;color:var(--muted);margin-top:3px;letter-spacing:.05em}
.list-day .tasks{padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;align-content:center}

/* === TASK CHIP（タップで完了切替） === */
.chip{appearance:none;border:none;font:inherit;font-size:12px;font-weight:600;background:#eef0f4;color:var(--text);padding:6px 11px;border-radius:8px;cursor:pointer;line-height:1.3;border:1.5px solid transparent;transition:all .15s;display:inline-flex;align-items:center;gap:3px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip:active{transform:scale(.94)}
.chip.cat-morning{background:#dceeff;color:#0a4a82}
.chip.cat-lunch{background:#e6e2ff;color:#4a3ba8}
.chip.cat-night{background:#fde2e7;color:#7a2d44}
.chip.cat-night.ex-WT{background:#ffe4cf;color:#7a3e10}
.chip.cat-night.ex-ハンド{background:#d4f0f5;color:#1c5664}
.chip.cat-daily{background:#dff5e3;color:#1d6435}
.chip.cat-special{background:#fff3cf;color:#6e4c0a}
.chip.cat-rest{background:#ffd9df;color:#7a2d44}
.chip.cat-custom{background:#ede0ff;color:#5a2d8a;border-color:#c850dc}
.chip.cat-custom.done{background:var(--done) !important;color:#fff !important}
.chip.chip-add{background:#fff;border:1.5px dashed #c850dc;color:#c850dc;font-weight:800}
.chip.done{background:var(--done) !important;color:#fff !important;border-color:transparent}
.chip.done .label{text-decoration:line-through;opacity:.85}
.chip .check{font-weight:900;font-size:11px}
.chip .chip-act{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.15);color:#fff;font-size:10px;margin-left:3px;cursor:pointer;font-weight:700}
.chip .chip-act:active{transform:scale(.85)}
.chip.done .chip-act{background:rgba(255,255,255,.35);color:#fff}

/* === CALENDAR VIEW === */
.cal{padding:0 8px 24px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:4px 0}
.cal-dow.sat{color:#0a84ff}
.cal-dow.sun{color:#ff453a}
.cal-cell{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:4px;min-height:90px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.normal{background:#eaf3ff}
.cal-cell.cheat{background:#ffeef1}
.cal-cell.special{background:linear-gradient(180deg,#e6f7ea 0%,#e6f7ea 50%,#fff5d4 50%,#fff5d4 100%)}
.cal-cell.today{box-shadow:0 0 0 2px #0a84ff}
.cal-cell.past{opacity:.55;filter:saturate(.6)}
.cal-cell.past:hover{opacity:.85}
.cal-cell .head{display:flex;align-items:baseline;gap:3px}
.cal-cell .num{font-size:13px;font-weight:800}
.cal-cell .num.sun{color:#ff453a}
.cal-cell .num.sat{color:#0a84ff}
.cal-cell .small-tag{font-size:8px;color:var(--muted);font-weight:700}
.cal-cell .chips-mini{display:flex;flex-direction:column;gap:2px;flex:1}
.cal-cell .chip-mini{appearance:none;border:none;font-size:10px;font-weight:600;padding:2px 5px;border-radius:5px;text-align:left;line-height:1.2;cursor:pointer;background:rgba(255,255,255,.7);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid rgba(0,0,0,.05)}
.cal-cell .chip-mini.done{background:var(--done);color:#fff;text-decoration:line-through}
.cal-cell .chip-mini.cat-morning{border-left:3px solid var(--c-morning)}
.cal-cell .chip-mini.cat-lunch{border-left:3px solid var(--c-lunch)}
.cal-cell .chip-mini.cat-night{border-left:3px solid var(--c-night-mma)}
.cal-cell .chip-mini.cat-night.ex-WT{border-left-color:var(--c-night-wt)}
.cal-cell .chip-mini.cat-night.ex-ハンド{border-left-color:var(--c-night-hand)}
.cal-cell .chip-mini.cat-daily{border-left:3px solid var(--c-daily)}
.cal-cell .chip-mini.cat-special{border-left:3px solid var(--c-special)}
.cal-cell .chip-mini.cat-rest{border-left:3px solid var(--c-rest)}
.cal-cell .chip-mini.cat-custom{border-left:3px solid #c850dc;background:#f5edff}
.cal-cell .chip-mini.cat-custom.done{background:var(--done);color:#fff}
.cal-cell .chip-mini.chip-add{background:#fff;border:1px dashed #c850dc;color:#c850dc;text-align:center;font-weight:800}

.toolbar{display:flex;gap:7px;padding:6px 12px 18px;flex-wrap:wrap}
.toolbar button{flex:1;min-width:100px;background:#fff;border:1px solid var(--line);padding:9px;border-radius:9px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer}
.toolbar button.danger{color:#c43;border-color:#fbb}

/* === 更新ボタン＆Pull-to-refresh === */
.refresh-btn{position:fixed;top:10px;right:10px;z-index:11;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1.5px solid var(--line);width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:transform .15s}
.refresh-btn:active{transform:rotate(180deg) scale(.9)}
.ptr-indicator{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-60px);width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:1000;display:flex;align-items:center;justify-content:center;font-size:22px;color:#1a3a52;pointer-events:none;transition:transform .25s ease-out;font-weight:900}
.ptr-indicator.show{transform:translateX(-50%) translateY(20px)}
.ptr-indicator.ready{background:#34c759;color:#fff}
.ptr-indicator.refreshing{animation:ptrSpin .8s linear infinite;background:#0a84ff;color:#fff}
@keyframes ptrSpin{from{transform:translateX(-50%) translateY(20px) rotate(0)}to{transform:translateX(-50%) translateY(20px) rotate(360deg)}}

@media (min-width:720px){
  .charts{grid-template-columns:repeat(4,1fr)}
  .cat-bars{grid-template-columns:repeat(5,1fr)}
  .cal-cell{min-height:130px}
}

/* === 日記機能 === */
.list-day .date-col{cursor:pointer;position:relative}
.list-day .date-col:active{opacity:.7}
.list-day .date-col .diary-mark{font-size:11px;margin-top:2px;color:#0a84ff}
.cal-cell .diary-mark{position:absolute;top:2px;right:4px;font-size:9px;color:#0a84ff;font-weight:700}
.diary-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.diary-modal-bg.show{opacity:1;pointer-events:auto}
.diary-modal{background:#fff;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 16px 30px;transform:translateY(100%);transition:transform .3s ease}
.diary-modal-bg.show .diary-modal{transform:translateY(0)}
.diary-modal .grip{width:42px;height:5px;background:#ddd;border-radius:999px;margin:0 auto 14px}
.diary-modal h2{margin:0 0 8px;font-size:18px;font-weight:800}
.diary-modal .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.diary-modal textarea{width:100%;min-height:280px;border:2px solid var(--line);border-radius:12px;padding:12px;font:inherit;font-size:14px;resize:vertical}
.diary-modal textarea:focus{border-color:#0a84ff;outline:none}
.diary-modal .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.diary-modal .actions button{appearance:none;border:none;border-radius:10px;padding:12px;font:inherit;font-weight:800;font-size:13px;cursor:pointer}
.diary-modal .b-close{background:#eee;color:#666}
.diary-modal .b-clear{background:#ffd9df;color:#c43}
.diary-toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:rgba(20,200,90,.95);color:#fff;padding:10px 20px;border-radius:999px;font-weight:700;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:200}
.diary-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (min-width:600px){
  .diary-modal-bg{align-items:center}
  .diary-modal{border-radius:20px;max-height:85vh}
}
</style>
</head>
<body>

<header>
  <h1>2026 活動トラッカー</h1>
  <div class="row">
    <div class="month-tabs" id="monthTabs"></div>
    <div class="view-toggle">
      <button id="vList" class="active" onclick="setView('list')">リスト</button>
      <button id="vRecord" onclick="setView('record')">📋 記録</button>
      <button class="jump-today" onclick="jumpToToday()" title="今日のタスクへジャンプ">📅 今日</button>
    </div>
  </div>
</header>

<button class="refresh-btn" onclick="forceReload()" title="最新を取得（キャッシュ無視）">🔄</button>
<div class="ptr-indicator" id="ptrIndicator">↓</div>

<div id="streakBanner"></div>

<div class="summary" id="summary"></div>

<div class="charts" id="charts"></div>

<div id="content"></div>

<div class="toolbar">
  <button onclick="exportJSON()">JSON書き出し</button>
  <button onclick="importJSON()">JSON読み込み</button>
  <button class="danger" onclick="resetMonth()">この月リセット</button>
</div>

<div class="diary-modal-bg" id="diaryBg" onclick="if(event.target===this)closeDiary()">
  <div class="diary-modal">
    <div class="grip"></div>
    <h2 id="diaryTitle">📝 日記</h2>
    <div class="sub" id="diarySub">自動保存されます。閉じてOK。</div>
    <textarea id="diaryBox" placeholder="今日あったこと・反省・気づきを自由に書く（音声入力もOK：マイク🎤）" oninput="onDiaryInput()"></textarea>
    <div class="actions">
      <button class="b-clear" onclick="clearDiary()">この日の日記を削除</button>
      <button class="b-close" onclick="closeDiary()">閉じる</button>
    </div>
  </div>
</div>
<div class="diary-toast" id="diaryToast"></div>

<script>
// ===== 予定（calendar_v43.py 同期） =====
const PRESETS = {
  4: {cheat:[5,12,13,19,26], special:{4:"筑前町",11:"筑前町",18:"筑前町",25:"柳川",29:"筑前町"}},
  5: {cheat:[2,3,4,10,17,24,31], special:{5:"筑前町",6:"柳川",30:"筑前町"}},
  6: {cheat:[7,14,21,28], special:{6:"柳川",13:"筑前町",20:"柳川",27:"筑前町"}},
  7: {cheat:[5,12,19,26], special:{4:"柳川",11:"筑前町",18:"柳川",20:"筑前町",25:"柳川"}},
};
const THEMES = ["CAE","SW電","機械","板金","溶接","塗装","電気","SW"];
const THEME_START = {4:0, 5:4, 6:1, 7:7}; // calendar_v43.py 値
const WT_ROT = ["SW","BP","DR"];
const WD_JP = ["日","月","火","水","木","金","土"];

const CHART_COLORS = {
  "普通":"#5ab4ff","チート":"#ffa0b4","特別":"#78d28c",
  "WT":"#e68c3c","MMA":"#c850dc","ハンド":"#64c8dc"
};

// ===== ストレージ =====
const KEY = "tracker2026_v2";
function loadState(){ try{ return JSON.parse(localStorage.getItem(KEY)||"{}"); }catch(e){return {}} }
function saveState(s){ localStorage.setItem(KEY, JSON.stringify(s)); }
let state = loadState();
function getDayState(m,d){
  const k = `${m}-${d}`;
  state[k] = state[k] || {};
  return state[k];
}

// ===== 日生成 =====
function daysInMonth(m){ return new Date(2026, m, 0).getDate(); }
function dayType(m, d){
  const p = PRESETS[m];
  if(p.cheat.includes(d)) return "チート";
  if(p.special[d]) return "特別";
  return "普通";
}
function buildMonth(m){
  const days = [];
  const total = daysInMonth(m);
  let normalIdx = 0, wtIdx = 0;
  for(let d=1; d<=total; d++){
    const t = dayType(m,d);
    const wd = new Date(2026, m-1, d).getDay();
    let theme=null, night=null, wtRot=null, isSpur=false, loc=null;
    if(t === "普通"){
      theme = THEMES[(THEME_START[m]+normalIdx) % 8];
      normalIdx++;
      // 0=日,1=月,2=火,3=水,4=木,5=金,6=土
      if(wd===2) night="ハンド";
      else if(wd===4 || wd===6){
        night="WT";
        wtRot = WT_ROT[wtIdx % 3];
        wtIdx++;
      }
      else if(wd===5){ night="MMA"; isSpur=true; }
      else night="MMA";
    } else if(t === "特別"){
      loc = PRESETS[m].special[d];
    }
    days.push({d, wd, type:t, theme, night, wtRot, isSpur, loc});
  }
  return days;
}

// ===== タスク生成 =====
function tasksOf(day){
  if(day.type === "チート"){
    return [{id:"cheat", label:"チート(休養)", cat:"rest"}];
  }
  if(day.type === "特別"){
    const locText = day.loc==="筑前町" ? "筑前町支部 9:00~16:30" : "柳川支部 10:00~20:00";
    return [
      {id:"loc", label:locText, cat:"special"},
      {id:"sp1", label:"①発明工作", cat:"special"},
      {id:"sp2", label:"②AI", cat:"special"},
      {id:"sp3", label:"③算数", cat:"special"},
      {id:"sp4", label:"④仕事復習", cat:"special"},
      {id:"sp5", label:"⑤疑問", cat:"special"},
      {id:"sp6", label:"⑥哲学", cat:"special"},
      {id:"sp7", label:"⑦勉強効率化", cat:"special"},
      {id:"sp8", label:"⑧ADHD研究", cat:"special"},
    ];
  }
  // 普通
  const tasks = [
    {id:"morning", label:`朝:新聞+${day.theme}`, cat:"morning"},
    {id:"lunch", label:"昼:科学雑誌+マクロ30", cat:"lunch"},
  ];
  let nLabel;
  if(day.night==="WT") nLabel = `夜:WT(${day.wtRot})`;
  else if(day.night==="MMA" && day.isSpur) nLabel = "夜:MMA(スパー)";
  else if(day.night==="MMA") nLabel = "夜:MMA";
  else nLabel = "夜:ハンドボール";
  tasks.push({id:"night", label:nLabel, cat:"night", ex:day.night});
  tasks.push({id:"daily", label:"算25+復習", cat:"daily"});
  return tasks;
}

// ===== 集計 =====
function tally(m){
  const days = buildMonth(m);
  // 予定 day-type / night
  const planDay = {"普通":0,"チート":0,"特別":0};
  const planNight = {"WT":0,"MMA":0,"ハンド":0};
  // 実績 (タスクベース)
  const cats = {morning:[0,0], lunch:[0,0], night:[0,0], daily:[0,0], special:[0,0], rest:[0,0], custom:[0,0]};
  // 実績 day-type / night (達成日カウント)
  const actDay = {"普通":0,"チート":0,"特別":0};
  const actNight = {"WT":0,"MMA":0,"ハンド":0};
  let totalPlan=0, totalDone=0;

  days.forEach(x=>{
    planDay[x.type]++;
    if(x.night) planNight[x.night]++;
    const tks = tasksOf(x);
    const s = getDayState(m, x.d);
    let dayDone = 0;
    tks.forEach(tk=>{
      cats[tk.cat][1]++;
      totalPlan++;
      if(s[tk.id]){
        cats[tk.cat][0]++;
        totalDone++;
        dayDone++;
      }
    });
    // カスタムタスクも集計
    if(s.__custom__ && s.__custom__.length){
      s.__custom__.forEach(t=>{
        cats.custom[1]++;
        totalPlan++;
        if(s[t.id]){
          cats.custom[0]++;
          totalDone++;
          dayDone++;
        }
      });
    }
    // その日の主タスクが1つ以上完了 → 実績日カウント
    if(dayDone > 0){
      actDay[x.type]++;
      if(x.type==="普通" && x.night && s.night) actNight[x.night]++;
    }
  });
  return {days, planDay, planNight, actDay, actNight, cats, totalPlan, totalDone};
}

// ===== 円グラフ =====
function pieSVG(segs, size=130){
  const total = segs.reduce((a,b)=>a+b.val,0);
  const r = size/2 - 4;
  const cx=size/2, cy=size/2;
  if(total===0) return `<svg viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#eee"/><text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="#999" font-size="11">未達成</text></svg>`;
  let acc = -90;
  let parts = "";
  segs.forEach(s=>{
    if(s.val===0) return;
    const ang = 360*s.val/total;
    const start = acc, end = acc+ang;
    const x1 = cx + r*Math.cos(start*Math.PI/180);
    const y1 = cy + r*Math.sin(start*Math.PI/180);
    const x2 = cx + r*Math.cos(end*Math.PI/180);
    const y2 = cy + r*Math.sin(end*Math.PI/180);
    const large = ang>180?1:0;
    if(ang>=359.99){
      parts += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}"/>`;
    } else {
      parts += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${s.color}" stroke="#fff" stroke-width="2"/>`;
    }
    const mid = (start+end)/2;
    const lx = cx + r*0.6*Math.cos(mid*Math.PI/180);
    const ly = cy + r*0.6*Math.sin(mid*Math.PI/180);
    const pct = Math.round(100*s.val/total);
    if(pct>=8){
      parts += `<text x="${lx}" y="${ly}" fill="#fff" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle">${pct}%</text>`;
    }
    acc = end;
  });
  return `<svg viewBox="0 0 ${size} ${size}">${parts}</svg>`;
}

function legendHTML(segs){
  return `<div class="legend">${segs.filter(s=>s.val>0).map(s=>`<span><i style="background:${s.color}"></i>${s.name} ${s.val}</span>`).join("")}</div>`;
}

function isPastDay(m, d){
  const today = new Date();
  if(today.getFullYear() !== 2026) return today.getFullYear() > 2026;
  const tm = today.getMonth()+1, td = today.getDate();
  if(m < tm) return true;
  if(m > tm) return false;
  return d < td;
}

function renderList(){
  const days = buildMonth(currentMonth);
  const today = new Date();
  const isToday = (d)=> today.getFullYear()===2026 && today.getMonth()+1===currentMonth && today.getDate()===d;
  const html = days.map(x=>{
    const tks = tasksOf(x);
    const s = getDayState(currentMonth, x.d);
    const wdCls = x.wd===6?"sat":(x.wd===0?"sun":"");
    const typeCls = x.type==="普通"?"normal":(x.type==="チート"?"cheat":"special");
    const todayCls = isToday(x.d)?"today":"";
    const tagText = x.type==="普通"?"10分":(x.type==="チート"?"チート":"特別");
    let chips = tks.map(tk=>{
      const done = !!s[tk.id];
      const exCls = tk.ex ? `ex-${tk.ex}` : "";
      return `<button class="chip cat-${tk.cat} ${exCls} ${done?'done':''}" onclick="toggleTask(${currentMonth},${x.d},'${tk.id}')"><span class="check">${done?'✓':''}</span><span class="label">${tk.label}</span></button>`;
    }).join("");
    // カスタムタスク
    if(s.__custom__ && s.__custom__.length){
      chips += s.__custom__.map(t=>{
        const done = !!s[t.id];
        const safeLabel = t.label.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        return `<button class="chip cat-custom ${done?'done':''}" onclick="toggleTask(${currentMonth},${x.d},'${t.id}')"><span class="check">${done?'✓':''}</span><span class="label">${safeLabel}</span><span class="chip-act" onclick="event.stopPropagation();editCustomTask(${currentMonth},${x.d},'${t.id}')" title="編集">✏</span><span class="chip-act" onclick="event.stopPropagation();delCustomTask(${currentMonth},${x.d},'${t.id}')" title="削除">×</span></button>`;
      }).join("");
    }
    // 追加ボタン
    chips += `<button class="chip chip-add" onclick="addCustomTask(${currentMonth},${x.d})" title="タスク追加">+ 追加</button>`;
    const diaryMark = hasDiary(currentMonth, x.d) ? `<div class="diary-mark">📝</div>` : `<div class="diary-mark" style="opacity:.25">📝</div>`;
    const pastCls = isPastDay(currentMonth, x.d) ? "past" : "";
    return `

    `;
  }).join("");
  return `<div class="list">${html}</div>`;
}

// ===== 活動継続日 =====
function getStreakDays(){
  if(!state.streakStart) return null;
  const start = new Date(state.streakStart + "T00:00:00");
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / (1000*60*60*24)) + 1;
  return diff;
}
function editStreak(){
  const cur = state.streakStart || "";
  const input = prompt("活動を始めた日を入力（例：2026-05-01）\n空欄でEnterすると解除", cur || "2026-05-01");
  if(input === null) return;
  const v = input.trim();
  if(!v){
    delete state.streakStart;
    saveState(state);
    diaryToast("継続日カウントを解除");
    render();
    return;
  }
  if(!/^\d{4}-\d{2}-\d{2}$/.test(v)){
    alert("YYYY-MM-DD の形式で入れてね（例：2026-05-01）");
    return;
  }
  state.streakStart = v;
  saveState(state);
  diaryToast("✓ 活動継続日を設定");
  render();
}
function formatStreak(days){
  // 1年=365日, 1ヶ月=30日 で近似（人が感覚で分かる表記）
  const y = Math.floor(days/365);
  const rem = days - y*365;
  const mo = Math.floor(rem/30);
  const d = rem - mo*30;
  if(y > 0) return y + "年" + (mo > 0 ? mo + "ヶ月" : "");
  if(mo > 0) return mo + "ヶ月" + (d > 0 ? d + "日" : "");
  return days + "日";
}
function renderStreak(){
  const el = document.getElementById("streakBanner");
  if(!el) return;
  const days = getStreakDays();
  if(days === null){
    el.innerHTML = `<div class="streak-banner unset">
      <div class="sb-fire">🔥</div>
      <div class="sb-main">
        <div class="sb-days">活動継続日 <small>未設定</small></div>
        <div class="sb-sub">始めた日を入れると毎日カウント</div>
      </div>
      <button class="sb-edit" onclick="editStreak()">設定する</button>
    </div>`;
    return;
  }
  const startLabel = state.streakStart.replace(/^\d{4}-/, '').replace('-', '/');
  el.innerHTML = `<div class="streak-banner">
    <div class="sb-fire">🔥</div>
    <div class="sb-main">
      <div class="sb-days">${formatStreak(days)}<small> 継続中！</small></div>
      <div class="sb-sub">${startLabel} から（通算${days}日）</div>
    </div>
    <button class="sb-edit" onclick="editStreak()">変更</button>
  </div>`;
}

  const days = buildMonth(currentMonth);
  const today = new Date();
  const isToday = (d)=> today.getFullYear()===2026 && today.getMonth()+1===currentMonth && today.getDate()===d;
  const dayMap = {};
  days.forEach(x=>dayMap[x.d]=x);

  // 日曜起点グリッド
  const first = new Date(2026, currentMonth-1, 1).getDay(); // 0=日
  const total = daysInMonth(currentMonth);
  const cells = [];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1; d<=total; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);

  const dowHTML = ["日","月","火","水","木","金","土"].map((w,i)=>{
    const cls = i===0?"sun":(i===6?"sat":"");
    return `<div class="cal-dow ${cls}">${w}</div>`;
  }).join("");

  const cellsHTML = cells.map(d=>{
    if(!d) return `<div class="cal-cell empty"></div>`;
    const x = dayMap[d];
    const tks = tasksOf(x);
    const s = getDayState(currentMonth, d);
    const typeCls = x.type==="普通"?"normal":(x.type==="チート"?"cheat":"special");
    const todayCls = isToday(d)?"today":"";
    const numCls = x.wd===0?"sun":(x.wd===6?"sat":"");
    const tagShort = x.type==="チート"?"チート":(x.type==="特別"?"特別":"");
    let chipsMini = tks.map(tk=>{
      const done = !!s[tk.id];
      const exCls = tk.ex ? `ex-${tk.ex}` : "";
      return `<button class="chip-mini cat-${tk.cat} ${exCls} ${done?'done':''}" onclick="toggleTask(${currentMonth},${d},'${tk.id}')" title="${tk.label}">${tk.label}</button>`;
    }).join("");
    if(s.__custom__ && s.__custom__.length){
      chipsMini += s.__custom__.map(t=>{
        const done = !!s[t.id];
        const safeLabel = t.label.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        return `<button class="chip-mini cat-custom ${done?'done':''}" onclick="toggleTask(${currentMonth},${d},'${t.id}')" title="${safeLabel}">${safeLabel}</button>`;
      }).join("");
    }
    chipsMini += `<button class="chip-mini chip-add" onclick="addCustomTask(${currentMonth},${d})" title="タスク追加">+</button>`;
    const dMark = hasDiary(currentMonth, d) ? `<span class="diary-mark">📝</span>` : "";
    const pastCls = isPastDay(currentMonth, d) ? "past" : "";
    return `
      <div class="cal-cell ${typeCls} ${todayCls} ${pastCls}" ondblclick="openDiary(${currentMonth},${d})">
        <div class="head">
          <span class="num ${numCls}" onclick="event.stopPropagation();openDiary(${currentMonth},${d})" style="cursor:pointer" title="タップで日記">${d}</span>
          <span class="small-tag">${tagShort}</span>
        </div>
        ${dMark}
        <div class="chips-mini">${chipsMini}</div>
      </div>
    `;
  }).join("");

  return `<div class="cal"><div class="cal-grid">${dowHTML}${cellsHTML}</div></div>`;
}

// ===== 操作 =====
function toggleTask(m,d,id){
  const s = getDayState(m,d);
  s[id] = !s[id];
  if(!s[id]) delete s[id];
  saveState(state);
  render();
}

// ===== カスタムタスク（追加・編集・削除） =====
function addCustomTask(m,d){
  const label = prompt("追加するタスク名（例：歯医者・コンビニ・読書）", "");
  if(!label || !label.trim()) return;
  const s = getDayState(m,d);
  if(!s.__custom__) s.__custom__ = [];
  s.__custom__.push({
    id: `c_${Date.now()}`,
    label: label.trim(),
    cat: "custom"
  });
  saveState(state);
  render();
}

function editCustomTask(m,d,id){
  const s = getDayState(m,d);
  if(!s.__custom__) return;
  const task = s.__custom__.find(t=>t.id===id);
  if(!task) return;
  const newLabel = prompt("新しい名前", task.label);
  if(!newLabel || !newLabel.trim()) return;
  task.label = newLabel.trim();
  saveState(state);
  render();
}

function delCustomTask(m,d,id){
  const s = getDayState(m,d);
  if(!s.__custom__) return;
  const task = s.__custom__.find(t=>t.id===id);
  if(!task) return;
  if(!confirm(`「${task.label}」を削除？`)) return;
  s.__custom__ = s.__custom__.filter(t=>t.id!==id);
  delete s[id];
  saveState(state);
  render();
}

function resetMonth(){
  if(!confirm(`${currentMonth}月の実績を全消去します。よろしい？`)) return;
  const total = daysInMonth(currentMonth);
  for(let d=1; d<=total; d++) delete state[`${currentMonth}-${d}`];
  saveState(state);
  render();
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `tracker_2026_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== 日記機能 =====
const DIARY_KEY = "__diary__";
let openDiary_m = null, openDiary_d = null;
let diaryToastTimer;

function hasDiary(m,d){
  const s = state[`${m}-${d}`];
  return !!(s && s[DIARY_KEY] && s[DIARY_KEY].length);
}

function diaryToast(msg){
  const el = document.getElementById("diaryToast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(diaryToastTimer);
  diaryToastTimer = setTimeout(()=>el.classList.remove("show"), 1500);
}

function openDiary(m,d){
  openDiary_m = m;
  openDiary_d = d;
  document.getElementById("diaryBg").classList.add("show");
  const s = getDayState(m,d);
  const wd = ["日","月","火","水","木","金","土"][new Date(2026, m-1, d).getDay()];
  document.getElementById("diaryTitle").textContent = `📝 ${m}月${d}日（${wd}）の日記`;
  document.getElementById("diaryBox").value = s[DIARY_KEY] || "";
  setTimeout(()=>document.getElementById("diaryBox").focus(), 100);
}

function closeDiary(){
  openDiary_m = null;
  openDiary_d = null;
  document.getElementById("diaryBg").classList.remove("show");
  render();
}

function onDiaryInput(){
  if(openDiary_m===null) return;
  const txt = document.getElementById("diaryBox").value;
  const s = getDayState(openDiary_m, openDiary_d);
  if(txt) s[DIARY_KEY] = txt;
  else delete s[DIARY_KEY];
  saveState(state);
  diaryToast("✓ 自動保存");
}

function clearDiary(){
  if(openDiary_m===null) return;
  if(!confirm("この日の日記を削除します。よろしい？")) return;
  const s = getDayState(openDiary_m, openDiary_d);
  delete s[DIARY_KEY];
  saveState(state);
  document.getElementById("diaryBox").value = "";
  diaryToast("削除した");
}

function importJSON(){
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "application/json";
  inp.onchange = e=>{
    const f = e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const data = JSON.parse(r.result);
        if(confirm("既存データを上書きします。よろしい？")){
          state = data;
          saveState(state);
          render();
        }
      }catch(err){ alert("JSON読込失敗: "+err.message); }
    };
    r.readAsText(f);
  };
  inp.click();
}

// ===== 今日ボタン =====
function jumpToToday(){
  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth()+1;
  if(y !== 2026 || ![4,5,6,7].includes(m)){
    alert("今日は対応月（2026/4〜7）外です");
    return;
  }
  // 記録ビューにいたらリストに切替
  if(currentView !== "list"){
    setView("list");
  }
  if(currentMonth !== m){
    currentMonth = m;
    render();
  }
  setTimeout(()=>{
    const todayEl = document.querySelector('.list-day.today');
    if(todayEl){
      todayEl.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }, 150);
}

// ===== 更新ボタン＆Pull-to-refresh =====
function forceReload(){
  const url = new URL(location.href);
  url.searchParams.set('_t', Date.now());
  location.href = url.toString();
}
(function setupPullToRefresh(){
  let startY = 0, currentY = 0, pulling = false;
  const threshold = 80;
  function getIndicator(){ return document.getElementById('ptrIndicator'); }
  window.addEventListener('touchstart', e => {
    if(window.scrollY === 0 && e.touches.length === 1){
      startY = e.touches[0].clientY;
      currentY = startY;
      pulling = true;
    }
  }, {passive: true});
  window.addEventListener('touchmove', e => {
    if(!pulling) return;
    currentY = e.touches[0].clientY;
    const dist = currentY - startY;
    const ind = getIndicator();
    if(dist > 10){
      if(ind){
        ind.classList.add('show');
        ind.classList.toggle('ready', dist > threshold);
        ind.textContent = dist > threshold ? '✓' : '↓';
      }
    }
  }, {passive: true});
  window.addEventListener('touchend', () => {
    if(!pulling) return;
    const dist = currentY - startY;
    const ind = getIndicator();
    if(dist > threshold){
      if(ind){
        ind.classList.add('refreshing');
        ind.textContent = '🔄';
      }
      setTimeout(forceReload, 200);
    } else {
      if(ind){
        ind.classList.remove('show','ready');
        ind.textContent = '↓';
      }
    }
    pulling = false;
    startY = 0;
    currentY = 0;
  }, {passive: true});
})();

// 初期表示を記録タブに（毎回トップは記録）
setView("record");
render();
</script>

<!-- ===== 共通：フローティング付箋メモパッド ===== -->
<script>
(function(){
  const MEMOPAD_KEY = "memopad_tracker"; // ★アプリごとに変える
  const COLORS = [
    {name:"yellow", bg:"#fff3b0", bar:"#f5c500"},
    {name:"pink",   bg:"#ffd6e0", bar:"#ff5e8a"},
    {name:"blue",   bg:"#cfe8ff", bar:"#0a84ff"},
    {name:"green",  bg:"#d2f5d6", bar:"#34c759"}
  ];
  // ---- CSS注入 ----
  const css = `
  .mp-fab{position:fixed;right:14px;bottom:18px;z-index:300;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(135deg,#ffb300,#ff7a00);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 14px rgba(255,122,0,.45);display:flex;align-items:center;justify-content:center}
  .mp-fab:active{transform:scale(.92)}
  .mp-fab .mp-badge{position:absolute;top:-2px;right:-2px;background:#ff3b30;color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid #fff}
  .mp-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:301;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
  .mp-bg.show{opacity:1;pointer-events:auto}
  .mp-panel{background:#f5f5f7;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:16px 14px 28px;transform:translateY(100%);transition:transform .3s ease}
  .mp-bg.show .mp-panel{transform:translateY(0)}
  .mp-grip{width:42px;height:5px;background:#ccc;border-radius:999px;margin:0 auto 14px}
  .mp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .mp-head h2{margin:0;font-size:18px;font-weight:800;color:#1d1d1f}
  .mp-head .mp-close{background:#e5e5ea;border:none;color:#555;font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;cursor:pointer}
  .mp-add{display:flex;gap:8px;margin-bottom:14px}
  .mp-add button{flex:1;background:#1d1d1f;color:#fff;border:none;padding:13px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer}
  .mp-add button:active{transform:scale(.98)}
  .mp-list{display:flex;flex-direction:column;gap:10px}
  .mp-note{border-radius:12px;padding:12px;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.08);border-left:5px solid}
  .mp-note textarea{width:100%;min-height:48px;border:none;background:transparent;font:inherit;font-size:14px;line-height:1.5;resize:vertical;color:#3a2d00}
  .mp-note textarea:focus{outline:none}
  .mp-note .mp-foot{display:flex;align-items:center;gap:6px;margin-top:6px}
  .mp-note .mp-colors{display:flex;gap:5px;flex:1}
  .mp-note .mp-colors span{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid rgba(0,0,0,.1)}
  .mp-note .mp-colors span.sel{border-color:#1d1d1f;transform:scale(1.15)}
  .mp-note .mp-del{background:rgba(0,0,0,.08);border:none;color:#a00;font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer}
  .mp-note .mp-time{font-size:10px;color:rgba(0,0,0,.4);margin-right:auto;font-weight:600}
  .mp-empty{text-align:center;color:#999;font-size:13px;padding:30px 10px}
  `;
  const styleEl = document.createElement("style");
  styleEl.textContent = css;
  document.head.appendChild(styleEl);

  // ---- DOM生成 ----
  const fab = document.createElement("button");
  fab.className = "mp-fab";
  fab.innerHTML = `📌<span class="mp-badge" id="mpBadge" style="display:none">0</span>`;
  fab.onclick = openPad;
  document.body.appendChild(fab);

  const bg = document.createElement("div");
  bg.className = "mp-bg";
  bg.id = "mpBg";
  bg.innerHTML = `<div class="mp-panel">
    <div class="mp-grip"></div>
    <div class="mp-head"><h2>📌 付箋メモ</h2><button class="mp-close">閉じる</button></div>
    <div class="mp-add"><button>＋ 新しい付箋を追加</button></div>
    <div class="mp-list" id="mpList"></div>
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener("click", e=>{ if(e.target===bg) closePad(); });
  bg.querySelector(".mp-close").onclick = closePad;
  bg.querySelector(".mp-add button").onclick = addNote;

  // ---- データ ----
  function load(){ try{ return JSON.parse(localStorage.getItem(MEMOPAD_KEY)||"[]"); }catch(e){ return []; } }
  function save(arr){ try{ localStorage.setItem(MEMOPAD_KEY, JSON.stringify(arr)); }catch(e){} }
  let notes = load();

  function updateBadge(){
    const b = document.getElementById("mpBadge");
    if(!b) return;
    if(notes.length){ b.style.display="flex"; b.textContent = notes.length; }
    else b.style.display="none";
  }
  function openPad(){ document.getElementById("mpBg").classList.add("show"); renderNotes(); }
  function closePad(){ document.getElementById("mpBg").classList.remove("show"); }

  function addNote(){
    notes.unshift({id:Date.now(), text:"", color:"yellow", ts:new Date().toISOString()});
    save(notes); renderNotes(); updateBadge();
    setTimeout(()=>{ const ta=document.querySelector(".mp-note textarea"); if(ta) ta.focus(); },80);
  }
  function editNote(id, text){ const n=notes.find(x=>x.id===id); if(n){ n.text=text; save(notes); } }
  function colorNote(id, c){ const n=notes.find(x=>x.id===id); if(n){ n.color=c; save(notes); renderNotes(); } }
  function delNote(id){ if(!confirm("この付箋を消す？")) return; notes=notes.filter(x=>x.id!==id); save(notes); renderNotes(); updateBadge(); }

  window.mpEdit=editNote; window.mpColor=colorNote; window.mpDel=delNote;

  function renderNotes(){
    const list = document.getElementById("mpList");
    if(!notes.length){ list.innerHTML = `<div class="mp-empty">付箋なし。<br>「＋ 新しい付箋を追加」で書ける</div>`; return; }
    list.innerHTML = notes.map(n=>{
      const col = COLORS.find(c=>c.name===n.color)||COLORS[0];
      const t = new Date(n.ts);
      const tt = `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
      const safe = (n.text||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const colorsHtml = COLORS.map(c=>`<span style="background:${c.bar}" class="${c.name===n.color?'sel':''}" onclick="mpColor(${n.id},'${c.name}')"></span>`).join("");
      return `<div class="mp-note" style="background:${col.bg};border-left-color:${col.bar}">
        <textarea placeholder="メモを書く…" oninput="mpEdit(${n.id},this.value)">${safe}</textarea>
        <div class="mp-foot">
          <span class="mp-time">${tt}</span>
          <div class="mp-colors">${colorsHtml}</div>
          <button class="mp-del" onclick="mpDel(${n.id})">削除</button>
        </div>
      </div>`;
    }).join("");
  }
  updateBadge();
})();
</script>
