<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1a1a2e">
<title>活動トラッカー 2026</title>
<style>
:root{
  --c-normal:rgba(203,227,255,.25);
  --c-cheat:rgba(255,204,209,.25);
  --c-special-top:rgba(204,244,210,.25);
  --c-special-bot:rgba(253,234,174,.25);
  --c-morning:#5ab4ff;
  --c-lunch:#a99cff;
  --c-night-mma:#c850dc;
  --c-night-wt:#e68c3c;
  --c-night-hand:#64c8dc;
  --c-daily:#34c759;
  --c-special:#76b347;
  --c-rest:#ff85a0;
  --bg:#0f0f1a;
  --card:rgba(255,255,255,.08);
  --glass:rgba(255,255,255,.12);
  --glass-border:rgba(255,255,255,.18);
  --line:rgba(255,255,255,.1);
  --text:#f0f0f5;
  --muted:rgba(255,255,255,.5);
  --done:#34c759;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,"Hiragino Sans","Yu Gothic UI","Segoe UI",sans-serif;font-size:15px;line-height:1.5;overscroll-behavior-y:none}
.dv, .dv *{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.dv input, .dv textarea, .dv select{-webkit-user-select:text;user-select:text}
body{background:linear-gradient(135deg,#0f0f1a 0%,#1a1040 30%,#0d2137 60%,#0f1a2e 100%);background-attachment:fixed;min-height:100vh}
body.cal2-lock{overflow:hidden;position:fixed;inset:0;width:100%;background:transparent}
#sky{position:fixed;inset:0;z-index:-3;transition:background .25s linear;display:none}
#sky::after{content:"";position:absolute;inset:0;background:rgba(8,8,20,.35)}
#stars{position:fixed;inset:0;z-index:-2;opacity:0;transition:opacity .8s;pointer-events:none;display:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw 3s infinite ease-in-out}
@keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
#celestial{position:fixed;width:70px;height:70px;border-radius:50%;z-index:-2;left:0;top:0;transition:background .4s,box-shadow .4s;will-change:transform;display:none;pointer-events:none}
body.cal2-lock #sky,body.cal2-lock #stars,body.cal2-lock #celestial{display:block}
@keyframes sparkle{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.sparkle-dot{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:999;animation:sparkle .6s cubic-bezier(.25,.46,.45,.94) forwards;box-shadow:0 0 6px currentColor}

header{position:sticky;top:0;z-index:10;background:rgba(15,15,26,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 12px 4px;border-bottom:1px solid var(--glass-border)}
h1{margin:0 0 6px;font-size:17px;font-weight:700;color:#fff}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.month-tabs{display:flex;gap:5px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch}
.month-tabs button,.view-toggle button{flex:0 0 auto;border:none;background:var(--glass);color:rgba(255,255,255,.7);font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid var(--glass-border);cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:all .2s}
.month-tabs button.active,.view-toggle button.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.35);box-shadow:0 0 12px rgba(100,160,255,.25)}
.month-pager{display:flex;align-items:center;gap:8px;flex:1}
.month-pager .mp-arrow{flex:0 0 auto;border:none;background:var(--glass);color:#fff;font-size:16px;font-weight:800;width:32px;height:32px;border-radius:50%;border:1px solid var(--glass-border);cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.month-pager .mp-arrow:active{transform:scale(.9)}
.month-pager .mp-label{flex:0 0 auto;font-size:15px;font-weight:800;color:#fff;padding:0 2px;cursor:pointer;white-space:nowrap}
.view-toggle{display:flex;gap:5px;margin-left:auto;min-width:0;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none;-ms-overflow-style:none}
.view-toggle::-webkit-scrollbar{display:none}
.jump-today{background:linear-gradient(135deg,#0a84ff,#5ac8fa);color:#fff;border:none;font-size:12px;font-weight:800;padding:8px 12px;border-radius:999px;cursor:pointer;box-shadow:0 2px 12px rgba(10,132,255,.4);transition:transform .1s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.jump-today:active{transform:scale(.94)}
button,.chip,.chip-mini,.dv-week .dw,.month-tabs button,.view-toggle button,.month-pager button,.month-pager .mp-label{touch-action:manipulation}
.ds input,.ds .cbox,.ds .es-line,.ds .es-del-line,.ds .es-toggle{touch-action:manipulation}

/* === iPhone風カレンダー === */
.ical{padding:0 10px 24px}
.ical-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.ical-dow span{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0}
.ical-dow span.sun{color:#ff3b30}
.ical-dow span.sat{color:#0a84ff}
.ical-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ical-cell{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:10px;min-height:76px;padding:6px 2px 5px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:1px solid var(--glass-border);transition:transform .15s,box-shadow .15s}
.ical-cell:active{transform:scale(.95);box-shadow:0 0 16px rgba(100,160,255,.2)}
.ical-cell.empty{background:transparent;border:none;cursor:default;backdrop-filter:none}
.ical-cell.past{opacity:.45;filter:saturate(.5)}
.ical-cell .dnum{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:rgba(255,255,255,.9)}
.ical-cell .dnum.sun{color:#ff6b6b}
.ical-cell .dnum.sat{color:#5ac8fa}
.ical-cell.today .dnum{background:linear-gradient(135deg,#ff3b30,#ff6b6b);color:#fff !important;box-shadow:0 2px 8px rgba(255,59,48,.4)}
.ical-cell .dots{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;max-width:92%}
.ical-cell .dots i{width:6px;height:6px;border-radius:50%;display:inline-block}
.ical-cell .more{font-size:9px;color:var(--muted);font-weight:700}
.ical-cell .done-mini{font-size:9px;color:var(--done);font-weight:800}

/* === 日別シート（iPhone風・下から出る） === */
.ds-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:120;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.ds-bg.show{opacity:1;pointer-events:auto}
.ds{background:rgba(25,25,45,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:16px 14px 30px;transform:translateY(100%);transition:transform .3s ease;border-top:1px solid var(--glass-border)}
.ds-bg.show .ds{transform:translateY(0)}
.ds .grip{width:42px;height:5px;background:rgba(255,255,255,.3);border-radius:999px;margin:0 auto 14px}
.ds h2{margin:0 0 2px;font-size:19px;font-weight:800;color:#fff}
.ds .ds-sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.ds .ds-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.ds .ds-row{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ds .ds-row .bar{width:4px;height:26px;border-radius:2px;flex:0 0 auto}
.ds .ds-row .t{font-size:12px;font-weight:800;color:#5ac8fa;min-width:42px;font-variant-numeric:tabular-nums}
.ds .ds-row .lbl{flex:1;font-size:14px;font-weight:600;cursor:pointer;line-height:1.4;color:#fff}
.ds .ds-row.done{background:rgba(255,255,255,.05)}
.ds .ds-row.done .lbl{text-decoration:line-through;text-decoration-color:rgba(0,0,0,.5);text-decoration-thickness:2px;color:rgba(255,255,255,.4)}
.ds .ds-row .act{appearance:none;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);width:30px;height:30px;border-radius:50%;font-size:13px;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.ds .ds-row .act.del{color:#ff6b6b}
.ds .ds-empty{text-align:center;color:var(--muted);font-size:13px;padding:18px;background:var(--glass);border:1px dashed var(--glass-border);border-radius:12px}
.ds .ds-restore{width:100%;background:var(--glass);border:1.5px dashed rgba(255,255,255,.3);color:rgba(255,255,255,.6);padding:10px;border-radius:10px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:12px}
.ds .ds-form{display:grid;grid-template-columns:1fr auto auto;gap:6px;background:rgba(255,255,255,.08);border:1.5px solid rgba(90,200,250,.4);border-radius:12px;padding:10px}
.ds .ds-form input[type=text]{border:1px solid var(--glass-border);border-radius:8px;padding:10px;font:inherit;font-size:14px;min-width:0;background:rgba(255,255,255,.08);color:#fff}
.ds .ds-form input[type=time]{border:1px solid var(--glass-border);border-radius:8px;padding:8px 6px;font:inherit;font-size:13px;background:rgba(255,255,255,.08);color:#fff}
.ds .ds-form input:focus{outline:none;border-color:#5ac8fa}
.ds .ds-form button{background:linear-gradient(135deg,#0a84ff,#5ac8fa);color:#fff;border:none;border-radius:8px;padding:10px 14px;font:inherit;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}
.ds .ds-form button:active{transform:scale(.96)}

/* プリセット予定にも×（削除）を出す */
.chip .chip-act.preset-del{background:rgba(0,0,0,.1)}
.chip.chip-restore{background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.25);color:rgba(255,255,255,.5);font-weight:700}

/* === iPhone式 日ビュー（縦タイムライン） === */
.dv{padding:0 0 24px}
.dv-head{position:sticky;top:86px;z-index:9;background:rgba(16,14,32,.8);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);border-bottom:1px solid rgba(255,255,255,.1);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.dv-week{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 8px 0;gap:2px;touch-action:pan-y}
.dv-week .dw{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;font:inherit;padding:3px 0;color:var(--text)}
.dv-week .dw .w{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px}
.dv-week .dw .w.sun{color:#ff7b72}
.dv-week .dw .w.sat{color:#6db4ff}
.dv-week .dw .n{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;transition:background .15s,box-shadow .15s}
.dv-week .dw.sel .n{background:linear-gradient(135deg,#7a6eff,#5ac8fa);color:#fff;font-weight:800;box-shadow:0 2px 14px rgba(122,110,255,.55)}
.dv-week .dw.today:not(.sel) .n{color:#ff6b61;font-weight:800}
.dv-week .dw.today.sel .n{background:linear-gradient(135deg,#ff453a,#ff7b61);box-shadow:0 2px 14px rgba(255,69,58,.5)}
.dv-week .dw.out-month{opacity:.35}
.dv-date{font-size:12px;font-weight:600;padding:2px 14px 9px;display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--muted)}
.dv-date .dnum{font-size:15px;font-weight:800;color:#fff;margin-right:2px}
.dv-date .back{background:var(--glass);border:1px solid var(--glass-border);border-radius:999px;padding:6px 11px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;color:rgba(255,255,255,.75)}
.dv-date .back:active{transform:scale(.94)}
.dv-date .back.today{background:linear-gradient(135deg,#0a84ff,#5ac8fa);color:#fff;border-color:transparent}
.dv-allday{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 10px}
.dv-allday .ad-label{font-size:10px;font-weight:800;color:var(--muted);width:100%;margin-bottom:2px}
.dv-scroll{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}
.dv-swipe{overflow:hidden;touch-action:pan-y}
.dv-gridwrap{position:relative;will-change:transform}
.dv-gridwrap.dv-anim{transition:transform .26s cubic-bezier(.32,.72,.28,1)}
.dv-grid{position:relative;margin-left:58px}
.dv-hline{position:absolute;left:0;right:0;height:0;border-top:1px solid rgba(255,255,255,.07)}
.dv-hlabel{position:absolute;left:-58px;width:48px;text-align:right;font-size:10px;color:rgba(255,255,255,.35);transform:translateY(-50%);font-variant-numeric:tabular-nums}
.dv-ev{position:absolute;border-radius:9px;padding:4px 28px 4px 9px;font-size:12px;font-weight:600;color:#fff;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.16);border-left:3px solid rgba(255,255,255,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 10px rgba(0,0,0,.28);transition:transform .15s,box-shadow .15s}
.dv-ev .tm{font-size:10px;opacity:.85;font-weight:600;display:block;line-height:1.25;font-variant-numeric:tabular-nums}
.dv-ev .nm{display:block;line-height:1.3;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.dv-ev.sm{padding:2px 24px 2px 7px}
.dv-ev.sm .tm{display:none}
.dv-ev.done{opacity:.45}
.dv-ev.done .nm{text-decoration:line-through;text-decoration-color:rgba(0,0,0,.55);text-decoration-thickness:2.5px}
.dv-chk{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6);background:rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;z-index:3;cursor:pointer}
.dv-chk::after{content:"";position:absolute;left:50%;top:50%;width:32px;height:32px;transform:translate(-50%,-50%)}
.dv-ev.sm .dv-chk{width:17px;height:17px;font-size:10px;right:4px}
.dv-ev.done .dv-chk{background:#30d158;border-color:#30d158;box-shadow:0 0 10px rgba(48,209,88,.7)}
.dv-ev.dragging{opacity:.8;z-index:8;box-shadow:0 8px 32px rgba(0,0,0,.45)}
.dv-ev.selected{transform:scale(1.02);box-shadow:0 10px 34px rgba(0,0,0,.5);z-index:9;border-color:rgba(255,255,255,.4)}
.dv-ev.ghost{opacity:.8;border:1.5px dashed rgba(255,255,255,.7);border-left:3px solid rgba(255,255,255,.9);background:linear-gradient(160deg,rgba(10,132,255,.6),rgba(90,200,250,.38));box-shadow:0 12px 34px rgba(10,132,255,.45);z-index:8;pointer-events:none}
.dv-handle{position:absolute;left:50%;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid #0a84ff;box-shadow:0 2px 8px rgba(0,0,0,.4);transform:translate(-50%,-50%);z-index:10;touch-action:none;cursor:ns-resize}
.dv-handle.top{top:0}
.dv-handle.bot{top:100%}
.dv-now{position:absolute;left:0;right:0;height:0;border-top:2px solid #ff453a;z-index:5;pointer-events:none}
.dv-now::before{content:"";position:absolute;left:-5px;top:-5px;width:9px;height:9px;border-radius:50%;background:#ff453a;box-shadow:0 0 8px rgba(255,69,58,.6)}
.dv-now::after{content:attr(data-t);position:absolute;left:-52px;top:-7px;font-size:10px;font-weight:800;color:#ff453a;font-variant-numeric:tabular-nums}

/* === 予定編集シート（iPhone式） === */
.es-topbar{display:flex;align-items:center;justify-content:space-between;margin:-4px -2px 14px;padding:0 2px}
.es-topbar .es-cancel{background:none;border:none;color:#5ac8fa;font:inherit;font-size:15px;font-weight:500;cursor:pointer;padding:6px 10px;min-height:44px;min-width:44px;display:flex;align-items:center}
.es-topbar .es-title{font-size:15px;font-weight:800;color:#fff}
.es-topbar .es-savebtn{background:none;border:none;color:#5ac8fa;font:inherit;font-size:15px;font-weight:800;cursor:pointer;padding:6px 10px;min-height:44px;min-width:44px;display:flex;align-items:center}
.es-card{background:rgba(255,255,255,.07);border:1px solid var(--glass-border);border-radius:14px;margin-bottom:14px;overflow:hidden}
.es-card .es-line{display:flex;align-items:center;gap:10px;min-height:44px;padding:10px 14px;position:relative}
.es-card .es-line+.es-line::before{content:"";position:absolute;left:14px;right:0;top:0;height:.5px;background:rgba(255,255,255,.14)}
.es-card input[type=text]{flex:1;border:none;background:transparent;font:inherit;font-size:16px;color:#fff;padding:0;min-width:0}
.es-card input[type=text]::placeholder{color:rgba(255,255,255,.35)}
.es-card input[type=text]:focus{outline:none}
.es-card input[type=text][readonly]{color:rgba(255,255,255,.6)}
.es-line .es-lbl{font-size:15px;color:#fff;flex:0 0 auto}
.es-line .es-val{flex:1;text-align:right;font-size:15px;color:rgba(255,255,255,.55);font-weight:600}
.es-line input[type=time]{border:none;background:rgba(255,255,255,.1);border-radius:8px;padding:6px 8px;font:inherit;font-size:15px;color:#5ac8fa;font-weight:700;color-scheme:dark;margin-left:auto}
.es-colors{display:flex;gap:10px;overflow-x:auto;padding:4px 2px;flex:1;-webkit-overflow-scrolling:touch}
.es-colors .cbox{width:30px;height:30px;flex:0 0 auto;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.3);position:relative}
.es-colors .cbox::after{content:"";position:absolute;left:50%;top:50%;width:44px;height:44px;transform:translate(-50%,-50%)}
.es-colors .cbox:active{transform:scale(.88)}
.es-colors .cbox.sel{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.5),0 0 12px rgba(100,160,255,.4)}
.es-toggle{position:relative;display:inline-block;width:48px;height:28px;flex:0 0 auto;border-radius:999px;background:rgba(255,255,255,.2);border:none;cursor:pointer;transition:background .2s}
.es-toggle::before{content:"";position:absolute;left:-8px;right:-8px;top:-9px;bottom:-9px}
.es-toggle.on{background:#30d158}
.es-toggle::after{content:"";position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.3);transition:transform .2s}
.es-toggle.on::after{transform:translateX(20px)}
.es-card.es-del-card{margin-bottom:2px}
.es-card .es-del-line{justify-content:center;color:#ff453a;font-weight:700;font-size:15px;cursor:pointer;text-align:center}
.es-card .es-del-line:active{background:rgba(255,69,58,.12)}

/* === 繰り返し（iPhone式リピート） === */
.es-repseg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px}
.es-repseg .rep-opt{border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);font:inherit;font-size:12.5px;font-weight:700;padding:9px 0;border-radius:9px;cursor:pointer}
.es-repseg .rep-opt.sel{background:#5ac8fa;color:#04222e}
.es-line input[type=date]{border:none;background:rgba(255,255,255,.1);border-radius:8px;padding:6px 8px;font:inherit;font-size:14px;color:#5ac8fa;font-weight:700;color-scheme:dark;margin-left:auto}

/* === アクションシート（この予定のみ／これ以降すべて） === */
.act-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:flex;align-items:flex-end;opacity:0;transition:opacity .18s}
.act-bg.show{opacity:1}
.act-sheet{width:100%;max-width:520px;margin:0 auto;padding:10px 10px calc(14px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:8px}
.act-title{text-align:center;font-size:12px;color:rgba(255,255,255,.8);padding:4px 0 2px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.act-btn{border:none;border-radius:13px;padding:15px;font:inherit;font-size:16px;font-weight:700;background:rgba(58,58,62,.97);color:#5ac8fa;cursor:pointer}
.act-btn:active{background:rgba(80,80,86,.97)}
.act-btn.danger{color:#ff453a}
.act-btn.act-cancel{background:rgba(28,28,30,.98);color:#fff;font-weight:800;margin-top:2px}

/* === 活動継続日バナー（リスト・記録 両方の上部に常時表示） === */
.streak-banner{margin:8px 12px;padding:12px 14px;border-radius:14px;background:linear-gradient(135deg,#ff9500 0%,#ff5e3a 100%);color:#fff;box-shadow:0 3px 10px rgba(255,94,58,.3);display:flex;align-items:center;gap:12px}
.streak-banner .sb-fire{font-size:30px;line-height:1}
.streak-banner .sb-main{flex:1}
.streak-banner .sb-days{font-size:24px;font-weight:900;line-height:1.1}
.streak-banner .sb-days small{font-size:12px;font-weight:600;opacity:.9;margin-left:3px}
.streak-banner .sb-sub{font-size:11px;opacity:.9;margin-top:2px}
.streak-banner .sb-edit{background:rgba(255,255,255,.25);border:none;color:#fff;font-size:11px;font-weight:800;padding:7px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
.streak-banner .sb-edit:active{transform:scale(.94)}
.streak-banner.unset{background:linear-gradient(135deg,#8e8e93 0%,#636366 100%);box-shadow:0 3px 10px rgba(99,99,102,.25)}

/* === 前月からの引き継ぎ（参照・読み取り専用） === */
.prev-carry{background:linear-gradient(135deg,#0a5dc2 0%,#0a84ff 100%);color:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(10,132,255,.25)}
.prev-carry h3{margin:0 0 3px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.prev-carry .pc-hint{font-size:11px;opacity:.85;margin-bottom:10px}
.prev-carry .pc-goal{background:rgba(255,255,255,.18);border-radius:10px;padding:11px 12px;margin-bottom:8px}
.prev-carry .pc-goal .pc-label{font-size:11px;font-weight:800;opacity:.95;margin-bottom:4px}
.prev-carry .pc-goal .pc-text{font-size:15px;font-weight:700;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.prev-carry details{background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;margin-top:6px}
.prev-carry summary{padding:9px 12px;font-size:12px;font-weight:700;cursor:pointer;list-style:none}
.prev-carry summary::-webkit-details-marker{display:none}
.prev-carry summary::before{content:"▶ ";font-size:9px}
.prev-carry details[open] summary::before{content:"▼ "}
.prev-carry .pc-detail{padding:0 12px 10px;font-size:13px;line-height:1.5}
.prev-carry .pc-detail .pc-d-label{font-size:11px;font-weight:800;opacity:.9;margin:6px 0 2px}
.prev-carry .pc-detail .pc-d-text{white-space:pre-wrap;word-break:break-word;opacity:.95}
.prev-carry .pc-empty{font-size:12px;opacity:.85;font-style:italic}

/* === 月総括（記録タブ・3欄） === */
.month-review{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:14px;padding:14px;margin-bottom:14px}
.month-review h3{margin:0 0 4px;font-size:14px;font-weight:800;color:#fff}
.month-review .mr-hint{font-size:11px;color:var(--muted);margin-bottom:12px}
.month-review .mr-field{margin-bottom:12px}
.month-review .mr-field:last-child{margin-bottom:0}
.month-review .mr-label{font-size:12px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.month-review .mr-label.good{color:#6ee090}
.month-review .mr-label.improve{color:#ffaa6b}
.month-review .mr-label.goal{color:#5ac8fa}
.month-review textarea{width:100%;min-height:60px;border:1.5px solid var(--glass-border);border-radius:10px;padding:10px;font:inherit;font-size:13px;resize:vertical;background:rgba(255,255,255,.06);color:#fff}
.month-review textarea:focus{outline:none;background:rgba(255,255,255,.1)}
.month-review .mr-field.good textarea:focus{border-color:#30d158}
.month-review .mr-field.improve textarea:focus{border-color:#ff8c3c}
.month-review .mr-field.goal textarea:focus{border-color:#5ac8fa}
.month-review .mr-saved{font-size:10px;color:var(--muted);text-align:right;margin-top:4px;min-height:12px}

/* === 記録ビュー === */
.record-view{padding:0 12px 24px;position:relative;isolation:isolate}
.record-summary{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:14px;padding:14px;margin-bottom:14px}
.record-summary h3{margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:700}
.record-summary .pct{font-size:36px;font-weight:900;line-height:1;color:#fff}
.record-summary .pct small{font-size:13px;font-weight:500;color:var(--muted);margin-left:6px}
.record-summary .bar{height:8px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;margin:10px 0}
.record-summary .bar i{display:block;height:100%;background:linear-gradient(90deg,#30d158,#5ac8fa);transition:width .3s}
.record-summary .meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;font-size:11px;color:var(--muted)}
.record-summary .meta div{text-align:center;padding:8px 4px;background:rgba(255,255,255,.06);border-radius:8px;border:1px solid var(--glass-border)}
.record-summary .meta div b{display:block;font-size:18px;font-weight:900;color:#fff;margin-bottom:2px}
.rec-cats{display:flex;flex-direction:column;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.rec-cat{display:grid;grid-template-columns:36px 1fr 56px;gap:8px;align-items:center;font-size:11px}
.rec-cat .rc-name{font-weight:800;color:rgba(255,255,255,.75)}
.rec-cat .rc-bar{height:7px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.rec-cat .rc-bar i{display:block;height:100%;border-radius:999px;transition:width .3s}
.rec-cat .rc-n{text-align:right;color:#fff;font-variant-numeric:tabular-nums;font-weight:900;font-size:14px}
.rec-log{background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:14px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.rec-log:active{transform:scale(.99);background:rgba(255,255,255,.15)}
.rec-log .rl-date{font-size:13px;font-weight:900;color:#fff;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.rec-log .rl-date small{font-size:10px;color:var(--muted);font-weight:700}
.rec-log .rl-chips{display:flex;flex-wrap:wrap;gap:5px}
.rec-log .rl-chip{font-size:11px;font-weight:700;color:#fff;padding:4px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.15)}

.record-diary{background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.record-diary:active{transform:scale(.99);background:rgba(255,255,255,.15)}
.record-diary .rd-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.record-diary .rd-date{font-size:14px;font-weight:900;color:#fff}
.record-diary .rd-tag{font-size:10px;color:var(--muted);background:rgba(255,255,255,.1);padding:3px 8px;border-radius:999px;font-weight:700}
.record-diary .rd-body{font-size:13px;line-height:1.5;color:rgba(255,255,255,.8);white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:hidden;position:relative}
.record-diary .rd-body.long::after{content:"";position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,rgba(25,25,45,.85))}
.record-section-title{font-size:13px;color:var(--muted);margin:14px 0 6px;font-weight:700}

.summary{padding:8px 12px}
.summary-card{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:14px;padding:12px 14px;border:1px solid var(--glass-border)}
.summary-card .label{font-size:11px;color:var(--muted);font-weight:500}
.summary-card .big{font-size:26px;font-weight:800;line-height:1.1;margin-top:2px;color:#fff}
.summary-card .big small{font-size:13px;font-weight:500;color:var(--muted)}
.bar{margin-top:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#30d158,#5ac8fa);transition:width .3s}
.cat-bars{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.cat-bar{display:flex;align-items:center;gap:6px;font-size:11px}
.cat-bar .lbl{flex:0 0 50px;color:var(--muted)}
.cat-bar .b{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden}
.cat-bar .b i{display:block;height:100%;background:#30d158}
.cat-bar .pct{font-weight:600;font-size:11px;flex:0 0 38px;text-align:right}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 10px}
.chart-card{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:14px;padding:10px;border:1px solid var(--glass-border)}
.chart-card h3{margin:0 0 6px;font-size:11px;color:var(--muted);font-weight:600}
.chart-card svg{width:100%;height:auto;display:block}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;font-size:10px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:3px}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block}

/* === LIST VIEW === */
.list{padding:0 12px 24px}
.list-day{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:14px;margin-bottom:7px;overflow:hidden;display:grid;grid-template-columns:56px 1fr;align-items:stretch}
.list-day.today{border-color:rgba(90,200,250,.5);border-width:2px;box-shadow:0 0 16px rgba(90,200,250,.15)}
.list-day.past{opacity:.4;filter:saturate(.5)}
.list-day.past:hover{opacity:.7}
.list-day .date-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;background:rgba(255,255,255,.04)}
.list-day .date-col.normal{background:rgba(90,180,255,.12)}
.list-day .date-col.cheat{background:rgba(255,100,120,.12)}
.list-day .date-col.special{background:linear-gradient(180deg,rgba(48,209,88,.12) 0%,rgba(48,209,88,.12) 50%,rgba(253,234,174,.12) 50%,rgba(253,234,174,.12) 100%)}
.list-day .num{font-size:22px;font-weight:800;line-height:1;color:#fff}
.list-day .wd{font-size:11px;color:var(--muted);margin-top:2px}
.list-day .wd.sat{color:#5ac8fa}
.list-day .wd.sun{color:#ff453a}
.list-day .tag{font-size:9px;font-weight:700;color:var(--muted);margin-top:3px;letter-spacing:.05em}
.list-day .tasks{padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px;align-content:center}

/* === TASK CHIP（タップで完了切替） === */
.chip{appearance:none;border:none;font:inherit;font-size:12px;font-weight:600;background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);padding:6px 11px;border-radius:8px;cursor:pointer;line-height:1.3;border:1.5px solid rgba(255,255,255,.12);transition:all .15s;display:inline-flex;align-items:center;gap:3px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.chip:active{transform:scale(.94)}
.chip.cat-morning{background:rgba(90,180,255,.2);color:#8ac4ff;border-color:rgba(90,180,255,.25)}
.chip.cat-lunch{background:rgba(169,156,255,.2);color:#c4baff;border-color:rgba(169,156,255,.25)}
.chip.cat-night{background:rgba(200,80,220,.2);color:#e4a0f0;border-color:rgba(200,80,220,.25)}
.chip.cat-night.ex-WT{background:rgba(230,140,60,.2);color:#f0b878;border-color:rgba(230,140,60,.25)}
.chip.cat-night.ex-ハンド{background:rgba(100,200,220,.2);color:#90dce8;border-color:rgba(100,200,220,.25)}
.chip.cat-daily{background:rgba(48,209,88,.2);color:#6ee090;border-color:rgba(48,209,88,.25)}
.chip.cat-special{background:rgba(255,204,0,.2);color:#ffd94a;border-color:rgba(255,204,0,.25)}
.chip.cat-rest{background:rgba(255,100,160,.2);color:#ff9aba;border-color:rgba(255,100,160,.25)}
.chip.cat-custom{background:rgba(200,80,220,.15);color:#d898e8;border-color:rgba(200,80,220,.3)}
.chip.cat-custom.done{background:var(--done) !important;color:#fff !important}
.chip.chip-add{background:rgba(200,80,220,.1);border:1.5px dashed rgba(200,80,220,.5);color:#d898e8;font-weight:800}
.chip.done{background:rgba(48,209,88,.8) !important;color:#fff !important;border-color:transparent}
.chip.done .label{text-decoration:line-through;text-decoration-color:rgba(0,0,0,.45);text-decoration-thickness:2px;opacity:.85}
.chip .check{font-weight:900;font-size:11px}
.chip .chip-act{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px;margin-left:3px;cursor:pointer;font-weight:700}
.chip .chip-act:active{transform:scale(.85)}
.chip.done .chip-act{background:rgba(255,255,255,.35);color:#fff}

/* === CALENDAR VIEW === */
.cal{padding:0 8px 24px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:4px 0}
.cal-dow.sat{color:#0a84ff}
.cal-dow.sun{color:#ff453a}
.cal-cell{background:var(--glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--glass-border);border-radius:8px;padding:4px;min-height:90px;display:flex;flex-direction:column;gap:2px;overflow:hidden}
.cal-cell.empty{background:transparent;border:none;backdrop-filter:none}
.cal-cell.normal{background:rgba(90,180,255,.1)}
.cal-cell.cheat{background:rgba(255,100,120,.1)}
.cal-cell.special{background:linear-gradient(180deg,rgba(48,209,88,.1) 0%,rgba(48,209,88,.1) 50%,rgba(255,204,0,.1) 50%,rgba(255,204,0,.1) 100%)}
.cal-cell.today{box-shadow:0 0 0 2px rgba(90,200,250,.5),0 0 12px rgba(90,200,250,.2)}
.cal-cell.past{opacity:.4;filter:saturate(.5)}
.cal-cell.past:hover{opacity:.7}
.cal-cell .head{display:flex;align-items:baseline;gap:3px}
.cal-cell .num{font-size:13px;font-weight:800;color:rgba(255,255,255,.9)}
.cal-cell .num.sun{color:#ff6b6b}
.cal-cell .num.sat{color:#5ac8fa}
.cal-cell .small-tag{font-size:8px;color:var(--muted);font-weight:700}
.cal-cell .chips-mini{display:flex;flex-direction:column;gap:2px;flex:1}
.cal-cell .chip-mini{appearance:none;border:none;font-size:10px;font-weight:600;padding:2px 5px;border-radius:5px;text-align:left;line-height:1.2;cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid rgba(255,255,255,.08)}
.cal-cell .chip-mini.done{background:rgba(48,209,88,.7);color:#fff;text-decoration:line-through;text-decoration-color:rgba(0,0,0,.45);text-decoration-thickness:1.5px}
.cal-cell .chip-mini.cat-morning{border-left:3px solid var(--c-morning)}
.cal-cell .chip-mini.cat-lunch{border-left:3px solid var(--c-lunch)}
.cal-cell .chip-mini.cat-night{border-left:3px solid var(--c-night-mma)}
.cal-cell .chip-mini.cat-night.ex-WT{border-left-color:var(--c-night-wt)}
.cal-cell .chip-mini.cat-night.ex-ハンド{border-left-color:var(--c-night-hand)}
.cal-cell .chip-mini.cat-daily{border-left:3px solid var(--c-daily)}
.cal-cell .chip-mini.cat-special{border-left:3px solid var(--c-special)}
.cal-cell .chip-mini.cat-rest{border-left:3px solid var(--c-rest)}
.cal-cell .chip-mini.cat-custom{border-left:3px solid #c850dc;background:rgba(200,80,220,.15)}
.cal-cell .chip-mini.cat-custom.done{background:rgba(48,209,88,.7);color:#fff}
.cal-cell .chip-mini.chip-add{background:rgba(200,80,220,.1);border:1px dashed rgba(200,80,220,.4);color:#d898e8;text-align:center;font-weight:800}

.toolbar{display:flex;gap:7px;padding:6px 12px 18px;flex-wrap:wrap}
.toolbar button{flex:1;min-width:100px;background:var(--glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--glass-border);padding:9px;border-radius:9px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer}
.toolbar button:active{transform:scale(.97)}
.toolbar button.danger{color:#ff6b6b;border-color:rgba(255,100,100,.3)}

/* === 更新ボタン＆Pull-to-refresh === */
.refresh-btn{position:fixed;top:10px;right:10px;z-index:11;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid var(--glass-border);width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.3);transition:transform .15s;color:#fff}
.refresh-btn:active{transform:rotate(180deg) scale(.9)}
.ptr-indicator{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-60px);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;pointer-events:none;transition:transform .25s ease-out;font-weight:900}
.ptr-indicator.show{transform:translateX(-50%) translateY(20px)}
.ptr-indicator.ready{background:rgba(48,209,88,.8);color:#fff}
.ptr-indicator.refreshing{animation:ptrSpin .8s linear infinite;background:rgba(10,132,255,.8);color:#fff}
@keyframes ptrSpin{from{transform:translateX(-50%) translateY(20px) rotate(0)}to{transform:translateX(-50%) translateY(20px) rotate(360deg)}}

@media (min-width:720px){
  .charts{grid-template-columns:repeat(4,1fr)}
  .cat-bars{grid-template-columns:repeat(5,1fr)}
  .cal-cell{min-height:130px}
}

/* === 日記機能 === */
.list-day .date-col{cursor:pointer;position:relative}
.list-day .date-col:active{opacity:.7}
.list-day .date-col .diary-mark{font-size:11px;margin-top:2px;color:#0a84ff}
.cal-cell .diary-mark{position:absolute;top:2px;right:4px;font-size:9px;color:#0a84ff;font-weight:700}
.diary-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.diary-modal-bg.show{opacity:1;pointer-events:auto}
.diary-modal{background:rgba(25,25,45,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 16px 30px;transform:translateY(100%);transition:transform .3s ease;border-top:1px solid var(--glass-border)}
.diary-modal-bg.show .diary-modal{transform:translateY(0)}
.diary-modal .grip{width:42px;height:5px;background:rgba(255,255,255,.3);border-radius:999px;margin:0 auto 14px}
.diary-modal h2{margin:0 0 8px;font-size:18px;font-weight:800;color:#fff}
.diary-modal .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
.diary-modal textarea{width:100%;min-height:280px;border:2px solid var(--glass-border);border-radius:12px;padding:12px;font:inherit;font-size:14px;resize:vertical;background:rgba(255,255,255,.06);color:#fff}
.diary-modal textarea:focus{border-color:#5ac8fa;outline:none}
.diary-modal .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.diary-modal .actions button{appearance:none;border:none;border-radius:10px;padding:12px;font:inherit;font-weight:800;font-size:13px;cursor:pointer}
.diary-modal .b-close{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.diary-modal .b-clear{background:rgba(255,100,100,.15);color:#ff6b6b;border:1px solid rgba(255,100,100,.25)}
.diary-toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:rgba(48,209,88,.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:#fff;padding:10px 20px;border-radius:999px;font-weight:700;font-size:13px;opacity:0;pointer-events:none;transition:all .25s;z-index:200}
.diary-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (min-width:600px){
  .diary-modal-bg{align-items:center}
  .diary-modal{border-radius:20px;max-height:85vh}
}

/* ===== 睡眠タブ (sleep_v1) — sv- 接頭辞で既存CSSと分離 ===== */
.sv-wrap{position:relative;overflow:hidden;margin:0 -12px}
.sv-sky{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:linear-gradient(180deg,#05060e 0%,#0a0d20 40%,#10142e 70%,#141834 100%)}
.sv-stars{position:absolute;inset:0;opacity:.9;
  background-image:
    radial-gradient(circle 1.2px at 12% 18%, #fff, transparent 70%),
    radial-gradient(circle 1px at 28% 8%, rgba(255,255,255,.8), transparent 70%),
    radial-gradient(circle 1.4px at 44% 22%, #fff, transparent 70%),
    radial-gradient(circle 1px at 58% 12%, rgba(255,255,255,.7), transparent 70%),
    radial-gradient(circle 1.3px at 72% 26%, #fff, transparent 70%),
    radial-gradient(circle 1px at 85% 9%, rgba(255,255,255,.8), transparent 70%),

/* ===== 実験タブ (kaizen_v1・機能A) ===== */
.exp-wrap{position:relative;isolation:isolate;padding:0 12px 130px;
  background-image:repeating-linear-gradient(0deg, rgba(140,180,255,.02) 0 1px, transparent 1px 24px),
    repeating-linear-gradient(90deg, rgba(140,180,255,.02) 0 1px, transparent 1px 24px)}
.exp-card{padding-top:2px}
.exp-card .es-line textarea{width:100%;border:1.5px solid var(--glass-border);border-radius:10px;padding:9px;font:inherit;font-size:13px;background:rgba(255,255,255,.06);color:#fff;resize:vertical;min-height:44px}
.exp-card .es-line textarea:focus{outline:none;border-color:#5ac8fa}
.exp-shelf{margin-top:6px;background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;overflow:hidden}
.exp-shelf summary{padding:12px 14px;font-size:13px;font-weight:800;color:#fff;cursor:pointer;list-style:none;min-height:44px;display:flex;align-items:center}
.exp-shelf summary::-webkit-details-marker{display:none}
.exp-shelf-list{padding:0 14px 12px;display:flex;flex-direction:column;gap:6px}
.exp-shelf-item{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:9px}

/* ===== 同じ空の下の基地：仕上げ・部屋演出（機能A/B/C） ===== */
.room-cap{font-size:11px;font-weight:800;letter-spacing:.28em;color:rgba(255,255,255,.4);margin:0 0 8px}

/* --- 歩みボード（記録タブ最上部・読み取り専用） --- */
.walk-board{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:14px;padding:14px;margin-bottom:14px;position:relative;z-index:1}
.walk-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.walk-title{font-size:14px;font-weight:800;color:#fff}
.walk-score{font-size:20px;font-weight:900}
.walk-score.walk-win{color:#ffd9a0}
.walk-score.walk-lose{color:#8ec6ff}
.walk-score.walk-tie{color:rgba(255,255,255,.6)}
.walk-rows{display:flex;flex-direction:column;gap:6px}
.walk-row{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.05)}
.walk-ico{font-size:14px;flex:0 0 auto}

.walk-vals{flex:1;text-align:right;font-variant-numeric:tabular-nums;color:rgba(255,255,255,.85)}
.walk-arrow{font-style:normal;margin:0 3px;opacity:.75}
.walk-row.walk-win .walk-arrow{color:#ffd9a0}
.walk-row.walk-lose .walk-arrow{color:#8ec6ff}
.walk-row.walk-tie .walk-arrow{color:rgba(255,255,255,.5)}
.walk-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px}
.walk-hint{font-size:10.5px;color:rgba(255,255,255,.4);margin-top:8px}
.walk-month{font-size:11px;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}

/* --- 部屋1: リスト「今日の道」 --- */
.list{position:relative;padding-bottom:118px;isolation:isolate}
.room-road{position:absolute;left:0;right:0;bottom:0;height:96px;z-index:-1;pointer-events:none;overflow:hidden}
.road-ground{position:absolute;left:8%;right:8%;bottom:0;height:70px;background:linear-gradient(180deg, rgba(90,180,255,.05), rgba(90,180,255,.16));clip-path:polygon(38% 0%, 62% 0%, 100% 100%, 0% 100%)}
.road-mid{position:absolute;left:49.3%;top:8px;bottom:0;width:1.4%;background:repeating-linear-gradient(180deg, rgba(255,255,255,.32) 0 10px, transparent 10px 20px)}
.road-lamp{position:absolute;bottom:8px;width:2px}
.road-lamp-pole{position:absolute;left:0;bottom:0;width:2px;height:44px;background:rgba(255,255,255,.28);display:block}
.road-lamp-glow{position:absolute;left:50%;bottom:42px;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.18);transform:translateX(-50%);z-index:1}
.road-lamp-halo{position:absolute;left:50%;bottom:24px;width:56px;height:56px;border-radius:50%;transform:translateX(-50%);background:radial-gradient(circle, rgba(255,217,160,0) 0%, rgba(255,217,160,0) 100%);transition:background .5s}
.road-lamp.on .road-lamp-glow{background:#ffd9a0;box-shadow:0 0 10px 4px rgba(255,217,160,.9);animation:roadFlicker 4.5s ease-in-out infinite}
.road-lamp.on .road-lamp-halo{background:radial-gradient(circle, rgba(255,217,160,.32) 0%, rgba(255,217,160,.1) 45%, rgba(255,217,160,0) 75%);animation:roadFlicker 4.5s ease-in-out infinite}
@keyframes roadFlicker{0%,100%{opacity:1}50%{opacity:.72}}

/* --- 部屋3: 記録「観測室」 --- */
/* 記録タブ最上部の専用の窓（カードの背後に隠れず常に見える帯） */
.room-obs{position:relative;height:108px;margin-bottom:10px;overflow:hidden;pointer-events:none;border-radius:14px;background:linear-gradient(180deg, rgba(90,120,200,.10), rgba(20,20,40,.02))}
.obs-dome{position:absolute;left:50%;top:-392px;width:500px;height:500px;margin-left:-250px;border-radius:50%;border:1px solid rgba(255,255,255,.16)}
.obs-stars{position:absolute;inset:0}
.obs-star{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.65)}
.obs-star.twinkle{animation:obsTwinkle 3.6s ease-in-out infinite}
@keyframes obsTwinkle{0%,100%{opacity:.35}50%{opacity:1}}

/* --- 部屋5: 実験「工房の実験机」 --- */
.room-bench{position:absolute;left:0;right:0;bottom:0;height:96px;z-index:-1;pointer-events:none;overflow:hidden}
.bench-body{position:absolute;left:0;right:0;bottom:0;height:58px;background:linear-gradient(180deg,#3d2c1d,#281c10)}
.bench-top{position:absolute;left:0;right:0;bottom:58px;height:1px;background:rgba(255,255,255,.16)}
.bench-flask{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);width:56px;height:64px}
.flask-neck{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);width:10px;height:22px;border-left:2px solid rgba(255,255,255,.32);border-right:2px solid rgba(255,255,255,.32)}
.flask-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:44px;height:36px;border-radius:0 0 22px 22px;border:2px solid rgba(255,255,255,.32);background:rgba(255,255,255,.03);overflow:hidden}
.flask-liquid{position:absolute;left:0;right:0;bottom:0;height:58%;transition:background .5s}
.flask-bubble{position:absolute;left:50%;bottom:2px;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.65);animation:flaskRise 8s ease-in infinite;opacity:0}
@keyframes flaskRise{0%{transform:translate(-50%,0);opacity:0}10%{opacity:.85}88%{opacity:.15}100%{transform:translate(-50%,-30px);opacity:0}}

/* ===== 実験タブ 最上部ステータス（機能C・第3弾） ===== */
.exp-status{border-radius:16px;padding:16px 14px;margin-bottom:14px;position:relative;z-index:1}

.mma-wrap{position:relative;isolation:isolate;padding:0 12px 130px}

<script>
// ===== 予定（calendar_v43.py 同期） =====
const PRESETS = {
  4: {cheat:[5,12,13,19,26], special:{4:"筑前町",11:"筑前町",18:"筑前町",25:"柳川",29:"筑前町"}},
  5: {cheat:[2,3,4,10,17,24,31], special:{5:"筑前町",6:"柳川",30:"筑前町"}},
  6: {cheat:[7,14,21,28], special:{6:"柳川",13:"筑前町",20:"柳川",27:"筑前町"}},
  7: {cheat:[5,12,19,26], special:{4:"柳川",11:"筑前町",18:"柳川",20:"筑前町",25:"柳川"}},
};
const THEMES = ["CAE","SW電","機械","板金","溶接","塗装","電気","SW"];
const THEME_START = {4:0, 5:4, 6:1, 7:7}; // calendar_v43.py 値
const WT_ROT = ["SW","BP","DR"];
const WD_JP = ["日","月","火","水","木","金","土"];

const CHART_COLORS = {
  "普通":"#5ab4ff","チート":"#ffa0b4","特別":"#78d28c",
  "WT":"#e68c3c","MMA":"#c850dc","ハンド":"#64c8dc"
};

// ===== ストレージ =====
const KEY = "tracker2026_v2";
function loadState(){ try{ return JSON.parse(localStorage.getItem(KEY)||"{}"); }catch(e){return {}} }
function saveState(s){ localStorage.setItem(KEY, JSON.stringify(s)); }
let state = loadState();
// 2026年は既存キー形式`${m}-${d}`のまま（データ移行なし）。2026年以外は`${y}-${m}-${d}`
function dayKey(y,m,d){ return y===2026 ? `${m}-${d}` : `${y}-${m}-${d}`; }
function getDayState(m,d,y){
  if(y===undefined) y=curYear;
  const k = dayKey(y,m,d);
  state[k] = state[k] || {};
  return state[k];
}

// ===== 日生成 =====
function hasPresets(y,m){ return y===2026 && !!PRESETS[m]; }
function daysInMonth(m,y){ if(y===undefined) y=curYear; return new Date(y, m, 0).getDate(); }
function dayType(m, d, y){
  if(y===undefined) y=curYear;
  if(!hasPresets(y,m)) return "普通";
  const p = PRESETS[m];
  if(p.cheat.includes(d)) return "チート";
  if(p.special[d]) return "特別";
  return "普通";
}
function buildMonth(m, y){
  if(y===undefined) y=curYear;
  const days = [];
  const total = daysInMonth(m,y);
  const noPlan = !hasPresets(y,m);
  let normalIdx = 0, wtIdx = 0;
  for(let d=1; d<=total; d++){
    const t = dayType(m,d,y);
    const wd = new Date(y, m-1, d).getDay();
    let theme=null, night=null, wtRot=null, isSpur=false, loc=null;
    if(noPlan){
      // プリセットの無い月＝白紙カレンダー（カスタム予定のみ）
      days.push({d, wd, type:"普通", theme, night, wtRot, isSpur, loc, noPlan:true});
      continue;
    }
    if(t === "普通"){
      theme = THEMES[(THEME_START[m]+normalIdx) % 8];
      normalIdx++;
      // 0=日,1=月,2=火,3=水,4=木,5=金,6=土
      if(wd===2) night="ハンド";
      else if(wd===4 || wd===6){
        night="WT";
        wtRot = WT_ROT[wtIdx % 3];
        wtIdx++;
      }
      else if(wd===5){ night="MMA"; isSpur=true; }
      else night="MMA";
    } else if(t === "特別"){
      loc = PRESETS[m].special[d];
    }
    days.push({d, wd, type:t, theme, night, wtRot, isSpur, loc, noPlan:false});
  }
  return days;
}

// ===== タスク生成 =====
function tasksOf(day){
  if(day.noPlan){
    return [];
  }
  if(day.type === "チート"){
    return [{id:"cheat", label:"チート(休養)", cat:"rest"}];
  }
  if(day.type === "特別"){
    const locText = day.loc==="筑前町" ? "筑前町支部 9:00~16:30" : "柳川支部 10:00~20:00";
    return [
      {id:"loc", label:locText, cat:"special"},
      {id:"sp1", label:"①発明工作", cat:"special"},
      {id:"sp2", label:"②AI", cat:"special"},
      {id:"sp3", label:"③算数", cat:"special"},
      {id:"sp4", label:"④仕事復習", cat:"special"},
      {id:"sp5", label:"⑤疑問", cat:"special"},
      {id:"sp6", label:"⑥哲学", cat:"special"},
      {id:"sp7", label:"⑦勉強効率化", cat:"special"},
      {id:"sp8", label:"⑧ADHD研究", cat:"special"},
    ];
  }
  // 普通
  const tasks = [
    {id:"morning", label:`朝:新聞+${day.theme}`, cat:"morning"},
    {id:"lunch", label:"昼:科学雑誌+マクロ30", cat:"lunch"},
  ];
  let nLabel;
  if(day.night==="WT") nLabel = `夜:WT(${day.wtRot})`;
  else if(day.night==="MMA" && day.isSpur) nLabel = "夜:MMA(スパー)";
  else if(day.night==="MMA") nLabel = "夜:MMA";
  else nLabel = "夜:ハンドボール";
  tasks.push({id:"night", label:nLabel, cat:"night", ex:day.night});
  tasks.push({id:"daily", label:"算25+復習", cat:"daily"});
  return tasks;
}

// ===== 集計 =====
function tally(m){
  const days = buildMonth(m);
  // 予定 day-type / night
  const planDay = {"普通":0,"チート":0,"特別":0};
  const planNight = {"WT":0,"MMA":0,"ハンド":0};
  // 実績 (タスクベース)
  const cats = {morning:[0,0], lunch:[0,0], night:[0,0], daily:[0,0], special:[0,0], rest:[0,0], custom:[0,0]};
  // 実績 day-type / night (達成日カウント)
  const actDay = {"普通":0,"チート":0,"特別":0};
  const actNight = {"WT":0,"MMA":0,"ハンド":0};
  let totalPlan=0, totalDone=0;

  days.forEach(x=>{
    planDay[x.type]++;
    if(x.night) planNight[x.night]++;
    const tks = visibleTasksOf(x, m);
    const s = getDayState(m, x.d);
    let dayDone = 0;
    tks.forEach(tk=>{
      cats[tk.cat][1]++;
      totalPlan++;
      if(s[tk.id]){
        cats[tk.cat][0]++;
        totalDone++;
        dayDone++;
      }
    });
    // カスタムタスクも集計
    if(s.__custom__ && s.__custom__.length){
      s.__custom__.forEach(t=>{
        cats.custom[1]++;
        totalPlan++;
        if(s[t.id]){
          cats.custom[0]++;
          totalDone++;
          dayDone++;
        }
      });
    }
    // その日の主タスクが1つ以上完了 → 実績日カウント（日タイプ問わず）
    if(dayDone > 0){
      actDay[x.type]++;
    }
    // 夜運動（実績）: その日にやった運動タイプを名前で判定し、1日1カウント
    const nightTypesDone = new Set();
    if(x.night && s.night) nightTypesDone.add(x.night);
    if(s.__custom__ && s.__custom__.length){
      s.__custom__.forEach(t=>{
        if(!s[t.id]) return;
        const label = (t.label||"").normalize('NFKC');
        if(/wt|ウェイト|ウエイト|筋トレ|ベンチ|スクワット|デッド/i.test(label)) nightTypesDone.add("WT");
        else if(/mma|スパー|総合|柔術|グラップ/i.test(label)) nightTypesDone.add("MMA");
        else if(/ハンド/.test(label)) nightTypesDone.add("ハンド");
      });
    }
    nightTypesDone.forEach(type=>{ actNight[type]++; });
  });
  return {days, planDay, planNight, actDay, actNight, cats, totalPlan, totalDone};
}

// ===== UI =====
let curYear = new Date().getFullYear();
let currentMonth = new Date().getMonth()+1;
let currentView = "record";

function setView(v){
  if(v==="cal2" && currentView!=="cal2") dvWantAutoScroll=true;
  currentView = v;
  document.getElementById("vList").classList.toggle("active", v==="list");
  document.getElementById("vCal2").classList.toggle("active", v==="cal2");
  document.getElementById("vRecord").classList.toggle("active", v==="record");
  document.getElementById("vSleep").classList.toggle("active", v==="sleep");
  document.getElementById("vExp").classList.toggle("active", v==="exp");
  document.getElementById("vMma").classList.toggle("active", v==="mma");
  renderCarryBanner();
  renderContent();
  // タブ切替で一番上へ
  window.scrollTo({top:0, behavior:'smooth'});
}

function render(){
  renderTabs();
  renderStreak();
  renderCarryBanner();
  renderSummary();
  renderCharts();
  renderContent();
}

function gotoMonth(y,m){
  if(m<1){ m=12; y--; } else if(m>12){ m=1; y++; }
  curYear=y; currentMonth=m;
  const total=daysInMonth(currentMonth,curYear);
  selDay=Math.max(1,Math.min(total,selDay));
  selectedEv=null;
  render();
}
function renderTabs(){
  const el = document.getElementById("monthTabs");
  el.className = "month-pager";
  el.innerHTML = `
    <button class="mp-arrow" onclick="gotoMonth(curYear,currentMonth-1)">‹</button>
    <span class="mp-label" onclick="jumpToToday()" title="タップで今日へ">${curYear}年${currentMonth}月</span>
    <button class="mp-arrow" onclick="gotoMonth(curYear,currentMonth+1)">›</button>
  `;
}

function renderSummary(){
  const t = tally(currentMonth);
  const pct = t.totalPlan ? Math.round(100*t.totalDone/t.totalPlan) : 0;
  const catLabels = {morning:"朝", lunch:"昼", night:"夜", daily:"毎日", special:"特別", rest:"休養", custom:"自分"};
  const catBars = ["morning","lunch","night","daily","special","custom"].map(c=>{
    const [done,plan] = t.cats[c];
    const p = plan ? Math.round(100*done/plan) : 0;
    return `<div class="cat-bar"><div class="lbl">${catLabels[c]}</div><div class="b"><i style="width:${p}%"></i></div><div class="pct">${done}/${plan}</div></div>`;
  }).join("");
  document.getElementById("summary").innerHTML = `
    <div class="summary-card">
      <div class="label">${currentMonth}月 達成率</div>
      <div class="big">${pct}% <small>(${t.totalDone}/${t.totalPlan} タスク)</small></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="cat-bars">${catBars}</div>
    </div>
  `;
}

// ===== 円グラフ =====
function pieSVG(segs, size=130){
  const total = segs.reduce((a,b)=>a+b.val,0);
  const r = size/2 - 4;
  const cx=size/2, cy=size/2;
  if(total===0) return `<svg viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)" stroke-width="1"/><text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,.35)" font-size="11">未達成</text></svg>`;
  let acc = -90;
  let parts = "";
  segs.forEach(s=>{
    if(s.val===0) return;
    const ang = 360*s.val/total;
    const start = acc, end = acc+ang;
    const x1 = cx + r*Math.cos(start*Math.PI/180);
    const y1 = cy + r*Math.sin(start*Math.PI/180);
    const x2 = cx + r*Math.cos(end*Math.PI/180);
    const y2 = cy + r*Math.sin(end*Math.PI/180);
    const large = ang>180?1:0;
    if(ang>=359.99){
      parts += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}"/>`;
    } else {
      parts += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${s.color}" stroke="#fff" stroke-width="2"/>`;
    }
    const mid = (start+end)/2;
    const lx = cx + r*0.6*Math.cos(mid*Math.PI/180);
    const ly = cy + r*0.6*Math.sin(mid*Math.PI/180);
    const pct = Math.round(100*s.val/total);
    if(pct>=8){
      parts += `<text x="${lx}" y="${ly}" fill="#fff" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle">${pct}%</text>`;
    }
    acc = end;
  });
  return `<svg viewBox="0 0 ${size} ${size}">${parts}</svg>`;
}

function legendHTML(segs){
  return `<div class="legend">${segs.filter(s=>s.val>0).map(s=>`<span><i style="background:${s.color}"></i>${s.name} ${s.val}</span>`).join("")}</div>`;
}

function renderCharts(){
  const t = tally(currentMonth);
  const seg = (obj, keys) => keys.map(k=>({name:k, val:obj[k], color:CHART_COLORS[k]}));
  const dayPlan = seg(t.planDay, ["普通","チート","特別"]);
  const dayAct = seg(t.actDay, ["普通","チート","特別"]);
  const nightPlan = seg(t.planNight, ["WT","MMA","ハンド"]);
  const nightAct = seg(t.actNight, ["WT","MMA","ハンド"]);

  document.getElementById("charts").innerHTML = `
    <div class="chart-card"><h3>日タイプ（予定）</h3>${pieSVG(dayPlan)}${legendHTML(dayPlan)}</div>
    <div class="chart-card"><h3>日タイプ（実績）</h3>${pieSVG(dayAct)}${legendHTML(dayAct)}</div>
    <div class="chart-card"><h3>夜運動（予定）</h3>${pieSVG(nightPlan)}${legendHTML(nightPlan)}</div>
    <div class="chart-card"><h3>夜運動（実績）</h3>${pieSVG(nightAct)}${legendHTML(nightAct)}</div>
  `;
}

function renderContent(){
  removeGhost();
  const prevScroll = document.getElementById('dvScroll');
  if(prevScroll) dvSavedScrollTop = prevScroll.scrollTop;
  const el = document.getElementById("content");
  const isCal2 = currentView==="cal2";
  const isSleep = currentView==="sleep";
  const isExp = currentView==="exp";
  const isMma = currentView==="mma";
  ["streakBanner","carryBanner","summary","charts"].forEach(id=>{
    const node=document.getElementById(id);
    if(node) node.style.display = (isCal2||isSleep||isExp||isMma) ? "none" : "";
  });
  // cal2（日ビュー）中はhtml/bodyの外側スクロールをロックし、二重スクロールを防ぐ
  document.body.classList.toggle('cal2-lock', isCal2);
  if(currentView==="record"){ el.innerHTML = renderRecord(); }
  else if(isCal2){ el.innerHTML = renderDayView(); afterDayViewRender(); }
  else if(isSleep){ el.innerHTML = renderSleep(); afterSleepRender(); }
  else if(isExp){ el.innerHTML = renderExp(); }
  else if(isMma){ el.innerHTML = renderMma(); }
  else el.innerHTML = renderList();
}

// ===== リスト =====
function isPastDay(m, d, y){
  if(y===undefined) y=curYear;
  const today = new Date();
  const ty=today.getFullYear();
  if(y !== ty) return y < ty;
  const tm = today.getMonth()+1, td = today.getDate();
  if(m < tm) return true;
  if(m > tm) return false;
  return d < td;
}
function isTodayYMD(y,m,d){
  const today=new Date();
  return today.getFullYear()===y && today.getMonth()+1===m && today.getDate()===d;
}

// 部屋1: リスト「今日の道」の街灯シーン（機能B）。今日の完了タスク数に応じて1本ずつ灯る
function renderRoadScene(){
  let lit = 0;
  try{
    const today = new Date();
    const y = today.getFullYear(), m = today.getMonth()+1, d = today.getDate();
    const days = buildMonth(m,y);
    const day = days.find(x=>x.d===d);
    if(day){
      const tks = visibleTasksOf(day, m);
      const s = getDayState(m,d,y) || {};
      let done = 0;
      tks.forEach(tk=>{ if(s[tk.id]) done++; });
      if(s.__custom__ && s.__custom__.length) s.__custom__.forEach(t=>{ if(s[t.id]) done++; });
      lit = Math.min(5, done);
    }
  }catch(e){ lit = 0; }
  const lamps = [0,1,2,3,4].map(i=>{
    const left = [8, 27, 46, 65, 84][i]; // 中央線(49.3%)と重ならない位置
    return `<div class="road-lamp${i<lit?' on':''}" style="left:${left}%"><span class="road-lamp-halo"></span><span class="road-lamp-pole"></span><span class="road-lamp-glow"></span></div>`;
  }).join('');
  return `<div class="room-road" aria-hidden="true">
    <div class="road-ground"><div class="road-mid"></div></div>
    ${lamps}
  </div>`;
}

function renderList(){
  const days = buildMonth(currentMonth);
  const isToday = (d)=> isTodayYMD(curYear, currentMonth, d);
  const html = days.map(x=>{
    const tks = visibleTasksOf(x, currentMonth);
    const s = getDayState(currentMonth, x.d);
    const hid = getHidden(currentMonth, x.d);
    const wdCls = x.wd===6?"sat":(x.wd===0?"sun":"");
    const typeCls = x.type==="普通"?"normal":(x.type==="チート"?"cheat":"special");
    const todayCls = isToday(x.d)?"today":"";
    const tagText = x.type==="普通"?"10分":(x.type==="チート"?"チート":"特別");
    let chips = tks.map(tk=>{
      const done = !!s[tk.id];
      const exCls = tk.ex ? `ex-${tk.ex}` : "";
      return `<button class="chip cat-${tk.cat} ${exCls} ${done?'done':''}" onclick="toggleTask(event,${currentMonth},${x.d},'${tk.id}')"><span class="check">${done?'✓':''}</span><span class="label">${tk.label}</span><span class="chip-act preset-del" onclick="event.stopPropagation();hidePresetTask(${currentMonth},${x.d},'${tk.id}','${tk.label}')" title="この予定を消す">×</span></button>`;
    }).join("");
    // カスタムタスク
    if(s.__custom__ && s.__custom__.length){
      chips += s.__custom__.map(t=>{
        const done = !!s[t.id];
        const safeLabel = t.label.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        const timed = t.time ? `${t.time} ${safeLabel}` : safeLabel;
        return `<button class="chip cat-custom ${done?'done':''}" onclick="toggleTask(event,${currentMonth},${x.d},'${t.id}')"><span class="check">${done?'✓':''}</span><span class="label">${timed}</span><span class="chip-act" onclick="event.stopPropagation();editCustomTask(${currentMonth},${x.d},'${t.id}')" title="編集">✏</span><span class="chip-act" onclick="event.stopPropagation();delCustomTask(${currentMonth},${x.d},'${t.id}')" title="削除">×</span></button>`;
      }).join("");
    }
    // 消した予定を戻す
    if(hid.length){
      chips += `<button class="chip chip-restore" onclick="restoreHidden(${currentMonth},${x.d})" title="消した予定を戻す">↩ ${hid.length}件戻す</button>`;
    }
    // 追加ボタン
    chips += `<button class="chip chip-add" onclick="addCustomTask(${currentMonth},${x.d})" title="タスク追加">+ 追加</button>`;
    const diaryMark = hasDiary(currentMonth, x.d) ? `<div class="diary-mark">📝</div>` : `<div class="diary-mark" style="opacity:.25">📝</div>`;
    const pastCls = isPastDay(currentMonth, x.d) ? "past" : "";
    return `
      <div class="list-day ${todayCls} ${pastCls}">

          <div class="tag">${tagText}</div>

        </div>
        <div class="tasks">${chips}</div>

    `;
  }).join("");
  return `<div class="list">${html}${renderRoadScene()}</div>`;
}

// ===== 活動継続日 =====
function getStreakDays(){
  if(!state.streakStart) return null;
  const start = new Date(state.streakStart + "T00:00:00");
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / (1000*60*60*24)) + 1;
  return diff;
}
function editStreak(){
  const cur = state.streakStart || "";
  const input = prompt("活動を始めた日を入力（例：2026-05-01）\n空欄でEnterすると解除", cur || "2026-05-01");
  if(input === null) return;
  const v = input.trim();
  if(!v){
    delete state.streakStart;
    saveState(state);
    diaryToast("継続日カウントを解除");
    render();
    return;
  }
  if(!/^\d{4}-\d{2}-\d{2}$/.test(v)){
    alert("YYYY-MM-DD の形式で入れてね（例：2026-05-01）");
    return;
  }
  state.streakStart = v;
  saveState(state);
  diaryToast("✓ 活動継続日を設定");
  render();
}
function formatStreak(days){
  // 1年=365日, 1ヶ月=30日 で近似（人が感覚で分かる表記）
  const y = Math.floor(days/365);
  const rem = days - y*365;
  const mo = Math.floor(rem/30);
  const d = rem - mo*30;
  if(y > 0) return y + "年" + (mo > 0 ? mo + "ヶ月" : "");
  if(mo > 0) return mo + "ヶ月" + (d > 0 ? d + "日" : "");
  return days + "日";
}
function renderStreak(){
  const el = document.getElementById("streakBanner");
  if(!el) return;
  const days = getStreakDays();
  if(days === null){
    el.innerHTML = `<div class="streak-banner unset">
      <div class="sb-fire">🔥</div>
      <div class="sb-main">
        <div class="sb-days">活動継続日 <small>未設定</small></div>
        <div class="sb-sub">始めた日を入れると毎日カウント</div>
      </div>
      <button class="sb-edit" onclick="editStreak()">設定する</button>
    </div>`;
    return;
  }
  const startLabel = state.streakStart.replace(/^\d{4}-/, '').replace('-', '/');
  el.innerHTML = `<div class="streak-banner">
    <div class="sb-fire">🔥</div>
    <div class="sb-main">
      <div class="sb-days">${formatStreak(days)}<small> 継続中！</small></div>
      <div class="sb-sub">${startLabel} から（通算${days}日）</div>
    </div>
    <button class="sb-edit" onclick="editStreak()">変更</button>
  </div>`;
}

// ===== 成長の見える化：共通ユーティリティ =====
function todayYMD(){
  const t = new Date();
  return {y:t.getFullYear(), m:t.getMonth()+1, d:t.getDate()};
}

// ===== 「歩み」ボード（機能A・読み取り専用・書き込み禁止） =====
// 対象キー: tracker2026_v2(state・既読)/sleep_v1/fightlog_v2/kaizen_v1
// この関数群は一切 localStorage.setItem を呼ばない（読み取り専用）。
function walkWeekMonday(dt){
  const d = new Date(dt); d.setHours(0,0,0,0);
  const wd = d.getDay();
  const diff = (wd===0) ? 6 : wd-1;
  d.setDate(d.getDate()-diff);
  return d;
}
function walkYMD(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function walkWeekDates(monday){
  const arr=[];
  for(let i=0;i<7;i++){ const d=new Date(monday); d.setDate(d.getDate()+i); arr.push(d); }
  return arr;
}
// 活動＝週内の✓完了数 / 運動＝夜タスク(WT/MMA/ハンド)の✓回数
function walkActivityWeek(monday){
  let done=0, night=0;
  walkWeekDates(monday).forEach(dt=>{
    const y=dt.getFullYear(), m=dt.getMonth()+1, d=dt.getDate();
    let days, day;
    try{ days = buildMonth(m,y); day = days.find(x=>x.d===d); }catch(e){ day=null; }
    if(!day) return;
    let tks=[], s={};
    try{ tks = visibleTasksOf(day, m); s = getDayState(m,d,y) || {}; }catch(e){}
    tks.forEach(tk=>{ if(s[tk.id]) done++; });
    if(s.__custom__ && s.__custom__.length) s.__custom__.forEach(t=>{ if(s[t.id]) done++; });
    if(day.night && s.night) night++;
  });
  return {done, night};
}
// 睡眠＝週の平均回復点（sleep_v1）。記録が無ければnull
function walkSleepWeek(monday){
  let sd;
  try{ sd = JSON.parse(localStorage.getItem("sleep_v1")||"null"); }catch(e){ sd=null; }
  if(!sd || !Array.isArray(sd.nights) || !sd.nights.length) return null;
  const start = monday.getTime(), end = start + 7*86400000;
  const inWeek = sd.nights.filter(n=> n && typeof n.wakeTs==="number" && typeof n.points==="number" && n.wakeTs>=start && n.wakeTs<end);
  if(!inWeek.length) return null;
  return Math.round(inWeek.reduce((a,n)=>a+n.points,0)/inWeek.length);
}
// MMA実験＝週の◯数・done数（fightlog_v2）。キーが無ければ丸ごとnull（行を隠す）
function walkFightlogMissing(){
  try{ return localStorage.getItem("fightlog_v2")===null; }catch(e){ return true; }
}
function walkFightlogWeek(monday){
  let fl;
  try{ fl = JSON.parse(localStorage.getItem("fightlog_v2")||"null"); }catch(e){ fl=null; }
  if(!fl || !Array.isArray(fl.sessions)) return null;
  const startStr = walkYMD(monday);
  const endDt = new Date(monday); endDt.setDate(endDt.getDate()+7);
  const endStr = walkYMD(endDt);
  let oCount=0, doneCount=0;
  fl.sessions.forEach(s=>{
    if(!s || !s.date || s.date < startStr || s.date >= endStr) return;
    if(s.exp && s.exp.result==='o') oCount++;
    if(s.done===true) doneCount++;
  });
  return {oCount, doneCount};
}
// 改善実験＝その週の判定（kaizen_v1）。対象週が無ければnull
function walkKaizenMissing(){
  try{ return localStorage.getItem("kaizen_v1")===null; }catch(e){ return true; }
}
function walkKaizenWeek(monday){
  let kd;
  try{ kd = JSON.parse(localStorage.getItem("kaizen_v1")||"null"); }catch(e){ kd=null; }
  if(!kd || !kd.active || !Array.isArray(kd.active.weeks) || !kd.active.weeks.length) return null;
  const startStr = walkYMD(monday);
  const week = kd.active.weeks.find(w=>w && w.start===startStr);
  if(!week || !week.result) return null;
  return week.result; // 'o' | 'x'
}
function walkCmpNum(a,b){
  if(a==null || b==null) return null;
  if(a>b) return 'win'; if(a<b) return 'lose'; return 'tie';
}
function walkCmpJudge(a,b){
  if(a==null || b==null) return null;
  if(a===b) return 'tie';
  return a==='o' ? 'win' : 'lose';
}
// 指定した週(Monday始まり)の5領域を、先週(その7日前)と比較して行データを組み立てる
function walkBuildRows(monday){
  const lastMon = new Date(monday); lastMon.setDate(lastMon.getDate()-7);
  const actT = walkActivityWeek(monday), actL = walkActivityWeek(lastMon);
  const sleepT = walkSleepWeek(monday), sleepL = walkSleepWeek(lastMon);
  const flMissing = walkFightlogMissing();
  const flT = flMissing ? null : walkFightlogWeek(monday);
  const flL = flMissing ? null : walkFightlogWeek(lastMon);
  const kzMissing = walkKaizenMissing();
  const kzT = kzMissing ? null : walkKaizenWeek(monday);
  const kzL = kzMissing ? null : walkKaizenWeek(lastMon);
  return [
    { key:'activity', emoji:'🏃', name:'活動', thisVal:actT.done, lastVal:actL.done, unit:'件', result:walkCmpNum(actT.done, actL.done), hidden:false },
    { key:'night', emoji:'💪', name:'運動', thisVal:actT.night, lastVal:actL.night, unit:'回', result:walkCmpNum(actT.night, actL.night), hidden:false },
    { key:'sleep', emoji:'😴', name:'睡眠', thisVal:sleepT, lastVal:sleepL, unit:'点', result:walkCmpNum(sleepT, sleepL), hidden:false },
    { key:'mma', emoji:'🥊', name:'MMA実験', thisVal: flT?flT.oCount:null, lastVal: flL?flL.oCount:null, unit:'◯', result: (flT&&flL) ? walkCmpNum(flT.oCount, flL.oCount) : null, hidden: flMissing },
    { key:'kaizen', emoji:'🧪', name:'改善実験', thisVal:kzT, lastVal:kzL, unit:'', result:walkCmpJudge(kzT, kzL), hidden:kzMissing, isJudge:true },
  ];
}
// ある週(Monday)の総合勝敗（行の多数決）。材料不足なら null
function walkOverallForWeek(monday){
  const rows = walkBuildRows(monday).filter(r=>!r.hidden);
  const counted = rows.filter(r=>r.result);
  if(!counted.length) return null;
  const win = counted.filter(r=>r.result==='win').length;
  const lose = counted.filter(r=>r.result==='lose').length;
  if(win>lose) return 'win';
  if(lose>win) return 'lose';
  return 'tie';
}
// 今月: 週ごとの総合勝敗を積み上げ「〇月: 対戦N週・X勝Y敗Z分」
function walkMonthRecord(){
  const today = new Date(); today.setHours(0,0,0,0);
  const y = today.getFullYear(), m = today.getMonth()+1;
  const monday0 = walkWeekMonday(new Date(y, m-1, 1));
  let win=0, lose=0, tie=0, weeks=0;
  const cursor = new Date(monday0);
  for(let guard=0; guard<6 && cursor.getTime()<=today.getTime(); guard++, cursor.setDate(cursor.getDate()+7)){
    if(cursor.getMonth()+1 !== m) continue;
    const res = walkOverallForWeek(new Date(cursor));
    if(!res) continue;
    weeks++;
    if(res==='win') win++; else if(res==='lose') lose++; else tie++;
  }
  return {m, weeks, win, lose, tie};
}
function walkEsc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function renderWalkBoard(){
  let rows, mr;
  try{
    const today = new Date(); today.setHours(0,0,0,0);
    const thisMon = walkWeekMonday(today);
    rows = walkBuildRows(thisMon).filter(r=>!r.hidden);
    mr = walkMonthRecord();
  }catch(e){
    rows = []; mr = null;
  }
  const counted = rows.filter(r=>r.result);
  const win = counted.filter(r=>r.result==='win').length;
  const lose = counted.filter(r=>r.result==='lose').length;
  const tie = counted.length - win - lose;
  const overallCls = !counted.length ? 'walk-tie' : (win>lose?'walk-win':(lose>win?'walk-lose':'walk-tie'));
  const headline = counted.length ? `${win}勝${lose}敗${tie}分` : "材料が集まり中";
  const arrowOf = r => r.result==='win' ? '↑' : (r.result==='lose' ? '↓' : (r.result==='tie' ? '→' : '·'));
  const fmtVal = (r, v) => {
    if(v==null) return '—';
    if(r.isJudge) return v==='o' ? '◯' : (v==='x' ? '✕' : '—');
    return v + r.unit;
  };
  const rowsHtml = rows.map(r=>{
    const cls = r.result==='win' ? 'walk-win' : (r.result==='lose' ? 'walk-lose' : (r.result==='tie' ? 'walk-tie' : ''));
    return `<div class="walk-row ${cls}">
      <span class="walk-ico">${r.emoji}</span>
      <span class="walk-name">${walkEsc(r.name)}</span>
      <span class="walk-vals">${fmtVal(r,r.thisVal)} <i class="walk-arrow">${arrowOf(r)}</i> ${fmtVal(r,r.lastVal)}</span>
    </div>`;
  }).join('');
  const monthLine = (mr && mr.weeks) ? `${mr.m}月: 対戦${mr.weeks}週・${mr.win}勝${mr.lose}敗${mr.tie}分` : (mr ? `${mr.m}月: まだ対戦記録なし` : "");
  return `<div class="walk-board">
    <div class="room-cap">WALK</div>
    <div class="walk-head">
      <div class="walk-title">先週の自分との対戦</div>
      <div class="walk-score ${overallCls}">${headline}</div>
    </div>
    <div class="walk-rows">${rowsHtml || '<div class="walk-empty">材料が集まり中</div>'}</div>
    ${lose>win ? `<div class="walk-hint">材料が増えた週</div>` : ''}
    ${monthLine ? `<div class="walk-month">${monthLine}</div>` : ''}
  </div>`;
}

// ===== 部屋3: 記録＝「観測室」の星図（機能B） =====
function walkSeededRand(seed){
  const x = Math.sin(seed*12.9898)*43758.5453;
  return x - Math.floor(x);
}
function renderObservatoryScene(monthForStars){
  let doneCount = 0;
  try{ doneCount = Math.min(60, tally(monthForStars).totalDone); }catch(e){ doneCount = 0; }
  const twinkle = new Set();
  if(doneCount>0) twinkle.add(0);
  if(doneCount>2) twinkle.add(Math.floor(doneCount/2));
  if(doneCount>4) twinkle.add(doneCount-1);
  let stars = '';
  for(let i=0;i<doneCount;i++){
    const rx = (walkSeededRand(monthForStars*97+i*3.1)*96+2).toFixed(1);
    const ry = (walkSeededRand(monthForStars*53+i*7.7+11)*94+3).toFixed(1);
    stars += `<i class="obs-star${twinkle.has(i)?' twinkle':''}" style="left:${rx}%;top:${ry}%"></i>`;
  }
  return `<div class="room-obs" aria-hidden="true">
    <div class="obs-dome"></div>
    <div class="obs-stars">${stars}</div>
  </div>`;
}

// ===== カレンダー（未使用・残置） =====
function renderCalendar(){
  const days = buildMonth(currentMonth);
  const isToday = (d)=> isTodayYMD(curYear, currentMonth, d);
  const dayMap = {};
  days.forEach(x=>dayMap[x.d]=x);

  // 日曜起点グリッド
  const first = new Date(curYear, currentMonth-1, 1).getDay(); // 0=日
  const total = daysInMonth(currentMonth);
  const cells = [];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1; d<=total; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);

  const dowHTML = ["日","月","火","水","木","金","土"].map((w,i)=>{
    const cls = i===0?"sun":(i===6?"sat":"");
    return `<div class="cal-dow ${cls}">${w}</div>`;
  }).join("");

  const cellsHTML = cells.map(d=>{
    if(!d) return `<div class="cal-cell empty"></div>`;
    const x = dayMap[d];
    const tks = tasksOf(x);
    const s = getDayState(currentMonth, d);
    const typeCls = x.type==="普通"?"normal":(x.type==="チート"?"cheat":"special");
    const todayCls = isToday(d)?"today":"";
    const numCls = x.wd===0?"sun":(x.wd===6?"sat":"");
    const tagShort = x.type==="チート"?"チート":(x.type==="特別"?"特別":"");
    let chipsMini = tks.map(tk=>{
      const done = !!s[tk.id];
      const exCls = tk.ex ? `ex-${tk.ex}` : "";
      return `<button class="chip-mini cat-${tk.cat} ${exCls} ${done?'done':''}" onclick="toggleTask(event,${currentMonth},${d},'${tk.id}')" title="${tk.label}">${tk.label}</button>`;
    }).join("");
    if(s.__custom__ && s.__custom__.length){
      chipsMini += s.__custom__.map(t=>{
        const done = !!s[t.id];
        const safeLabel = t.label.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        return `<button class="chip-mini cat-custom ${done?'done':''}" onclick="toggleTask(event,${currentMonth},${d},'${t.id}')" title="${safeLabel}">${safeLabel}</button>`;
      }).join("");
    }
    chipsMini += `<button class="chip-mini chip-add" onclick="addCustomTask(${currentMonth},${d})" title="タスク追加">+</button>`;
    const dMark = hasDiary(currentMonth, d) ? `<span class="diary-mark">📝</span>` : "";
    const pastCls = isPastDay(currentMonth, d) ? "past" : "";
    return `
      <div class="cal-cell ${typeCls} ${todayCls} ${pastCls}" ondblclick="openDiary(${currentMonth},${d})">
        <div class="head">
          <span class="num ${numCls}" onclick="event.stopPropagation();openDiary(${currentMonth},${d})" style="cursor:pointer" title="タップで日記">${d}</span>
          <span class="small-tag">${tagShort}</span>
        </div>
        ${dMark}
        <div class="chips-mini">${chipsMini}</div>
      </div>
    `;
  }).join("");

  return `<div class="cal"><div class="cal-grid">${dowHTML}${cellsHTML}</div></div>`;
}

// ===== 操作 =====
function spawnSparkles(ev){
  const rect = ev?.target?.getBoundingClientRect?.();
  const cx = rect ? rect.left + rect.width/2 : window.innerWidth/2;
  const cy = rect ? rect.top + rect.height/2 : window.innerHeight/2;
  const colors = ['#5ac8fa','#30d158','#ff9f0a','#ff375f','#bf5af2','#64d2ff','#ffd60a'];
  for(let i=0;i<12;i++){
    const dot = document.createElement('div');
    dot.className='sparkle-dot';
    const angle = (Math.PI*2/12)*i;
    const dist = 30+Math.random()*40;
    dot.style.left=(cx-4)+'px';
    dot.style.top=(cy-4)+'px';
    dot.style.background=colors[i%colors.length];
    dot.style.setProperty('--dx',(Math.cos(angle)*dist)+'px');
    dot.style.setProperty('--dy',(Math.sin(angle)*dist)+'px');
    document.body.appendChild(dot);
    setTimeout(()=>dot.remove(),800);
  }
}
function toggleTask(ev,m,d,id){
  const s = getDayState(m,d);
  s[id] = !s[id];
  if(!s[id]) delete s[id];
  const justCompleted = !!s[id];
  if(justCompleted && ev) spawnSparkles(ev);
  saveState(state);
  render();
}

// ===== カスタムタスク（追加・編集・削除） =====
function addCustomTask(m,d){
  const label = prompt("追加するタスク名（例：歯医者・コンビニ・読書）", "");
  if(!label || !label.trim()) return;
  const s = getDayState(m,d);
  if(!s.__custom__) s.__custom__ = [];
  s.__custom__.push({
    id: `c_${Date.now()}`,
    label: label.trim(),
    cat: "custom"
  });
  saveState(state);
  render();
}

function editCustomTask(m,d,id){
  const s = getDayState(m,d);
  if(!s.__custom__) return;
  const task = s.__custom__.find(t=>t.id===id);
  if(!task) return;
  const newLabel = prompt("新しい名前", task.label);
  if(!newLabel || !newLabel.trim()) return;
  task.label = newLabel.trim();
  saveState(state);
  render();
}

function delCustomTask(m,d,id){
  const s = getDayState(m,d);
  if(!s.__custom__) return;
  const task = s.__custom__.find(t=>t.id===id);
  if(!task) return;
  if(!confirm(`「${task.label}」を削除？`)) return;
  s.__custom__ = s.__custom__.filter(t=>t.id!==id);
  delete s[id];
  saveState(state);
  render();
}

const PRESET_TIME = {
  morning:["06:30","07:30"], lunch:["12:00","12:40"],
  night:["20:00","21:30"], daily:["21:30","22:00"],
  loc:["09:00","16:30"],

};
function pad2(n){ return String(n).padStart(2,'0'); }
function hm2min(hm){ if(!hm) return null; if(hm.includes(':')){ const p=hm.split(':'); return (+p[0])*60+(+p[1]); } const d=hm.replace(/\D/g,''); if(d.length<=2) return (+d)*60; return (+d.slice(0,-2))*60+(+d.slice(-2)); }
function min2hm(t){ t=Math.max(0,Math.min(1439,Math.round(t))); return pad2(Math.floor(t/60))+':'+pad2(t%60); }

let selDay = new Date().getDate();

function getPresetTime(s, id){
  if(s.__ptime__ && s.__ptime__[id]) return s.__ptime__[id];
  const def = PRESET_TIME[id];
  if(def===undefined) return {start:9*60, end:10*60};
  if(def===null) return null;
  return {start:hm2min(def[0]), end:hm2min(def[1])};
}
function collectEvents(m,d){
  const days = buildMonth(m);
  const x = days.find(k=>k.d===d);
  if(!x) return [];
  const s = getDayState(m,d);
  const out = [];
  visibleTasksOf(x, m).forEach(tk=>{
    const tm = getPresetTime(s, tk.id);
    const pc = (s.__pcolor__&&s.__pcolor__[tk.id]) || null;
    out.push({ id:tk.id, kind:'preset', cat:tk.cat, label:tk.label,
      done:!!s[tk.id], start: tm?tm.start:null, end: tm?tm.end:null, allDay: !tm, color:pc });
  });
  (s.__custom__||[]).forEach(t=>{
    const start = hm2min(t.start || t.time);
    const end = hm2min(t.end) || (start!=null ? start+60 : null);
    out.push({ id:t.id, kind:'custom', cat:'custom', label:t.label,
      done:!!s[t.id], start, end, allDay: start==null, color:t.color||null });
  });
  return out;
}
function setEventTime(m,d,id,kind,startMin,endMin){

  } else {
    if(!s.__ptime__) s.__ptime__={};
    s.__ptime__[id] = {start:Math.round(startMin), end:Math.round(endMin)};

}
// 年月をまたいだ日移動先を計算（delta日ぶん進める/戻す）
function addDaysYMD(y,m,d,delta){
  const dt = new Date(y, m-1, d);

  return {y:dt.getFullYear(), m:dt.getMonth()+1, d:dt.getDate()};
}
