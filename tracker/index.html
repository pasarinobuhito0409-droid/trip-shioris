function layoutOverlaps(evs){
  const sorted=[...evs].sort((a,b)=>a.start-b.start||b.end-a.end);
  const clusters=[]; let cur=null; let curEnd=-1;
  for(const e of sorted){
    if(!cur||e.start>=curEnd){ cur=[]; clusters.push(cur); curEnd=e.end; }
    else curEnd=Math.max(curEnd,e.end);
    cur.push(e);
  }
  const pos={};
  for(const cl of clusters){
    const cols=[];
    for(const e of cl){
      let ci=cols.findIndex(endT=>endT<=e.start);
      if(ci===-1){ ci=cols.length; cols.push(e.end); } else cols[ci]=e.end;
      e._col=ci;
    }
    const n=cols.length;
    for(const e of cl){ pos[e.kind+'_'+e.id]={left:e._col*(100/n), width:100/n}; }
  }
  return pos;
}
function renderDayView(){

  const today = new Date();
  const isToday = (d)=> isTodayYMD(curYear, currentMonth, d);
  const esc = t => (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  // 週の帯：selDayを含む実際の週7日（前後月にまたがってもOK）
  const selDate = new Date(curYear, currentMonth-1, selDay);
  const wdOfSel = selDate.getDay();
  let strip='';
  for(let i=0;i<7;i++){
    const dt = new Date(curYear, currentMonth-1, selDay - wdOfSel + i);
    const dy=dt.getFullYear(), dm=dt.getMonth()+1, dd=dt.getDate();
    const wlabel = WD_JP[i];
    const wcls = i===0?'sun':(i===6?'sat':'');
    const outMonth = !(dy===curYear && dm===currentMonth);
    const cls = (!outMonth && dd===selDay?'sel':'')+' '+(isTodayYMD(dy,dm,dd)?'today':'')+' '+(outMonth?'out-month':'');
    strip += `<button class="dw ${cls}" onclick="pickDay(${dd},${dm},${dy})"><span class="w ${wcls}">${wlabel}</span><span class="n">${dd}</span></button>`;
  }

  const evs = collectEvents(currentMonth, selDay);
  const allDay = evs.filter(e=>e.allDay);

    if(h<24) lines += `<div class="dv-hlabel" data-h="${h}" style="top:${y}px">${pad2(h)}:00</div>`;
  }
  const posMap=layoutOverlaps(timed);
  const blocks = timed.map(e=>{

    const handlesHTML = isSel ? `<div class="dv-handle top" data-dir="top"></div><div class="dv-handle bot" data-dir="bot"></div>` : '';
    return `<div class="dv-ev ${e.done?'done':''} ${h<36?'sm':''} ${isSel?'selected':''}" style="top:${top}px;height:${h}px;left:calc(${p.left}% + 2px);width:calc(${p.width}% - 5px);background:linear-gradient(160deg,${col}cc,${col}7a)" data-start="${e.start}" data-end="${e.end}" data-id="${e.id}" data-kind="${e.kind}">
      <span class="tm">${min2hm(e.start)}–${min2hm(e.end)}</span>

  let nowLine='';

    nowLine=`<div class="dv-now" data-t="${min2hm(nm)}" data-min="${nm}" style="top:${nm/60*HOUR_PX}px"></div>`;
  }
  const allDayHTML = allDay.length ? `<div class="dv-allday"><span class="ad-label">終日</span>${allDay.map(e=>`<button class="chip cat-${e.cat} ${e.done?'done':''}" onclick="toggleTask(event,${currentMonth},${selDay},'${e.id}')"><span class="check">${e.done?'✓':''}</span><span class="label">${esc(e.label)}</span></button>`).join('')}</div>` : '';
  const wd = WD_JP[x.wd];

  return `<div class="dv">
    <div class="dv-head" id="dvHead">

      <div class="dv-date"><span><span class="dnum">${currentMonth}月${selDay}日（${wd}）</span>${x.type}日</span><span>${todayBtn}<button class="back" onclick="changeDay(-1)">‹</button> <button class="back" onclick="openEvent(null,'custom')">＋ 予定</button> <button class="back" onclick="changeDay(1)">›</button></span></div>
      ${allDayHTML}
    </div>
    <div class="dv-scroll" id="dvScroll"><div class="dv-swipe" id="dvSwipe"><div class="dv-gridwrap"><div class="dv-grid" id="dvGrid" style="height:${24*HOUR_PX}px">${lines}${blocks}${nowLine}</div></div></div></div>
  </div>`;
}

function setupDaySwipe(){
  const sw=document.getElementById('dvSwipe');
  if(!sw||sw._ready) return;
  sw._ready=true;
  let sx=0,sy=0,dx=0,mode=null;
  sw.addEventListener('touchstart',e=>{
    if(e.touches.length>1){ mode='v'; return; }
    if(rsz||drag||ghost||selectedEv||pinching){ mode='v'; return; }
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; dx=0; mode=null;
  },{passive:true});
  sw.addEventListener('touchmove',e=>{
    if(mode==='v'||rsz||drag||ghost||selectedEv||pinching||e.touches.length>1) return;
    const mx=e.touches[0].clientX-sx, my=e.touches[0].clientY-sy;
    if(!mode){
      if(Math.abs(mx)>16&&Math.abs(mx)>Math.abs(my)*1.8) mode='h';
      else if(Math.abs(my)>12) mode='v';
      else return;
    }
    if(mode==='h'){
      dx=mx;
      const el=sw.querySelector('.dv-gridwrap');
      el.classList.remove('dv-anim');
      el.style.transform=`translateX(${dx}px)`;
    }
  },{passive:true});
  sw.addEventListener('touchend',()=>{
    if(mode!=='h'){ mode=null; return; }
    const el=sw.querySelector('.dv-gridwrap');
    const w=sw.clientWidth;
    const goNext=dx<-w*0.22;
    const goPrev=dx>w*0.22;
    el.classList.add('dv-anim');
    if(goNext||goPrev){
      el.style.transform=`translateX(${goNext?-w:w}px)`;
      setTimeout(()=>dvSlideIn(goNext?1:-1),200);
    } else {
      el.style.transform='translateX(0)';
    }
    mode=null; dx=0;
  },{passive:true});
}
function renderTimelineOnly(){
  const grid=document.getElementById('dvGrid');
  if(!grid) return;
  grid.style.height=(24*HOUR_PX)+'px';
  grid.querySelectorAll('.dv-hline').forEach(el=>{
    const h=parseInt(el.getAttribute('data-h'));
    el.style.top=(h*HOUR_PX)+'px';
  });
  grid.querySelectorAll('.dv-hlabel').forEach(el=>{
    const h=parseInt(el.getAttribute('data-h'));
    el.style.top=(h*HOUR_PX)+'px';
  });
  grid.querySelectorAll('.dv-ev').forEach(el=>{
    const st=parseInt(el.dataset.start), en=parseInt(el.dataset.end);
    if(isNaN(st)||isNaN(en)) return;

    const h=Math.max(22,(en-st)/60*HOUR_PX);

    el.style.height=h+'px';
    el.classList.toggle('sm', h<36);
  });
  const nowEl=grid.querySelector('.dv-now');

}
function setupPinchZoom(){
  const scroll=document.getElementById('dvScroll');
  if(!scroll||scroll._pinchReady) return;
  scroll._pinchReady=true;
  let pz=null, rafId=null, lastTouches=null;
  function dist(t0,t1){ const dx=t1.clientX-t0.clientX, dy=t1.clientY-t0.clientY; return Math.hypot(dx,dy); }
  scroll.addEventListener('touchstart',e=>{
    if(e.touches.length!==2) return;
    clearTimeout(lpTimer);
    drag=null; rsz=null;
    removeGhost();
    const t0=e.touches[0], t1=e.touches[1];
    const cy=(t0.clientY+t1.clientY)/2;
    const rect=scroll.getBoundingClientRect();
    const centerMin=((cy-rect.top+scroll.scrollTop)/HOUR_PX)*60;
    const centerOffsetInViewport=cy-rect.top;
    pz={ d0:dist(t0,t1), baseHourPx:HOUR_PX, centerMin, centerOffsetInViewport };
    pinching=true;
  },{passive:true});
  scroll.addEventListener('touchmove',e=>{
    if(!pz||e.touches.length!==2) return;
    e.preventDefault();
    lastTouches=[e.touches[0],e.touches[1]];
    const d=dist(e.touches[0],e.touches[1]);
    const raw=pz.baseHourPx*(d/pz.d0);
    HOUR_PX=Math.max(HOUR_PX_MIN,Math.min(HOUR_PX_MAX,raw));
    if(rafId) return;
    rafId=requestAnimationFrame(()=>{
      rafId=null;
      renderTimelineOnly();
      scroll.scrollTop = Math.max(0,(pz.centerMin/60*HOUR_PX) - pz.centerOffsetInViewport);
    });
  },{passive:false});
  const end=()=>{
    if(!pz) return;
    pz=null; pinching=false; lastTouches=null;
    saveHourPx();
    skyUpdate();
  };
  scroll.addEventListener('touchend',e=>{ if(e.touches.length<2) end(); },{passive:true});
  scroll.addEventListener('touchcancel',()=>end(),{passive:true});
}
function setupWeekSwipe(){
  const strip=document.getElementById('dvWeekStrip');
  if(!strip||strip._ready) return;
  strip._ready=true;
  let sx=0,sy=0,mode=null;
  strip.addEventListener('touchstart',e=>{
    if(e.touches.length>1||selectedEv||pinching){ mode='x'; return; }
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; mode=null;
  },{passive:true});
  strip.addEventListener('touchmove',e=>{
    if(mode==='x'||selectedEv||pinching||e.touches.length>1) return;
    const mx=e.touches[0].clientX-sx, my=e.touches[0].clientY-sy;
    if(!mode){
      if(Math.abs(mx)>16&&Math.abs(mx)>Math.abs(my)*1.8) mode='h';
      else if(Math.abs(my)>10) mode='x';
    }
  },{passive:true});
  strip.addEventListener('touchend',e=>{
    if(mode!=='h'){ mode=null; return; }
    const ex=(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0].clientX:sx;
    const dx=ex-sx;
    mode=null;
    if(Math.abs(dx)<24) return;
    selectedEv=null;
    const nx=addDaysYMD(curYear, currentMonth, selDay, dx<0?7:-7);
    const crossesMonth=(nx.y!==curYear||nx.m!==currentMonth);
    if(crossesMonth){ curYear=nx.y; currentMonth=nx.m; renderTabs(); }
    selDay=nx.d;
    renderContent();
  },{passive:true});
}

const SKY_KEYS=[
  [0,[8,10,24],[5,7,18]],
  [270,[20,24,48],[30,26,50]],
  [360,[56,52,92],[140,90,90]],
  [480,[52,86,130],[90,130,160]],
  [720,[50,100,160],[100,150,190]],
  [990,[70,80,130],[180,110,80]],
  [1110,[60,45,90],[150,70,90]],
  [1200,[24,26,56],[40,32,64]],
  [1440,[8,10,24],[5,7,18]]
];
const skyLerp=(a,b,t)=>Math.round(a+(b-a)*t);
const skyMix=(c1,c2,t)=>`rgb(${skyLerp(c1[0],c2[0],t)},${skyLerp(c1[1],c2[1],t)},${skyLerp(c1[2],c2[2],t)})`;
let skyRaf=null;
function skyMakeStars(){
  const stars=document.getElementById('stars');
  if(!stars||stars.childElementCount) return;
  let h='';
  for(let i=0;i<70;i++){
    const sz=Math.random()*2+1;
    h+=`<div class="star" style="left:${Math.random()*100}%;top:${Math.random()*70}%;width:${sz}px;height:${sz}px;animation-delay:${Math.random()*3}s"></div>`;
  }
  stars.innerHTML=h;
}
function skyUpdate(){
  if(!document.body.classList.contains('cal2-lock')) return;
  const scroll=document.getElementById('dvScroll');
  const sky=document.getElementById('sky'), cel=document.getElementById('celestial'), stars=document.getElementById('stars');
  if(!scroll||!sky||!cel||!stars) return;
  skyMakeStars();
  let min=((scroll.scrollTop+scroll.clientHeight/2)/HOUR_PX)*60;
  min=Math.max(0,Math.min(1440,min));
  let i=0;
  while(i<SKY_KEYS.length-2 && min>SKY_KEYS[i+1][0]) i++;
  const k0=SKY_KEYS[i], k1=SKY_KEYS[i+1];
  const f=Math.max(0,Math.min(1,(min-k0[0])/((k1[0]-k0[0])||1)));
  sky.style.background=`linear-gradient(165deg,${skyMix(k0[1],k1[1],f)} 0%,${skyMix(k0[2],k1[2],f)} 100%)`;
  const sunP=(min-360)/765;
  const moonP=(min>=1170?min-1170:min+270)/600;
  let p=null, isMoon=false;
  if(sunP>=0&&sunP<=1){ p=sunP; }
  else if(moonP>=0&&moonP<=1){ p=moonP; isMoon=true; }
  if(p==null){
    cel.style.opacity='0';
  } else {
    cel.style.opacity='1';
    const x=8+p*76, y=86-Math.sin(p*Math.PI)*46;
    cel.style.transform=`translate(${x}vw,${y}vh)`;
    cel.style.background=isMoon?'radial-gradient(circle at 38% 38%,#fdfbf2,#cfd9da)':'radial-gradient(circle at 38% 38%,#fdf1d4,#e8b463)';
    cel.style.boxShadow=isMoon?'0 0 40px rgba(220,228,228,.55)':'0 0 56px rgba(232,180,99,.65)';
  }
  let so=0;
  if(min>=1140) so=Math.min(1,(min-1140)/90);
  else if(min<=270) so=1;
  else if(min<=360) so=1-(min-270)/90;
  stars.style.opacity=so;
}
function skyOnScroll(){
  if(skyRaf) return;
  skyRaf=requestAnimationFrame(()=>{ skyRaf=null; skyUpdate(); });
}

let rsz=null;
let drag=null;
let selectedEv=null; // {id,kind}
let pinching=false;
let ghost=null;
function spawnGhost(startMin, clientY){
  removeGhost();
  const grid=document.getElementById('dvGrid');
  if(!grid) return;
  const dur=60;
  startMin=Math.max(0,Math.min(1440-dur,startMin));
  grid.insertAdjacentHTML('beforeend',`<div class="dv-ev ghost" id="dv-ghost" style="top:${startMin/60*HOUR_PX}px;height:${dur/60*HOUR_PX}px;left:2px;right:8px"><span class="tm">${min2hm(startMin)}–${min2hm(startMin+dur)}</span><span class="nm">新規予定</span></div>`);
  ghost={ el:document.getElementById('dv-ghost'), y0:clientY, origStart:startMin, curStart:startMin, dur };
}
function removeGhost(){
  ghost=null;
  const g=document.getElementById('dv-ghost');
  if(g) g.remove();
}
let suppressClickInfo=null;
function markSuppressClick(ev){
  const pt=(ev.changedTouches&&ev.changedTouches[0])?ev.changedTouches[0]:ev;
  suppressClickInfo={t:Date.now(), x:pt.clientX, y:pt.clientY};
}
const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
let dvScrolling=false, dvScrollEndTimer=null;

function clearSelection(){

function setupResize(){
  if(setupResize._done) return;
  setupResize._done=true;
  const onMove=(ev)=>{
    if(pinching) return;
    const cy=(ev.touches?ev.touches[0].clientY:ev.clientY);
    if(ghost&&ghost.el){
      if(ev.touches&&ev.touches.length>1){ removeGhost(); return; }
      const gdy=cy-ghost.y0;
      let rawStart=ghost.origStart+gdy/HOUR_PX*60;
      rawStart=Math.max(0,Math.min(1440-ghost.dur,rawStart));
      let newStart=Math.round(rawStart/15)*15;
      newStart=Math.max(0,Math.min(1440-ghost.dur,newStart));
      ghost.el.style.top=(rawStart/60*HOUR_PX)+'px';
      ghost.el.querySelector('.tm').textContent=`${min2hm(newStart)}–${min2hm(newStart+ghost.dur)}`;
      ghost.curStart=newStart;
      ev.preventDefault();
      return;
    }
    if(rsz){
      if(rsz.dir==='top'){
        let startMin=rsz.origStart+(cy-rsz.y0)/HOUR_PX*60;
        startMin=Math.round(startMin/5)*5;
        startMin=Math.max(0,Math.min(rsz.origEnd-15,startMin));
        rsz.el.style.top=(startMin/60*HOUR_PX)+'px';
        rsz.el.style.height=Math.max(22,(rsz.origEnd-startMin)/60*HOUR_PX)+'px';
        rsz.el.querySelector('.tm').textContent=`${min2hm(startMin)}–${min2hm(rsz.origEnd)}`;
        rsz.curStart=startMin; rsz.curEnd=rsz.origEnd;
      } else {
        let endMin=rsz.origEnd+(cy-rsz.y0)/HOUR_PX*60;
        endMin=Math.round(endMin/5)*5;
        endMin=Math.max(rsz.origStart+15,Math.min(1440,endMin));
        rsz.el.style.height=Math.max(22,(endMin-rsz.origStart)/60*HOUR_PX)+'px';
        rsz.el.querySelector('.tm').textContent=`${min2hm(rsz.origStart)}–${min2hm(endMin)}`;
        rsz.curStart=rsz.origStart; rsz.curEnd=endMin;
      }
      ev.preventDefault();
    }
    if(drag){
      if(ev.touches && ev.touches.length>1){ drag.tapCancelled=true; drag.touches2=true; return; }
      const dy=cy-drag.y0;
      const dx0=Math.abs((ev.touches?ev.touches[0].clientX:ev.clientX)-drag.x0);
      if(Math.abs(dy)>10||dx0>10) drag.tapCancelled=true;
      if(drag.isChk) return; // ◯は完了タップ専用。ドラッグ移動させない
      if(!drag.active){
        if(lpFired||drag.wasSelected){
          if(Math.abs(dy)<6 && dx0<6) return;
          drag.active=true; drag.el.classList.add('dragging'); clearTimeout(lpTimer);
        } else {
          if(Math.abs(dy)>10||dx0>10){ drag=null; return; }
          return;
        }
      }
      let rawStart=drag.origStart+dy/HOUR_PX*60;
      rawStart=Math.max(0,Math.min(1440-drag.dur,rawStart));
      let newStart=Math.round(rawStart/15)*15;
      newStart=Math.max(0,Math.min(1440-drag.dur,newStart));
      const newEnd=newStart+drag.dur;
      drag.el.style.top=(rawStart/60*HOUR_PX)+'px';
      drag.el.querySelector('.tm').textContent=`${min2hm(newStart)}–${min2hm(newEnd)}`;
      drag.curStart=newStart; drag.curEnd=newEnd;
      ev.preventDefault();
    }
  };
  const onUp=(ev)=>{
    if(ghost){
      clearTimeout(lpTimer);
      const gs=ghost.curStart, ge=gs+ghost.dur;
      if(ghost.el){
        ghost.el.style.top=(gs/60*HOUR_PX)+'px';
        const gtm=ghost.el.querySelector('.tm');
        if(gtm) gtm.textContent=`${min2hm(gs)}–${min2hm(ge)}`;
      }
      ghost=null;
      markSuppressClick(ev);
      openEvent(null,'custom',gs,ge);
      return;
    }
    if(rsz){
      setEventTime(currentMonth, selDay, rsz.id, rsz.kind, rsz.curStart, rsz.curEnd);
      rsz=null;
      renderContent(); diaryToast("✓ 時間を変更");
      markSuppressClick(ev);
      return;
    }
    if(drag){
      drag.el.classList.remove('dragging');
      clearTimeout(lpTimer);
      if(!drag.active){
        // タップ扱い：タッチ端末はここで確定判定、PCはclickイベントに任せる
        const did=drag.id, dkind=drag.kind, isChk=drag.isChk, wasSelected=drag.wasSelected, wasLpFired=lpFired;
        const tapOk = !drag.tapCancelled && !drag.touches2 && (Date.now()-drag.t0)<500 && !dvScrolling && !lpFired;
        drag=null;
        if(IS_TOUCH && tapOk){
          if(isChk){
            toggleTask(ev, currentMonth, selDay, did);
            markSuppressClick(ev);
          } else if(!wasSelected){
            openEvent(did, dkind);
            markSuppressClick(ev);
          }
        } else if(wasLpFired){
          // 長押しで選択状態に入ったが指が動かなかった：選択表示のまま再描画
          renderContent();
          markSuppressClick(ev);
        }
        return;
      }
      setEventTime(currentMonth, selDay, drag.id, drag.kind, drag.curStart, drag.curEnd);
      diaryToast("✓ 移動した");
      drag=null;
      renderContent();
      markSuppressClick(ev);
    }
  };
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onUp);
  document.addEventListener('touchcancel',function(){ if(ghost) removeGhost(); });
}

// === 長押し=選択モード／空き長押し=追加（iPhone風） ===
let lpTimer=null, lpMoved=false, lpFired=false;
function setupLongPress(){
  const grid=document.getElementById('dvGrid');
  if(!grid || grid._lpReady) return;
  grid._lpReady=true;
  grid.addEventListener('touchstart',function(ev){
    if(ev.touches.length>1) return;
    if(ev.target.closest('.dv-handle')) return;
    const evBlock=ev.target.closest('.dv-ev');
    lpMoved=false; lpFired=false;
    if(evBlock){
      // .dv-ev本体の長押し→選択モード＋そのまま持ち上げて移動継続（指を離さず一体化）
      lpTimer=setTimeout(()=>{
        if(lpMoved||drag&&drag.active) return;
        lpFired=true;
        if(navigator.vibrate) navigator.vibrate(10);
        selectedEv={id:evBlock.dataset.id, kind:evBlock.dataset.kind};
        evBlock.classList.add('selected');
        if(!evBlock.querySelector('.dv-handle')){
          evBlock.insertAdjacentHTML('beforeend','<div class="dv-handle top" data-dir="top"></div><div class="dv-handle bot" data-dir="bot"></div>');
        }
        if(drag && !drag.isChk){
          drag.active=true;
          drag.el.classList.add('dragging');
        }
      },400);
      return;
    }
    // 空きスペースの長押し→追加
    const rect=grid.getBoundingClientRect();
    const scrollEl=document.getElementById('dvScroll');
    const scrollTop = scrollEl?scrollEl.scrollTop:0;
    const clientY=ev.touches[0].clientY;
    lpTimer=setTimeout(()=>{
      if(lpMoved) return;
      lpFired=true;
      let startMin=Math.round(((clientY-rect.top)/HOUR_PX*60)/15)*15;
      startMin=Math.max(0,Math.min(1380,startMin));
      if(navigator.vibrate) navigator.vibrate(30);
      spawnGhost(startMin, clientY);
    },400);
  },{passive:true});
  grid.addEventListener('touchmove',function(){ lpMoved=true; clearTimeout(lpTimer); },{passive:true});
  grid.addEventListener('touchend',function(){ clearTimeout(lpTimer); },{passive:true});
  grid.addEventListener('touchcancel',function(){ clearTimeout(lpTimer); },{passive:true});
}

    drag={ id:evBlock.dataset.id, kind:evBlock.dataset.kind, el:evBlock, isChk,

      t0:Date.now(), tapCancelled:false, touches2:false,

let evCtx=null;
let evOpenScrollTop=null;
function openEvent(id, kind, presetStart, presetEnd){
  selectedEv=null;
  const dvScrollEl=document.getElementById('dvScroll');
  if(dvScrollEl) evOpenScrollTop=dvScrollEl.scrollTop;
  const s=getDayState(currentMonth, selDay);
  if(id==='null') id=null;
  let name,start,end,done,isPreset;
  if(!id){
    evCtx={ id:null, kind:'custom', isNew:true };
    name=''; start=(presetStart!=null?presetStart:9*60); end=(presetEnd!=null?presetEnd:start+60); done=false; isPreset=false;
  } else if(kind==='custom'){
    const t=(s.__custom__||[]).find(t=>t.id===id);
    if(!t) return;
    evCtx={ id, kind:'custom', isNew:false };
    const st=hm2min(t.start||t.time); name=t.label; start=(st!=null?st:9*60); end=hm2min(t.end)||(start+60); done=!!s[id]; isPreset=false;
  } else {
    const tm=getPresetTime(s,id);
    const days=buildMonth(currentMonth); const x=days.find(k=>k.d===selDay);
    const tk=tasksOf(x).find(t=>t.id===id);
    evCtx={ id, kind:'preset', isNew:false };
    name=tk?tk.label:id; start=tm?tm.start:9*60; end=tm?tm.end:10*60; done=!!s[id]; isPreset=true;
  }
  document.getElementById("dsBg").classList.add("show");
  const esc=t=>(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const curColor = evCtx.isNew ? '#8e44ad' : (function(){
    if(kind==='custom'){ const t=(s.__custom__||[]).find(t=>t.id===id); return t&&t.color?t.color:'#8e44ad'; }
    if(s.__pcolor__ && s.__pcolor__[id]) return s.__pcolor__[id];
    return DOT_COLORS[evCtx.kind==='preset'? (function(){ const days=buildMonth(currentMonth); const x=days.find(k=>k.d===selDay); const tk=tasksOf(x).find(t=>t.id===id); return tk?tk.cat:'custom'; })() :'custom'] || '#8e44ad';
  })();
  evCtx.color = curColor;
  evCtx.done = done;
  evCtx.prevStart = start;

function date2ymd(dt){ return {y:dt.getFullYear(), m:dt.getMonth()+1, d:dt.getDate()}; }
function dateCmp(a,b){ return (a.y-b.y)||(a.m-b.m)||(a.d-b.d); }
// 開始日を含む発生日リスト。until未指定=3ヶ月先まで
function repeatDates(y,m,d,freq,untilStr){
  const out=[]; const start=new Date(y,m-1,d);
  let until = untilStr ? new Date(untilStr+'T23:59:59') : new Date(y, m-1+3, d, 23,59,59);
  if(until<start) until=start;
  if(freq==='monthly'){
    let cy=y, cm=m;
    for(let i=0;i<60;i++){
      const dim=new Date(cy,cm,0).getDate();
      if(d<=dim){
        const dt=new Date(cy,cm-1,d);
        if(dt>until) break;
        out.push({y:cy,m:cm,d:d});
      }
      cm++; if(cm>12){cm=1;cy++;}
    }
  } else {
    const step = freq==='daily'?1 : freq==='weekly'?7 : 14;
    let dt=start;
    for(let i=0;i<400;i++){
      if(dt>until) break;
      out.push(date2ymd(dt));
      dt=new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()+step);
    }
  }
  return out;
}
function parseDayKeyStr(k){
  const p=k.split('-');
  if(p.length===2){ const m=+p[0], d=+p[1]; return (m>=1&&m<=12&&d>=1&&d<=31)?{y:2026,m,d}:null; }
  if(p.length===3){ const y=+p[0],m=+p[1],d=+p[2]; return (y>2000&&y<3000&&m>=1&&m<=12&&d>=1&&d<=31)?{y,m,d}:null; }
  return null;
}
function forEachRidOccurrence(rid, cb){
  Object.keys(state).forEach(k=>{
    const pd=parseDayKeyStr(k); if(!pd) return;
    const s=state[k]; if(!s||!s.__custom__) return;
    s.__custom__.forEach(t=>{ if(t.rid===rid) cb(pd, s, t); });
  });
}
function applyEvVals(t,v){ t.label=v.label; t.start=v.start; t.end=v.end; delete t.time; t.color=v.color; }
function createRepeatSeries(y,m,d,vals,freq,untilStr,rid,skipFirst){
  rid=rid||('r_'+Date.now());
  const dates=repeatDates(y,m,d,freq,untilStr);
  dates.forEach((pd,i)=>{
    if(skipFirst && i===0) return;
    const ds=getDayState(pd.m, pd.d, pd.y);
    if(!ds.__custom__) ds.__custom__=[];
    ds.__custom__.push({ id:`c_${Date.now()}_${i}`, label:vals.label, cat:'custom', start:vals.start, end:vals.end, color:vals.color, rid:rid, freq:freq });
  });
  return rid;
}
function removeSeriesFrom(rid, from){
  Object.keys(state).forEach(k=>{
    const pd=parseDayKeyStr(k); if(!pd) return;
    if(dateCmp(pd,from)<0) return;
    const s=state[k]; if(!s||!s.__custom__) return;
    s.__custom__.forEach(t=>{ if(t.rid===rid) delete s[t.id]; });
    s.__custom__=s.__custom__.filter(t=>t.rid!==rid);
  });
}
function updateSeriesFrom(rid, from, vals, freq, untilStr, curTask){
  const oldFreq=curTask.freq||'none';
  if(freq===oldFreq){
    forEachRidOccurrence(rid,(pd,s,t)=>{ if(dateCmp(pd,from)>=0) applyEvVals(t,vals); });
    return;
  }
  // 周期が変わった → この日以降を消して作り直し
  removeSeriesFrom(rid, from);
  const ds=getDayState(from.m, from.d, from.y);
  if(!ds.__custom__) ds.__custom__=[];
  if(freq==='none'){
    ds.__custom__.push({ id:'c_'+Date.now(), label:vals.label, cat:'custom', start:vals.start, end:vals.end, color:vals.color });
  } else {
    const nrid='r_'+Date.now();
    ds.__custom__.push({ id:'c_'+Date.now(), label:vals.label, cat:'custom', start:vals.start, end:vals.end, color:vals.color, rid:nrid, freq:freq });
    createRepeatSeries(from.y, from.m, from.d, vals, freq, untilStr, nrid, true);
  }
}

  const freq=evCtx.repFreq||'none';

  const untilStr=(untilEl&&untilEl.value)?untilEl.value:null;
  if(evCtx.isNew){
    if(!name){ diaryToast("予定名を入れてね"); return; }
    if(freq==='none'){
      if(!s.__custom__) s.__custom__=[];
      s.__custom__.push({ id:`c_${Date.now()}`, label:name, cat:'custom', start:min2hm(start), end:min2hm(end), color:col });
    } else {
      createRepeatSeries(curYear, currentMonth, selDay, {label:name,start:min2hm(start),end:min2hm(end),color:col}, freq, untilStr);
      saveState(state);
      diaryToast("✓ 繰り返しで保存");
      closeDaySheet();
      return;
    }
  } else if(evCtx.kind==='custom'){
    const t=(s.__custom__||[]).find(t=>t.id===evCtx.id);
    if(t){
      const vals={label:name||t.label, start:min2hm(start), end:min2hm(end), color:col};
      if(t.rid){
        showActSheet('繰り返し予定の変更', [
          {label:'この予定のみ変更', fn:()=>{ applyEvVals(t,vals); saveState(state); diaryToast('✓ 保存'); closeDaySheet(); }},
          {label:'これ以降すべて変更', fn:()=>{ updateSeriesFrom(t.rid, {y:curYear,m:currentMonth,d:selDay}, vals, freq, untilStr, t); saveState(state); diaryToast('✓ 保存'); closeDaySheet(); }}
        ]);
        return;
      }
      applyEvVals(t,vals);
      if(freq!=='none'){
        // 単発→繰り返しに変換（この予定が初回になる）
        const rid='r_'+Date.now();
        t.rid=rid; t.freq=freq;
        createRepeatSeries(curYear, currentMonth, selDay, vals, freq, untilStr, rid, true);
      }
    }
  } else {
    if(!s.__ptime__) s.__ptime__={};
    s.__ptime__[evCtx.id]={start, end};
    if(!s.__pcolor__) s.__pcolor__={};
    s.__pcolor__[evCtx.id]=col;
  }
  saveState(state);
  diaryToast("✓ 保存");
  closeDaySheet();
}

function forceReload(){
  const url = new URL(location.href);
  url.searchParams.set('_t', Date.now());
  location.href = url.toString();
}
(function setupPullToRefresh(){
  let startY = 0, currentY = 0, pulling = false;
  const threshold = 80;
  function getIndicator(){ return document.getElementById('ptrIndicator'); }
  window.addEventListener('touchstart', e => {
    if(document.body.classList.contains('cal2-lock')) return; // 日ビュー中は独自PTRを無効化（.dv-scrollの内部スクロールに任せる）
    if(window.scrollY === 0 && e.touches.length === 1){
      startY = e.touches[0].clientY;
      currentY = startY;
      pulling = true;
    }
  }, {passive: true});
  window.addEventListener('touchmove', e => {
    if(!pulling) return;
    currentY = e.touches[0].clientY;
    const dist = currentY - startY;
    const ind = getIndicator();
    if(dist > 10){
      if(ind){
        ind.classList.add('show');
        ind.classList.toggle('ready', dist > threshold);
        ind.textContent = dist > threshold ? '✓' : '↓';
      }
    }
  }, {passive: true});
  window.addEventListener('touchend', () => {
    if(!pulling) return;
    const dist = currentY - startY;
    const ind = getIndicator();
    if(dist > threshold){
      if(ind){
        ind.classList.add('refreshing');
        ind.textContent = '🔄';
      }
      setTimeout(forceReload, 200);
    } else {
      if(ind){
        ind.classList.remove('show','ready');
        ind.textContent = '↓';
      }
    }
    pulling = false;
    startY = 0;
    currentY = 0;
  }, {passive: true});
})();

function fmtDateYMD(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function svFmtHM(ts){ const d=new Date(ts); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function svFmtDur(ms){ const totalMin=Math.max(0,Math.round(ms/60000)); const h=Math.floor(totalMin/60), m=totalMin%60; return h+"時間"+m+"分"; }
function svFmtDurShort(ms){ const totalMin=Math.max(0,Math.round(ms/60000)); const h=Math.floor(totalMin/60), m=totalMin%60; return h+"h"+(m?String(m).padStart(2,'0')+"m":""); }
function svApplyTimeToDate(ts, hhmm){
  const d = new Date(ts);
  const parts = hhmm.split(":");
  const h = parseInt(parts[0],10), m = parseInt(parts[1],10);
  d.setHours(h, m, 0, 0);
  return d.getTime();
}

// ===== 導出値 =====
function sleepStats(sd){
  const good = sd.nights.filter(n=>n.points>=75);
  let bestMs = null;
  if(good.length >= 3){
    bestMs = good.reduce((a,n)=>a+(n.wakeTs-n.bedTs),0) / good.length;
  }
  let recommend = null;
  if(bestMs!==null){
    const recent = sd.nights.slice(-7);
    if(recent.length){
      // 直近7件の起床「時刻」（時分のみ）の平均。日付は無視し分単位で平均する。
      // TODO: 起床時刻が日をまたいで大きくばらける場合（例: 6:00と23:50が混在）は
      // 単純な分平均だと直感に反した値になり得る。v1では簡略化して許容する。
      const avgWakeMinOfDay = recent.reduce((a,n)=>{
        const d = new Date(n.wakeTs);
        return a + d.getHours()*60 + d.getMinutes();
      },0) / recent.length;
      const bedMinBeforeWake = bestMs/60000 + 15; // 最適睡眠時間(分) + 入眠余裕15分
      let recMin = avgWakeMinOfDay - bedMinBeforeWake;
      recMin = ((recMin % 1440) + 1440) % 1440;
      recommend = { h: Math.floor(recMin/60), m: Math.round(recMin%60) };
    }
  }
  return { bestMs, goodCount: good.length, recommend };
}

function sleepScoreTap(v){
  const sd = loadSleep();
  if(!sd.pending || !svTempWake) return;
  const bedTs = sd.pending.bedTs;
  const wakeTs = svTempWake.wakeTs;
  const hrs = (wakeTs - bedTs) / 3600000;
  if(hrs < 1 || hrs > 16){
    const ok = confirm(svFmtDur(wakeTs-bedTs) + "で記録する？");
    if(!ok){
      svTempWakeScore = v;
      svEditingPending = true;
      renderContent();
      return;
    }
  }
  sleepCommitNight(bedTs, wakeTs, v);
}
function sleepSavePendingEdit(score){
  const sd = loadSleep();
  if(!sd.pending || !svTempWake) return;
  const bedInput = document.getElementById("svEditBed");
  const wakeInput = document.getElementById("svEditWake");
  if(!bedInput || !wakeInput) return;
  const bedTs = svApplyTimeToDate(sd.pending.bedTs, bedInput.value);
  const wakeTs = svApplyTimeToDate(svTempWake.wakeTs, wakeInput.value);
  if(wakeTs <= bedTs){ alert("起床時刻が就寝時刻より前になってる。確認して。"); return; }
  sleepCommitNight(bedTs, wakeTs, score);
}
function sleepCommitNight(bedTs, wakeTs, score){
  const sd = loadSleep();
  const points = SLEEP_POINTS[score];
  const dateStr = fmtDateYMD(new Date(wakeTs));
  const rec = { id:"n_"+wakeTs, bedTs, wakeTs, score, points, date: dateStr };
  // 同じ起床日に2件目が来たら上書き（夜の睡眠は1日1件）
  const idx = sd.nights.findIndex(n=>n.date===dateStr);
  if(idx>=0) sd.nights[idx] = rec; else sd.nights.push(rec);
  sd.nights.sort((a,b)=>a.wakeTs-b.wakeTs);
  sd.pending = null;
  saveSleep(sd);
  svTempWake = null;
  svTempWakeScore = null;
  svEditingPending = false;
  svManualOpen = false;
  renderContent();
}
function sleepOpenManual(){ svManualOpen = true; renderContent(); }
function sleepCloseManual(){ svManualOpen = false; renderContent(); }
function sleepManualSubmit(v){
  const bedInput = document.getElementById("svManBed");
  const wakeInput = document.getElementById("svManWake");
  if(!bedInput || !wakeInput) return;
  const now = new Date();
  const bedD = new Date(now);
  const bp = bedInput.value.split(":"); bedD.setHours(parseInt(bp[0],10), parseInt(bp[1],10), 0, 0);
  const wakeD = new Date(now);
  const wp = wakeInput.value.split(":"); wakeD.setHours(parseInt(wp[0],10), parseInt(wp[1],10), 0, 0);
  if(wakeD.getTime() <= bedD.getTime()){
    bedD.setDate(bedD.getDate()-1); // 就寝は前日とみなす（日付跨ぎ）
  }
  const bedTs = bedD.getTime(), wakeTs = wakeD.getTime();
  const hrs = (wakeTs-bedTs)/3600000;
  if(hrs < 1 || hrs > 16){
    // キャンセル時はフォームを開いたままにして再入力させる（再renderしない＝入力欄の値は保持される）
    if(!confirm(svFmtDur(wakeTs-bedTs) + "で記録する？")) return;
  }
  sleepCommitNight(bedTs, wakeTs, v);
}

function renderSleepTrend(sd){
  if(sd.nights.length === 0){
    return `

        <div class="sv-tr-note">今夜から始めよう</div>
      </div>

    `;
  }
  const stats = sleepStats(sd);
  const nights = sd.nights.slice(-14);
  const bestBlock = stats.bestMs!=null
    ? `<b>${svFmtDurShort(stats.bestMs)}</b><div class="sv-tr-note">回復75点を超えた夜の平均から学習中<br>記録が増えるほど正確になる（今${sd.nights.length}夜分）</div>`
    : `<b class="sv-learning">学習中（あと${Math.max(0,3-stats.goodCount)}夜）</b><div class="sv-tr-note">回復75点を超えた夜が3夜たまると最適睡眠時間がわかる</div>`;
  const maxDur = Math.max.apply(null, nights.map(n=>n.wakeTs-n.bedTs).concat([1]));
  const bars = nights.map(n=>{
    const durMs = n.wakeTs - n.bedTs;
    const hrs = durMs/3600000;
    const cls = hrs>=7 ? "" : (hrs<6 ? " sv-low" : " sv-mid");
    const heightPct = Math.max(4, Math.min(100, Math.round(durMs/maxDur*100)));
    return `<div class="sv-bar${cls}" style="height:${heightPct}%"><i>${n.points}</i></div>`;
  }).join("");
  const days = nights.map(n=>{
    const d = new Date(n.wakeTs);
    return `<span>${d.getMonth()+1}/${d.getDate()}</span>`;
  }).join("");
  let lineTxt;
  if(sd.nights.length < 3){
    lineTxt = "まだ学習中。まずは3夜。";
  } else if(stats.bestMs!=null){
    lineTxt = `オレンジの夜＝7時間超え。青い夜＝6時間未満。<br>君の回復は<b>${svFmtDurShort(stats.bestMs)}</b>前後で一番高い。`;
  } else {
    lineTxt = "まだ学習中。まずは3夜。";
  }
  return `
    <div class="sv-tr-best">
      <div class="sv-lbl">君の最適睡眠時間</div>
      ${bestBlock}
    </div>
    <div class="sv-tr-chart">
      <div class="sv-lbl">睡眠時間と回復（バー=時間・色=回復）</div>
      <div class="sv-bars">${bars}</div>
      <div class="sv-days">${days}</div>
    </div>
    <div class="sv-tr-line">${lineTxt}</div>
    ${renderSleepList(sd)}
  `;
}

const KAIZEN_KEY = "kaizen_v1";
function escHtml(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function loadKaizen(){
  try{
    const raw = JSON.parse(localStorage.getItem(KAIZEN_KEY)||"null");
    if(raw && typeof raw==="object"){
      return { active: raw.active||null, habits: Array.isArray(raw.habits)?raw.habits:[], ended: Array.isArray(raw.ended)?raw.ended:[] };
    }
  }catch(e){}
  return { active:null, habits:[], ended:[] };
}
function saveKaizen(kd){
  try{ localStorage.setItem(KAIZEN_KEY, JSON.stringify(kd)); }catch(e){}
}
function mondayOnOrBefore(date){
  const d = new Date(date); d.setHours(0,0,0,0);
  const wd = d.getDay();
  const diff = (wd===0) ? 6 : wd-1;
  d.setDate(d.getDate()-diff);
  return d;
}
function kaizenFirstOccurrenceFromToday(targetWeekday){
  const today = new Date(); today.setHours(0,0,0,0);
  if(targetWeekday===null || targetWeekday===undefined) return date2ymd(today);
  const dt = new Date(today);
  let guard=0;
  while(dt.getDay() !== targetWeekday && guard<8){ dt.setDate(dt.getDate()+1); guard++; }
  return date2ymd(dt);
}
function kaizenTomorrow(){
  const d = new Date(); d.setDate(d.getDate()+1);
  return {y:d.getFullYear(), m:d.getMonth()+1, d:d.getDate()};
}
function kaizenWeekTargetDate(weekStartStr, targetWeekday){
  const start = new Date(weekStartStr+"T00:00:00");
  if(targetWeekday===null || targetWeekday===undefined) return start;
  const startWd = start.getDay();
  let diff = targetWeekday - startWd;
  if(diff < 0) diff += 7;
  const dt = new Date(start);
  dt.setDate(dt.getDate()+diff);
  return dt;
}
function kaizenEnsureCurrentWeek(exp){
  if(!exp.weeks || !exp.weeks.length) return;
  const today = new Date(); today.setHours(0,0,0,0);
  let lastStart = new Date(exp.weeks[exp.weeks.length-1].start+"T00:00:00");
  let guard=0;
  while(guard<520){
    const weekEnd = new Date(lastStart); weekEnd.setDate(weekEnd.getDate()+6);
    if(today <= weekEnd) break;
    const nextStart = new Date(lastStart); nextStart.setDate(nextStart.getDate()+7);
    exp.weeks.push({ start: fmtDateYMD(nextStart), result:null, memo:"" });
    lastStart = nextStart;
    guard++;
  }
}
function kaizenCanGraduate(exp){
  const w = exp.weeks;
  if(!w || w.length<3) return false;
  return w[w.length-1].result==='o' && w[w.length-2].result==='o' && w[w.length-3].result==='o';
}

      <span class="flask-bubble" style="animation-delay:0s;left:47%"></span>
      <span class="flask-bubble" style="animation-delay:2.6s;left:53%"></span>
      <span class="flask-bubble" style="animation-delay:5.2s;left:50%"></span>` : '';
  return `<div class="room-bench" aria-hidden="true">
    <div class="bench-body"></div><div class="bench-top"></div>
    <div class="bench-flask">
      <div class="flask-neck"></div>
      <div class="flask-body"><div class="flask-liquid" style="background:${liquid}"></div>${bubbles}</div>
    </div>
  </div>`;
}
function fmtMD(dt){ return `${dt.getMonth()+1}/${dt.getDate()}（${WD_JP[dt.getDay()]}）`; }
// 実験タブ最上部「今、俺は何をすればいい？」の場面判定（場面A/B/C）
function kaizenScene(exp){
  kaizenEnsureCurrentWeek(exp);
  const idx = exp.weeks.length-1;
  const week = exp.weeks[idx];
  const isDaily = (exp.targetWeekday===null || exp.targetWeekday===undefined);
  const now = new Date();
  const today0 = new Date(now); today0.setHours(0,0,0,0);
  const targetDate = isDaily ? today0 : kaizenWeekTargetDate(week.start, exp.targetWeekday);
  if(week.result){
    let nextDate;
    if(isDaily){ nextDate = new Date(today0); nextDate.setDate(nextDate.getDate()+1); }
    else { nextDate = new Date(targetDate); nextDate.setDate(nextDate.getDate()+7); }
    return {type:'done', idx, week, targetDate, nextDate};
  }
  if(!isDaily && today0.getTime() < targetDate.getTime()){
    return {type:'before', idx, week, targetDate};
  }
  const isTargetDay = isDaily || today0.getTime()===targetDate.getTime();
  const pastTargetDay = !isDaily && today0.getTime() > targetDate.getTime();
  const judgeOpen = pastTargetDay || (isTargetDay && now.getHours()>=18);
  if(judgeOpen) return {type:'judge', idx, week, targetDate};
  return {type:'today', idx, week, targetDate};
}

function renderExpMonthSummary(kd){

function kaizenSaveNew(){
  const title=(document.getElementById('expTitle').value||'').trim();
  const ifThen=(document.getElementById('expIfThen').value||'').trim();
  const aim=(document.getElementById('expAim').value||'').trim();
  const ok=(document.getElementById('expOk').value||'').trim();

  const startDate = fmtDateYMD(mondayOnOrBefore(new Date()));
  const exp = {
    id: "e_"+Date.now(), title, ifThen, aim, ok, ng,
    startDate, targetWeekday: expDraftWeekday,

  };

    const rid = createRepeatSeries(first.y, first.m, first.d, {label:"🧪"+title, start:"14:00", end:"16:00", color:"#c850dc"}, freq, null);
    exp.repRid = rid;

// 編集保存：曜日/時間帯（頻度）が変わったら旧repRidの将来分をremoveSeriesFromで掃除しcreateRepeatSeriesで貼り直し。weeks（過去の判定）は保持
function kaizenSaveEdit(kd, title, ifThen, aim, ok, ng){
  if(!kd.active || kd.active.id!==expEditingId){ kaizenCloseNewSheet(); return; }
  const exp = kd.active;
  const oldWd = (exp.targetWeekday===undefined) ? null : exp.targetWeekday;
  const wdChanged = oldWd !== expDraftWeekday;
  exp.title = title; exp.ifThen = ifThen; exp.aim = aim; exp.ok = ok; exp.ng = ng;
  if(wdChanged){
    try{
      if(exp.repRid) removeSeriesFrom(exp.repRid, kaizenTomorrow());
      const first = kaizenFirstOccurrenceFromToday(expDraftWeekday);
      const freq = (expDraftWeekday===null) ? 'daily' : 'weekly';
      const nrid = createRepeatSeries(first.y, first.m, first.d, {label:"🧪"+title, start:"14:00", end:"16:00", color:"#c850dc"}, freq, null);
      exp.repRid = nrid;
      saveState(state);
    }catch(e){}
    exp.targetWeekday = expDraftWeekday;
  } else {
    try{
      if(exp.repRid){
        const today0 = new Date(); today0.setHours(0,0,0,0);
        forEachRidOccurrence(exp.repRid, (pd, s, t)=>{
          if(dateCmp(pd, date2ymd(today0))>=0) t.label = "🧪"+title;
        });
        saveState(state);
      }
    }catch(e){}
  }
  saveKaizen(kd);
  kaizenCloseNewSheet();
  diaryToast("✓ 保存");
  renderContent();
}
function kaizenGraduate(){
  const kd = loadKaizen();

  const exp = kd.active;
  try{ if(exp.repRid) removeSeriesFrom(exp.repRid, kaizenTomorrow()); saveState(state); }catch(e){}
  exp.graduatedAt = fmtDateYMD(new Date());
  kd.habits.push(exp);
  kd.active = null;
  saveKaizen(kd);
  diaryToast("🎓 軌道に乗った");
  renderContent();
}
function kaizenEndExperiment(){
  const kd = loadKaizen();
  if(!kd.active) return;
  if(!confirm("この実験をやめる？材料は残るよ。")) return;
  const exp = kd.active;
  try{ if(exp.repRid) removeSeriesFrom(exp.repRid, kaizenTomorrow()); saveState(state); }catch(e){}
  exp.endedAt = fmtDateYMD(new Date());
  kd.ended.push(exp);
  kd.active = null;
  saveKaizen(kd);
  diaryToast("実験を終了");
  renderContent();
}

// ===== 🥊MMAタブ（第3弾新設・fightlog_v2/fightlog_v2_planは読み取り専用・書き込み禁止） =====
const MMA_FL_KEY = "fightlog_v2";
const MMA_PLAN_KEY = "fightlog_v2_plan";
function mmaGet(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
function mmaFmtDate(dateStr){
  try{
    const d = new Date(dateStr+"T00:00:00");
    if(isNaN(d.getTime())) return dateStr||'';
    return `${d.getMonth()+1}/${d.getDate()}（${WD_JP[d.getDay()]}）`;
  }catch(e){ return dateStr||''; }
}
function mmaDaysSince(dateStr){
  try{
    const d = new Date(dateStr+"T00:00:00");
    if(isNaN(d.getTime())) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    return Math.max(0, Math.round((today-d)/86400000));
  }catch(e){ return null; }
}
function mmaEnterDojo(){
  location.href = location.hostname.indexOf("github.io")>=0 ? "../mma-tracker/" : "mma_fightlog_v2.html";
}
function renderMmaArena(){
  return `<div class="mma-arena" aria-hidden="true"><div class="mma-rope"></div></div>`;
}
function renderMma(){
  const raw = mmaGet(MMA_FL_KEY);
  const planRaw = mmaGet(MMA_PLAN_KEY);
  let fl=null, plan=null;
  try{ fl = raw ? JSON.parse(raw) : null; }catch(e){ fl=null; }
  try{ plan = planRaw ? JSON.parse(planRaw) : null; }catch(e){ plan=null; }
  const sessions = (fl && Array.isArray(fl.sessions)) ? fl.sessions : [];
  const hasData = raw!==null && sessions.length>0;

  let html = `<div class="mma-wrap">${renderMmaArena()}<div class="room-cap">ARENA</div>`;

  if(plan && plan.aim){
    html += `<div class="es-card mma-card mma-plan">
      <div class="es-line"><div style="font-size:12px;font-weight:800;color:#ff5e73">今夜の実験</div></div>
      <div class="es-line"><div style="font-size:14px;color:#fff;line-height:1.5">${escHtml(plan.aim)}</div></div>
    </div>`;
  }

  if(!hasData){
    html += `<div class="es-card mma-card">
      <div class="es-line" style="justify-content:center;padding:18px 14px;flex-direction:column;gap:10px">
        <div style="font-size:13px;color:var(--muted);text-align:center">まだ記録がない。道場で最初の1本を</div>
        <button class="mma-enter-btn" onclick="mmaEnterDojo()">🥊 道場へ入場する</button>
      </div>
    </div>`;
    html += `</div>`;
    return html;
  }

  const doneCount = sessions.filter(s=>s && s.done===true).length;
  const oCount = sessions.filter(s=>s && s.exp && s.exp.result==='o').length;
  const xCount = sessions.filter(s=>s && s.exp && s.exp.result==='x').length;
  const sorted = sessions.slice().sort((a,b)=>{
    const ad=a&&a.date||'', bd=b&&b.date||'';
    if(ad!==bd) return ad<bd ? 1 : -1;
    return (b&&b.ts||0)-(a&&a.ts||0);
  });
  const last = sorted[0];
  const daysSince = last ? mmaDaysSince(last.date) : null;

  html += `<div class="es-card mma-card">
    <div class="mma-stat-row">
      <div class="mma-stat"><div class="mma-stat-num">${doneCount}</div><div class="mma-stat-lbl">完遂数</div></div>
      <div class="mma-stat"><div class="mma-stat-num">${oCount}<span class="mma-stat-x">✕${xCount}</span></div><div class="mma-stat-lbl">◯ ✕</div></div>
      <div class="mma-stat"><div class="mma-stat-num">${daysSince==null?'―':daysSince}</div><div class="mma-stat-lbl">最終戦から何日</div></div>
    </div>
  </div>`;

  if(last){
    const resMark = last.exp ? (last.exp.result==='o'?'◯':(last.exp.result==='x'?'✕':'・')) : '・';
    const aimTxt = (last.exp && last.exp.aim) ? last.exp.aim : '';
    html += `<div class="es-card mma-card">
      <div class="es-line">
        <div class="mma-last-date">${mmaFmtDate(last.date)}</div>
        <div class="mma-last-res">${resMark}</div>
        <div class="mma-last-aim">${escHtml(aimTxt)}</div>
      </div>
    </div>`;
  }

  html += `<div class="es-card mma-card">
    <div class="es-line" style="justify-content:center;padding:14px">
      <button class="mma-enter-btn" onclick="mmaEnterDojo()">🥊 道場へ入場する</button>
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

  // ---- CSS注入 ----
  const css = `
  .mp-fab{position:fixed;right:14px;bottom:18px;z-index:300;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(135deg,#ffb300,#ff7a00);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 14px rgba(255,122,0,.45);display:flex;align-items:center;justify-content:center}
  .mp-fab:active{transform:scale(.92)}
  .mp-fab .mp-badge{position:absolute;top:-2px;right:-2px;background:#ff3b30;color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid rgba(15,15,26,.8)}
  .mp-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:301;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
  .mp-bg.show{opacity:1;pointer-events:auto}
  .mp-panel{background:rgba(25,25,45,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);width:100%;max-width:640px;max-height:85vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:16px 14px 28px;transform:translateY(100%);transition:transform .3s ease;border-top:1px solid rgba(255,255,255,.18)}
  .mp-bg.show .mp-panel{transform:translateY(0)}
  .mp-grip{width:42px;height:5px;background:rgba(255,255,255,.3);border-radius:999px;margin:0 auto 14px}
  .mp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .mp-head h2{margin:0;font-size:18px;font-weight:800;color:#fff}
  .mp-head .mp-close{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.7);font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px;cursor:pointer}
  .mp-add{display:flex;gap:8px;margin-bottom:14px}
  .mp-add button{flex:1;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18);padding:13px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer}
  .mp-add button:active{transform:scale(.98)}
  .mp-list{display:flex;flex-direction:column;gap:10px}
  .mp-note{border-radius:12px;padding:12px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.3);border-left:5px solid;background:rgba(255,255,255,.06)}
  .mp-note textarea{width:100%;min-height:48px;border:none;background:transparent;font:inherit;font-size:14px;line-height:1.5;resize:vertical;color:var(--mp-text,rgba(255,255,255,.85))}
  .mp-note textarea:focus{outline:none}
  .mp-note textarea::placeholder{color:var(--mp-text,rgba(255,255,255,.85));opacity:.55}
  .mp-note .mp-foot{display:flex;align-items:center;gap:6px;margin-top:6px}
  .mp-note .mp-colors{display:flex;gap:5px;flex:1}
  .mp-note .mp-colors span{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
  .mp-note .mp-colors span.sel{border-color:#fff;transform:scale(1.15)}
  .mp-note .mp-del{background:rgba(255,100,100,.12);border:none;color:#ff6b6b;font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer}
  .mp-note .mp-time{font-size:10px;color:var(--mp-text,rgba(255,255,255,.35));opacity:.7;font-weight:600;margin-right:auto}
  .mp-empty{text-align:center;color:rgba(255,255,255,.4);font-size:13px;padding:30px 10px}
  `;
  const styleEl = document.createElement("style");
  styleEl.textContent = css;
  document.head.appendChild(styleEl);

  // ---- DOM生成 ----
  const fab = document.createElement("button");
  fab.className = "mp-fab";
  fab.innerHTML = `📌<span class="mp-badge" id="mpBadge" style="display:none">0</span>`;
  fab.onclick = openPad;
  document.body.appendChild(fab);

  const bg = document.createElement("div");
  bg.className = "mp-bg";
  bg.id = "mpBg";
  bg.innerHTML = `<div class="mp-panel">
    <div class="mp-grip"></div>
    <div class="mp-head"><h2>📌 付箋メモ</h2><button class="mp-close">閉じる</button></div>
    <div class="mp-add"><button>＋ 新しい付箋を追加</button></div>
    <div class="mp-list" id="mpList"></div>
  </div>`;
  document.body.appendChild(bg);
  bg.addEventListener("click", e=>{ if(e.target===bg) closePad(); });
  bg.querySelector(".mp-close").onclick = closePad;
  bg.querySelector(".mp-add button").onclick = addNote;

  // ---- データ ----
  function load(){ try{ return JSON.parse(localStorage.getItem(MEMOPAD_KEY)||"[]"); }catch(e){ return []; } }
  function save(arr){ try{ localStorage.setItem(MEMOPAD_KEY, JSON.stringify(arr)); }catch(e){} }
  let notes = load();

  function updateBadge(){
    const b = document.getElementById("mpBadge");
    if(!b) return;
    if(notes.length){ b.style.display="flex"; b.textContent = notes.length; }
    else b.style.display="none";
  }
  function openPad(){ document.getElementById("mpBg").classList.add("show"); renderNotes(); }
  function closePad(){ document.getElementById("mpBg").classList.remove("show"); }

  function addNote(){
    notes.unshift({id:Date.now(), text:"", color:"yellow", ts:new Date().toISOString()});
    save(notes); renderNotes(); updateBadge();
    setTimeout(()=>{ const ta=document.querySelector(".mp-note textarea"); if(ta) ta.focus(); },80);
  }
  function editNote(id, text){ const n=notes.find(x=>x.id===id); if(n){ n.text=text; save(notes); } }
  function colorNote(id, c){ const n=notes.find(x=>x.id===id); if(n){ n.color=c; save(notes); renderNotes(); } }
  function delNote(id){ if(!confirm("この付箋を消す？")) return; notes=notes.filter(x=>x.id!==id); save(notes); renderNotes(); updateBadge(); }

  window.mpEdit=editNote; window.mpColor=colorNote; window.mpDel=delNote;

  function renderNotes(){
    const list = document.getElementById("mpList");
    if(!notes.length){ list.innerHTML = `<div class="mp-empty">付箋なし。<br>「＋ 新しい付箋を追加」で書ける</div>`; return; }
    list.innerHTML = notes.map(n=>{
      const col = COLORS.find(c=>c.name===n.color)||COLORS[0];
      const t = new Date(n.ts);
      const tt = `${t.getMonth()+1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
      const safe = (n.text||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const colorsHtml = COLORS.map(c=>`<span style="background:${c.bar}" class="${c.name===n.color?'sel':''}" onclick="mpColor(${n.id},'${c.name}')"></span>`).join("");
      return `<div class="mp-note" style="background:${col.bg};border-left-color:${col.bar};--mp-text:${col.text}">
        <textarea placeholder="メモを書く…" oninput="mpEdit(${n.id},this.value)">${safe}</textarea>
        <div class="mp-foot">
          <span class="mp-time">${tt}</span>
          <div class="mp-colors">${colorsHtml}</div>
          <button class="mp-del" onclick="mpDel(${n.id})">削除</button>
        </div>
      </div>`;
    }).join("");
  }
  updateBadge();
})();
</script>
</body>
</html>
